; RYBSEN CRM — Limites PHP pour l'upload de vidéos en Data Room
; .user.ini est lu automatiquement par PHP-FPM (contrairement à .htaccess,
; qui ne fonctionne qu'en Apache mod_php — non garanti sur Hostinger).
; Pris en compte par le serveur avec un délai pouvant aller jusqu'à 5 min
; (user_ini.cache_ttl) après upload sur le serveur.
upload_max_filesize = 512M
post_max_size = 520M
max_execution_time = 600
max_input_time = 600
memory_limit = 512M
