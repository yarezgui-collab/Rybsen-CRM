; ============================================================================
; Configuration PHP par dossier (Hostinger / LiteSpeed la lit automatiquement).
;
; Force PHP à revérifier le fichier source à CHAQUE requête et à recompiler
; s'il a changé. Sans ça, l'OPcache du serveur peut continuer à exécuter une
; ANCIENNE version compilée de api.php après un déploiement — ce qui rend les
; correctifs invisibles alors que le fichier sur le disque est bien à jour.
; ============================================================================
opcache.validate_timestamps=1
opcache.revalidate_freq=0
