function ProductPicker({ products, currency, value, onChange, getPrice }) {
  const groups    = useMemo(() => groupProductsByBase(products), [products]);
  const catGroups = useMemo(() => groupByCategory(groups), [groups]);
  const selected  = products.find(p => p.id === value) || null;

  const selectedGroup = useMemo(() => {
    if (!selected) return null;
    return groups.find(g => g.single?.id === selected.id || g.variants.some(v => v.product.id === selected.id)) || null;
  }, [groups, selected]);

  const [activeCat,    setActiveCat]    = useState(selectedGroup ? selectedGroup.category : "");
  const [activeSuffix, setActiveSuffix] = useState(() => {
    if (!selectedGroup || !selected) return "";
    const v = selectedGroup.variants.find(v => v.product.id === selected.id);
    return v ? v.suffix : (selectedGroup.single?.id === selected.id ? "Classique" : "");
  });
  const [baseChoice,   setBaseChoice]   = useState(selectedGroup ? selectedGroup.base : "");

  useEffect(() => {
    if (selectedGroup && selected) {
      // Synchroniser avec le produit sélectionné
      setActiveCat(selectedGroup.category);
      setBaseChoice(selectedGroup.base);
      const v = selectedGroup.variants.find(v => v.product.id === selected.id);
      setActiveSuffix(v ? v.suffix : "Classique");
    } else {
      // Produit vidé (après Ajouter) : garder catégorie + mélange, réinitialiser seulement le produit
      setBaseChoice("");
    }
  }, [selectedGroup?.base]);

  const isViennoiserie = activeCat === "Viennoiserie";
  const catGroupItems  = catGroups.find(c => c.category === activeCat)?.groups || [];

  // Pour Viennoiserie : quels mélanges existent dans le catalogue ?
  const availableSuffixes = VARIANT_SUFFIXES.filter(s =>
    catGroupItems.some(g => g.variants.some(v => v.suffix === s))
  );
  const hasClassique = catGroupItems.some(g => g.single && g.variants.length === 0);

  // Filtrer les produits selon le mélange choisi
  const filteredForSuffix = !activeSuffix ? [] :
    activeSuffix === "Classique"
      ? catGroupItems.filter(g => g.single && g.variants.length === 0)
      : catGroupItems.filter(g => g.variants.some(v => v.suffix === activeSuffix));

  const currentGroup = groups.find(g => g.base === baseChoice) || null;

  const pickCat = (cat) => {
    if (activeCat === cat) { setActiveCat(""); setActiveSuffix(""); setBaseChoice(""); onChange(""); return; }
    setActiveCat(cat); setActiveSuffix(""); setBaseChoice(""); onChange("");
  };

  const pickSuffix = (suffix) => {
    if (activeSuffix === suffix) { setActiveSuffix(""); setBaseChoice(""); onChange(""); return; }
    setActiveSuffix(suffix); setBaseChoice(""); onChange("");
  };

  const pickBase = (base) => {
    setBaseChoice(base);
    const g = groups.find(x => x.base === base);
    if (!g) { onChange(""); return; }
    if (isViennoiserie && activeSuffix) {
      if (activeSuffix === "Classique") { onChange(g.single ? g.single.id : ""); }
      else { const v = g.variants.find(v => v.suffix === activeSuffix); onChange(v ? v.product.id : ""); }
    } else {
      if (g.single && g.variants.length === 0) onChange(g.single.id);
      else onChange("");
    }
  };

  return (
    <div>
      {/* ── Étape 1 : boutons catégorie ── */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        {catGroups.map(({category}) => {
          const meta   = CATEGORY_META[category] || CATEGORY_META["Autres"];
          const active = activeCat === category;
          return (
            <button key={category} type="button" onClick={()=>pickCat(category)}
              style={{
                flex:"1 1 auto", minWidth:70, padding:"10px 6px", borderRadius:12,
                border: active ? `2px solid ${meta.color}` : "1.5px solid var(--line)",
                background: active ? meta.color : "var(--surface)",
                color: active ? "#fff" : "var(--ink)",
                fontWeight: active ? 700 : 500, fontSize:12, cursor:"pointer",
                display:"flex", flexDirection:"column", alignItems:"center", gap:4, minHeight:56,
                transition:"all .15s",
              }}>
              <span style={{fontSize:22,lineHeight:1}}>{meta.emoji}</span>
              <span style={{lineHeight:1.2,textAlign:"center"}}>{category}</span>
            </button>
          );
        })}
      </div>

      {/* ── Étape 2a (Viennoiserie) : choisir le mélange en premier ── */}
      {isViennoiserie && (
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          {availableSuffixes.map(s => {
            const sc = SUFFIX_COLORS[s] || { border:"var(--wheat)", bg:"var(--wheat-lt)", text:"var(--ink)" };
            const active = activeSuffix === s;
            return (
              <button key={s} type="button" onClick={()=>pickSuffix(s)}
                style={{
                  flex:"1 1 auto", minWidth:86, padding:"10px 12px", borderRadius:10, minHeight:44,
                  border: active ? `2px solid ${sc.border}` : "1.5px solid var(--line)",
                  background: active ? sc.bg : "var(--surface)",
                  color: active ? sc.text : "var(--ink)",
                  fontWeight: active ? 700 : 500, fontSize:14, cursor:"pointer", transition:"all .15s",
                }}>
                {s}
              </button>
            );
          })}
          {hasClassique && (() => {
            const sc = SUFFIX_COLORS["Classique"];
            const active = activeSuffix === "Classique";
            return (
              <button type="button" onClick={()=>pickSuffix("Classique")}
                style={{
                  flex:"1 1 auto", minWidth:86, padding:"10px 12px", borderRadius:10, minHeight:44,
                  border: active ? `2px solid ${sc.border}` : "1.5px solid var(--line)",
                  background: active ? sc.bg : "var(--surface)",
                  color: active ? sc.text : "var(--ink)",
                  fontWeight: active ? 700 : 500, fontSize:14, cursor:"pointer", transition:"all .15s",
                }}>
                Classique
              </button>
            );
          })()}
        </div>
      )}

      {/* ── Étape 2b / 3 : menu déroulant produit ── */}
      {(isViennoiserie ? !!activeSuffix : !!activeCat) && (
        <select
          style={{...input, marginBottom: (!isViennoiserie && currentGroup && currentGroup.variants.length > 0) ? 10 : 0}}
          value={baseChoice}
          onChange={e => pickBase(e.target.value)}>
          <option value="">
            {isViennoiserie ? `— ${activeSuffix} : choisir un produit —` : `— ${activeCat} : choisir un produit —`}
          </option>
          {(isViennoiserie ? filteredForSuffix : catGroupItems).map(g => {
            let price = null;
            if (isViennoiserie && activeSuffix) {
              const prod = activeSuffix === "Classique"
                ? g.single
                : (g.variants.find(v => v.suffix === activeSuffix) || {}).product;
              if (prod) price = getPrice ? getPrice(prod.id) : prod.price;
            } else if (g.single && g.variants.length === 0) {
              price = getPrice ? getPrice(g.single.id) : g.single.price;
            }
            return (
              <option key={g.base} value={g.base}>
                {g.base}{price !== null ? ` (${money(price, currency)})` : ""}
              </option>
            );
          })}
        </select>
      )}

      {/* ── Étape 3b (autres catégories uniquement) : variantes ── */}
      {!isViennoiserie && currentGroup && currentGroup.variants.length > 0 && (
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {currentGroup.variants.map(v => {
            const active = value === v.product.id;
            return (
              <button key={v.product.id} type="button" onClick={()=>onChange(v.product.id)}
                style={{
                  flex:"1 1 auto", minWidth:100, padding:"10px 12px", borderRadius:10,
                  border:active ? "2px solid var(--wheat)" : "1.5px solid var(--line)",
                  background:active ? "var(--wheat-lt)" : "var(--surface)",
                  color:"var(--ink)", fontWeight:active?700:500, fontSize:13, cursor:"pointer",
                  display:"flex", flexDirection:"column", alignItems:"center", gap:2, minHeight:44,
                }}>
                <span>{v.suffix}</span>
                <span style={{fontSize:12,color:"var(--muted)",fontVariantNumeric:"tabular-nums"}}>{money(getPrice ? getPrice(v.product.id) : v.product.price, currency)}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}


function Labo({ products, clients, drivers, deliveries, returns, currency, settings, onAddMany, onDelete, onUpdate, onAddReturn, onDeleteReturn, clientPrices, onRefreshPrices }) {
  const [date,      setDate]      = useState(today());
  const [clientId,  setClientId]  = useState("");
  const [productId, setProductId] = useState("");
  const [qty,       setQty]       = useState("");
  const [draft,     setDraft]     = useState([]);
  const [bon,       setBon]       = useState(null);
  const [validating, setValidating] = useState(false);
  const qtyRef = useRef(null);

  // Modification d'une commande déjà enregistrée
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState(null);
  const [confirmDelId, setConfirmDelId] = useState(null);

  // Retour d'articles non conformes sur une commande déjà enregistrée
  const [returningId, setReturningId] = useState(null);
  const [returnQty,   setReturnQty]   = useState(1);
  const [returnReason,setReturnReason]= useState("");
  const [returnError, setReturnError] = useState("");
  const [expandedDetails, setExpandedDetails] = useState(new Set());
  const toggleDetail = (key) => setExpandedDetails(prev => {
    const next = new Set(prev); next.has(key) ? next.delete(key) : next.add(key); return next;
  });
  useEffect(() => { if (productId && qtyRef.current) { qtyRef.current.focus(); qtyRef.current.select(); } }, [productId]);

  const startEditLine = (d) => {
    setEditingId(d.id); setReturningId(null);
    setEditDraft({ date:d.date, clientId:d.clientId, productId:d.productId, quantity:d.quantity });
  };
  const cancelEditLine = () => { setEditingId(null); setEditDraft(null); };
  const saveEditLine = (orig) => {
    const client  = clients.find(c=>c.id===editDraft.clientId);
    const product = products.find(p=>p.id===editDraft.productId);
    if (!client || !product || !(Number(editDraft.quantity)>0)) return;
    onUpdate(orig.id, {
      date:editDraft.date, clientId:client.id, clientName:client.name, driver:client.driver,
      productId:product.id, productName:product.name, quantity:Number(editDraft.quantity),
      unitPrice:getUnitPrice(client.id, product.id, clientPrices, products),
    });
    cancelEditLine();
  };

  const startReturn = (d) => {
    setReturningId(d.id); setEditingId(null);
    setReturnQty(1); setReturnReason(""); setReturnError("");
  };
  const cancelReturn = () => { setReturningId(null); setReturnError(""); };
  const submitReturn = async (d) => {
    const remaining = Math.max(0, (Number(d.quantity)||0) - (Number(d.returnedQty)||0));
    const q = Number(returnQty);
    if (!(q > 0)) { setReturnError("Quantité invalide."); return; }
    if (q > remaining) { setReturnError(`Maximum ${remaining} (quantité encore livrée non retournée).`); return; }
    const res = await onAddReturn(d.id, q, today(), returnReason);
    if (!res.ok) { setReturnError(res.error || "Erreur lors de l'enregistrement du retour."); return; }
    setReturningId(null);
  };

  const returnsFor = (deliveryId) => (returns||[]).filter(r => r.livraisonId === deliveryId);

  const client  = clients.find(c => c.id === clientId);
  const product = products.find(p => p.id === productId);
  const preview = (product && client) ? (Number(qty)||0)*getUnitPrice(client.id, product.id, clientPrices, products) : 0;

  // Commande de référence : même jour J-7, ou J-14 si aucune commande la semaine dernière
  const refOrderByClient = useMemo(() => {
    const offsetDate = (n) => {
      const d = new Date(date + "T00:00:00");
      d.setDate(d.getDate() - n);
      return d.toISOString().slice(0, 10);
    };
    const t7  = offsetDate(6);
    const t14 = offsetDate(13);
    const m = {};
    [t7, t14].forEach(target => {
      deliveries.filter(d => d.date === target).forEach(d => {
        if (!m[d.clientId]) m[d.clientId] = { date: target, lines: [] };
        if (m[d.clientId].date === target) m[d.clientId].lines.push(d);
      });
    });
    return m;
  }, [deliveries, date]);

  // Reprendre la dernière commande d'un client : ajoute ses lignes au brouillon (quantités modifiables)
  const [reorderQtys, setReorderQtys] = useState({});  // clientId -> {productId: qty}

  const openReorder = (cid) => {
    const last = refOrderByClient[cid];
    if (!last) return;
    const qtys = {};
    // Somme les quantités si le même produit apparaît plusieurs fois (deux saisies distinctes)
    last.lines.forEach(l => { qtys[l.productId] = (qtys[l.productId] || 0) + (Number(l.quantity) || 0); });
    setReorderQtys(prev => ({ ...prev, [cid]: qtys }));
  };

  const addReorder = (cid) => {
    const last = refOrderByClient[cid];
    const qtys = reorderQtys[cid];
    if (!last || !qtys) return;
    const c = clients.find(x => x.id === cid);
    if (!c) return;
    const lines = last.lines
      .map(l => {
        const q = Number(qtys[l.productId]) || 0;
        if (q <= 0) return null;
        return {
          tmpId:uid(), date, clientId:c.id, clientName:c.name,
          driver:c.driver, productId:l.productId, productName:l.productName,
          quantity:q, unitPrice: getUnitPrice(cid, l.productId, clientPrices, products),
        };
      })
      .filter(Boolean);
    if (!lines.length) return;
    setDraft(d => [...d, ...lines]);
    setReorderQtys(prev => { const n={...prev}; delete n[cid]; return n; });
  };

  const addLine = () => {
    if (!client || !product || !(Number(qty)>0)) return;
    setDraft(d => [...d, {
      tmpId:uid(), date, clientId:client.id, clientName:client.name,
      driver:client.driver, productId:product.id, productName:product.name,
      quantity:Number(qty), unitPrice:getUnitPrice(client.id, product.id, clientPrices, products),
    }]);
    setProductId(""); setQty("");
  };

  const draftTotal = draft.reduce((s,l) => s+lineTotal(l), 0);
  const validate = async () => {
    if (!draft.length || validating) return;
    setValidating(true);
    try { await onAddMany(draft.map(({tmpId,...rest}) => ({id:uid(),...rest}))); } catch(e) {}
    setDraft([]);
    setValidating(false);
  };

  const openBon = (clientName, driverName, rows) => {
    const d = rows[0]?.date || today();
    const bonNum = `BL-${d.replace(/-/g,"")}-${clientName.slice(0,3).toUpperCase()}`;
    setBon({ date:d, driverName, clientName, lines:rows, bonNum });
  };

  const [laboView, setLaboView] = useState("saisie"); // "saisie" | "dashboard"

  const byDay = useMemo(() => {
    const m = {};
    [...deliveries].forEach(d => { (m[d.date]=m[d.date]||[]).push(d); });
    return Object.keys(m).sort((a,b)=>a<b?1:-1).map(day=>({day,rows:m[day]}));
  }, [deliveries]);

  return (
    <div>
      {/* ── Sélecteur de vue Labo ─────────────────────── */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["saisie","➕","Saisie"],["dashboard","📊","Tableau du jour"]].map(([v,ic,lab])=>(
          <button key={v} type="button" onClick={()=>setLaboView(v)}
            style={{
              flex:1, padding:"11px 8px", borderRadius:10, border:"none", cursor:"pointer",
              background: laboView===v ? "var(--ink)" : "var(--chalk)",
              color: laboView===v ? "#fff" : "var(--muted)",
              fontWeight: laboView===v ? 700 : 500, fontSize:13,
              display:"flex", alignItems:"center", justifyContent:"center", gap:6, minHeight:44,
              transition:"all .15s",
            }}>
            <span>{ic}</span><span>{lab}</span>
          </button>
        ))}
      </div>

      {/* ══════════ VUE DASHBOARD ══════════ */}
      {laboView==="dashboard" && (() => {
        const dashDate = date;
        const dayRows = deliveries.filter(d => d.date === dashDate);

        // Totaux par produit (quantités nettes, retours déduits)
        const byProduct = {};
        dayRows.forEach(r => {
          if (!byProduct[r.productId]) byProduct[r.productId] = { name:r.productName, qty:0, category:products.find(p=>p.id===r.productId)?.category||"" };
          byProduct[r.productId].qty += netQty(r);
        });
        // Trier par catégorie puis par nom
        const catOrder = ["Viennoiserie","Cake & Biscuit","Salée","Gâteau français","Autres"];
        const prodLines = Object.values(byProduct)
          .filter(p=>p.qty>0)
          .sort((a,b)=>{
            const ci = catOrder.indexOf(a.category) - catOrder.indexOf(b.category);
            return ci!==0 ? ci : a.name.localeCompare(b.name,"fr");
          });

        // Totaux par chauffeur
        const byChauffeur = {};
        dayRows.forEach(r => {
          if(!byChauffeur[r.driver]) byChauffeur[r.driver] = { name:driverLabel(r.driver,drivers), clients:{} };
          if(!byChauffeur[r.driver].clients[r.clientId]) byChauffeur[r.driver].clients[r.clientId] = { name:r.clientName, lines:[] };
          byChauffeur[r.driver].clients[r.clientId].lines.push(r);
        });

        const grandTotal = dayRows.reduce((s,r)=>s+lineTotal(r),0);
        const totalQty   = prodLines.reduce((s,p)=>s+p.qty,0);

        const printDashboard = () => {
          const w = window.open("","_blank","width=800,height=700");
          const biz = settings.business || "Pâtisserie";
          // Grouper par catégorie pour l'impression
          const cats = {};
          prodLines.forEach(p=>{ (cats[p.category]=cats[p.category]||[]).push(p); });
          const catBlocks = catOrder.filter(c=>cats[c]).map(c=>`
            <div class="cat-block">
              <div class="cat-title">${c}</div>
              ${cats[c].map(p=>`<div class="prod-row"><span class="prod-name">${p.name}</span><span class="prod-qty">${p.qty}</span></div>`).join("")}
            </div>
          `).join("");
          w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
            <title>Fabrication ${dashDate}</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:Arial,sans-serif;font-size:13px;color:#111;padding:20px}
              h1{font-size:18px;margin-bottom:4px} .sub{font-size:12px;color:#666;margin-bottom:16px}
              .cat-block{margin-bottom:14px}
              .cat-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;
                border-bottom:2px solid #111;padding-bottom:3px;margin-bottom:6px;color:#333}
              .prod-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
              .prod-name{flex:1}
              .prod-qty{font-weight:700;min-width:40px;text-align:right;font-size:15px}
              .total-row{display:flex;justify-content:space-between;padding:8px 0;font-weight:700;font-size:14px;border-top:2px solid #111;margin-top:8px}
              @media print{@page{margin:1cm}}
            </style></head><body>
            <h1>Bon de Fabrication — ${biz}</h1>
            <div class="sub">Date : ${new Date(dashDate+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
            ${catBlocks}
            <div class="total-row"><span>TOTAL PIÈCES</span><span>${totalQty}</span></div>
            <script>window.onload=()=>{window.print();}<\/script>
            </body></html>`);
          w.document.close();
        };

        return (
          <div>
            {/* En-tête date + bouton imprimer */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{...serif,fontSize:18,color:"var(--ink)",fontWeight:600}}>Tableau du jour</div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:2,textTransform:"capitalize"}}>{dateFR(dashDate)}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <input type="date" style={{...input,width:"auto",padding:"8px 10px"}} value={dashDate} onChange={e=>setDate(e.target.value)}/>
                <button style={{...btn,background:"var(--wheat)"}} onClick={printDashboard} disabled={!prodLines.length}>
                  <Printer size={15}/> Imprimer
                </button>
              </div>
            </div>

            {!prodLines.length && (
              <div style={{textAlign:"center",padding:"32px 16px",color:"var(--muted)",background:"var(--chalk)",borderRadius:12}}>
                Aucune sortie enregistrée pour ce jour.
              </div>
            )}

            {prodLines.length > 0 && (
              <>
                {/* KPIs résumé */}
                <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                  <KPI label="Total pièces" value={totalQty} sub="toutes catégories"/>
                  <KPI label="Produits distincts" value={Object.keys(byProduct).length}/>
                  <KPI label="Valeur totale" value={money(grandTotal,currency)} tone="green"/>
                </div>

                {/* Tableau produits par catégorie */}
                {catOrder.filter(cat=>prodLines.some(p=>p.category===cat)).map(cat => (
                  <div key={cat} style={{marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",marginBottom:6,borderBottom:"2px solid var(--wheat)"}}>
                      <span style={{fontSize:16}}>{(CATEGORY_META[cat]||CATEGORY_META["Autres"]).emoji}</span>
                      <span style={{fontWeight:700,color:"var(--wheat)",fontSize:13,textTransform:"uppercase",letterSpacing:".04em"}}>{cat}</span>
                    </div>
                    {prodLines.filter(p=>p.category===cat).map(p=>(
                      <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--line)"}}>
                        <span style={{fontSize:14,color:"var(--ink)"}}>{p.name}</span>
                        <span style={{fontWeight:800,fontSize:18,fontVariantNumeric:"tabular-nums",color:"var(--ink)",minWidth:48,textAlign:"right"}}>{p.qty}</span>
                      </div>
                    ))}
                  </div>
                ))}

                {/* Total général */}
                <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:"2px solid var(--ink)",marginTop:4}}>
                  <span style={{fontWeight:700,color:"var(--ink)",fontSize:15}}>TOTAL PIÈCES</span>
                  <span style={{fontWeight:800,fontSize:22,fontVariantNumeric:"tabular-nums",color:"var(--ink)"}}>{totalQty}</span>
                </div>

                {/* Répartition par chauffeur */}
                <div style={{marginTop:16}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Par chauffeur</div>
                  {Object.values(byChauffeur).map(drv=>{
                    const drvTotal = Object.values(drv.clients).flatMap(c=>c.lines).reduce((s,r)=>s+lineTotal(r),0);
                    return (
                      <div key={drv.name} style={{border:"1px solid var(--line)",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
                        <div style={{background:"var(--chalk)",padding:"10px 14px",display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontWeight:700,color:"var(--ink)"}}>{drv.name}</span>
                          <span style={{fontWeight:700,color:"var(--wheat)"}}>{money(drvTotal,currency)}</span>
                        </div>
                        {Object.values(drv.clients).map(cl=>{
                          const clTotal = cl.lines.reduce((s,r)=>s+lineTotal(r),0);
                          const clQty = cl.lines.reduce((s,r)=>s+netQty(r),0);
                          return (
                            <div key={cl.name} style={{padding:"8px 14px",borderTop:"1px solid var(--line)",display:"flex",justifyContent:"space-between",fontSize:13}}>
                              <span style={{color:"var(--ink)"}}>{cl.name}</span>
                              <span style={{color:"var(--muted)"}}>{clQty} pcs · {money(clTotal,currency)}</span>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        );
      })()}

      {/* ══════════ VUE SAISIE ══════════ */}
      {laboView==="saisie" && (
      <div>

      {/* ---------- COMMANDES RAPIDES ---------- */}
      <Section title="Commandes rapides J-7" icon={<RotateCcw size={18}/>}>
        <p style={{fontSize:13,color:"var(--muted)",margin:"0 0 10px"}}>
          Reprend automatiquement la commande du même jour il y a 7 jours (ou 14 si aucune commande la semaine dernière). Ajustez les quantités puis ajoutez au brouillon.
        </p>
        {!clients.some(c => refOrderByClient[c.id]) ? (
          <div style={{textAlign:"center",padding:"20px 12px",background:"var(--chalk)",borderRadius:10,color:"var(--muted)",fontSize:13}}>
            Aucune commande trouvée le {(()=>{const d=new Date(date+"T00:00:00");d.setDate(d.getDate()-6);return dateFR(d.toISOString().slice(0,10));})()}
            {" "}ni le {(()=>{const d=new Date(date+"T00:00:00");d.setDate(d.getDate()-13);return dateFR(d.toISOString().slice(0,10));})()}.
            <br/>Cette section se remplira automatiquement une fois que vous aurez 6 jours d'historique.
          </div>
        ) : clients.filter(c => refOrderByClient[c.id]).map(c => {
          const last  = refOrderByClient[c.id];
          const open  = !!reorderQtys[c.id];
          const drName = driverLabel(c.driver, drivers);
          const t13 = (()=>{const d=new Date(date+"T00:00:00");d.setDate(d.getDate()-13);return d.toISOString().slice(0,10);})();
          // Dédupliquer les lignes par produit (somme des quantités)
          const dedupLines = Object.values(
            last.lines.reduce((acc, l) => {
              if (!acc[l.productId]) acc[l.productId] = {...l, quantity: 0};
              acc[l.productId].quantity += Number(l.quantity) || 0;
              return acc;
            }, {})
          );
          return (
            <div key={c.id} style={{border:"1px solid var(--line)",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"var(--chalk)"}}>
                <div>
                  <div style={{fontWeight:700,color:"var(--ink)"}}>{c.name}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{drName} · réf. {dateFR(last.date)}{last.date === t13 ? " (J-13)" : " (J-6)"}</div>
                </div>
                <button style={{...btn,padding:"7px 12px",fontSize:12,background:open?C.muted:C.wheat}}
                  onClick={() => open ? setReorderQtys(p=>{const n={...p};delete n[c.id];return n;}) : openReorder(c.id)}>
                  <RotateCcw size={13}/> {open ? "Annuler" : "Reprendre"}
                </button>
              </div>
              {open && (
                <div style={{padding:"10px 12px"}}>
                  {dedupLines.map(l => {
                    const unitPr = getUnitPrice(c.id, l.productId, clientPrices, products);
                    const q = reorderQtys[c.id]?.[l.productId] ?? l.quantity;
                    const tot = (Number(q)||0)*unitPr;
                    return (
                      <div key={l.productId} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid var(--line)"}}>
                        <div style={{flex:1,fontSize:14,color:"var(--ink)"}}>
                          {l.productName}
                          <span style={{fontSize:12,color:"var(--muted)",marginLeft:6}}>({money(unitPr,currency)})</span>
                        </div>
                        <input type="number" min="0" style={{...input,width:72,padding:"7px 8px",textAlign:"center"}}
                          value={q}
                          onChange={e=>setReorderQtys(prev=>({...prev,[c.id]:{...prev[c.id],[l.productId]:e.target.value}}))}/>
                        <span style={{fontWeight:600,color:"var(--ink)",minWidth:64,textAlign:"right"}}>{money(tot,currency)}</span>
                      </div>
                    );
                  })}
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
                    <button style={{...btn,background:"var(--sage)"}} onClick={()=>addReorder(c.id)}>
                      <Plus size={15}/> Ajouter au brouillon
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </Section>

      {/* ---------- SAISIE MANUELLE ---------- */}
      <Section title="Nouvelle sortie de viennoiserie" icon={<Plus size={18}/>}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1 / -1"}}>
            <label style={label}>Jour</label>
            <input type="date" style={input} value={date} onChange={e=>setDate(e.target.value)}/>
          </div>
          <div style={{gridColumn:"1 / -1"}}>
            <label style={label}>Client (pâtisserie)</label>
            <select style={input} value={clientId}
              onChange={e=>{ setClientId(e.target.value); if(e.target.value && onRefreshPrices) onRefreshPrices(); }}>
              <option value="">— Choisir —</option>
              {clients.map(c=><option key={c.id} value={c.id}>{c.name} · {driverLabel(c.driver,drivers)}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"1 / -1"}}>
            <label style={label}>Produit</label>
            {client ? (
              <ProductPicker products={products} currency={currency} value={productId} onChange={setProductId}
                getPrice={pid=>getUnitPrice(client.id, pid, clientPrices, products)}/>
            ) : (
              <p style={{fontSize:13,color:"var(--muted)",margin:0,padding:"10px 12px",background:"var(--chalk)",borderRadius:10}}>
                Choisissez d'abord un client ci-dessus.
              </p>
            )}
          </div>
          <div>
            <label style={label}>Quantité</label>
            <input
              ref={qtyRef}
              type="number" min="1" style={input} value={qty}
              onChange={e=>setQty(e.target.value)}
              onFocus={e=>e.target.select()}
              onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addLine(); } }}
              placeholder="Qté puis Entrée ↵"
            />
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:14,flexWrap:"wrap",gap:10}}>
          <div style={{color:"var(--muted)",fontSize:14}}>Total ligne : <strong style={{color:"var(--ink)"}}>{money(preview,currency)}</strong></div>
          <button style={btn} onClick={addLine}><Plus size={16}/> Ajouter à la liste</button>
        </div>
      </Section>

      <Section title="Sorties à valider" icon={<ChefHat size={18}/>}>
        {!draft.length && <p style={{color:"var(--muted)",margin:0}}>Ajoutez des produits ci-dessus, puis validez en bas.</p>}
        {draft.map(l => (
          <div key={l.tmpId} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--line)"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,color:"var(--ink)"}}>{l.clientName}</div>
              <div style={{fontSize:13,color:"var(--muted)"}}>{l.productName} × {l.quantity} · {dateFR(l.date)}</div>
            </div>
            <div style={{fontWeight:700,color:"var(--ink)",whiteSpace:"nowrap"}}>{money(lineTotal(l),currency)}</div>
            <button style={btnGhost} onClick={()=>setDraft(d=>d.filter(x=>x.tmpId!==l.tmpId))}><Trash2 size={16}/></button>
          </div>
        ))}
        {draft.length>0 && (
          <div style={{marginTop:14,paddingTop:12,borderTop:"2px solid var(--wheat)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{...serif,fontSize:17,color:"var(--ink)",fontWeight:600}}>Total à valider</span>
              <span style={{...serif,fontSize:22,fontWeight:800,color:"var(--wheat)"}}>{money(draftTotal,currency)}</span>
            </div>
            <button style={{...btn,width:"100%",padding:"14px",fontSize:16,background:"var(--sage)",opacity:validating?0.6:1}} onClick={validate} disabled={validating}>
              <Check size={18}/> {validating?"Validation…":"Valider les sorties"}
            </button>
          </div>
        )}
      </Section>

      <Section title="Sorties enregistrées" icon={<ChefHat size={18}/>}>
        {!byDay.some(({day}) => day === date) && <p style={{color:"var(--muted)",margin:0}}>Aucune sortie enregistrée pour cette date.</p>}
        {byDay.filter(({day}) => day === date).map(({day,rows}) => {
          const dayTotal = rows.reduce((s,r)=>s+lineTotal(r),0);
          // Regrouper par client pour ce jour
          const byClient = {};
          rows.forEach(r=>{
            if (!byClient[r.clientId]) byClient[r.clientId]={clientId:r.clientId,clientName:r.clientName,driver:r.driver,rows:[]};
            byClient[r.clientId].rows.push(r);
          });
          return (
            <div key={day} style={{marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",borderBottom:"2px solid var(--wheat)",paddingBottom:6,marginBottom:10}}>
                <span style={{...serif,fontSize:15,color:"var(--wheat)",fontWeight:600,textTransform:"capitalize"}}>{dateFR(day)}</span>
                <span style={{fontWeight:700,color:"var(--ink)"}}>{money(dayTotal,currency)}</span>
              </div>
              {Object.values(byClient).map(g => {
                const clientTotal = g.rows.reduce((s,r)=>s+lineTotal(r),0);
                const drName = driverLabel(g.driver,drivers);
                const detailKey = `${day}-${g.clientId}`;
                const showDetail = expandedDetails.has(detailKey);

                // Agrégation par produit
                const aggMap = {};
                g.rows.forEach(r => {
                  if (!aggMap[r.productId]) aggMap[r.productId] = { productName:r.productName, totalQty:0, totalNet:0, totalReturned:0, totalValue:0 };
                  aggMap[r.productId].totalQty      += Number(r.quantity)||0;
                  aggMap[r.productId].totalNet      += netQty(r);
                  aggMap[r.productId].totalReturned += Number(r.returnedQty)||0;
                  aggMap[r.productId].totalValue    += lineTotal(r);
                });
                const aggRows = Object.values(aggMap);

                return (
                  <div key={g.clientId} style={{border:"1px solid var(--line)",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
                    {/* Entête client */}
                    <div style={{background:"var(--chalk)",padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:700,color:"var(--ink)",fontSize:15}}>{g.clientName}</div>
                        <div style={{fontSize:12,color:"var(--muted)"}}>{drName}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontWeight:700,color:"var(--ink)"}}>{money(clientTotal,currency)}</span>
                        <button style={{...btnGhost,fontSize:12,padding:"5px 8px",color:showDetail?"var(--wheat)":"var(--muted)",border:"1px solid var(--line)",borderRadius:8}}
                          onClick={()=>toggleDetail(detailKey)} title={showDetail?"Masquer le détail":"Modifier / voir le détail"}>
                          <Settings size={13}/> {showDetail ? "Fermer" : "Modifier"}
                        </button>
                        <button style={{...btn,padding:"7px 10px",fontSize:12,background:"var(--wheat)",color:"#fff"}}
                          onClick={()=>openBon(g.clientName,drName,g.rows)}>
                          <FileText size={14}/> Bon
                        </button>
                      </div>
                    </div>

                    {/* Vue agrégée (par défaut) */}
                    {!showDetail && aggRows.map((agg, i) => (
                      <div key={agg.productName} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderTop:"1px solid var(--line)"}}>
                        <div style={{flex:1,fontSize:13,color:"var(--ink)"}}>
                          {agg.productName}
                          <span style={{color:"var(--muted)",marginLeft:4}}>× {agg.totalQty}</span>
                          {agg.totalReturned > 0 && (
                            <span style={{color:"var(--coral)",fontSize:12,marginLeft:6}}>
                              − {agg.totalReturned} retourné{agg.totalReturned>1?"s":""} → net {agg.totalNet}
                            </span>
                          )}
                        </div>
                        <div style={{fontSize:13,fontWeight:600,color:"var(--ink)",whiteSpace:"nowrap"}}>{money(agg.totalValue,currency)}</div>
                      </div>
                    ))}

                    {/* Vue détaillée (lignes individuelles avec actions) */}
                    {showDetail && g.rows.map(r=>{
                      const isEditing = editingId === r.id;
                      const isReturning = returningId === r.id;
                      const net = netQty(r);
                      const hasReturn = (Number(r.returnedQty)||0) > 0;
                      const remaining = Math.max(0, (Number(r.quantity)||0) - (Number(r.returnedQty)||0));
                      const lineReturns = returnsFor(r.id);
                      return (
                        <div key={r.id} style={{borderTop:"1px solid var(--line)",background:"rgba(245,242,235,0.5)"}}>
                          {!isEditing && !isReturning && (
                            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px"}}>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:13,color:"var(--ink)"}}>
                                  {r.productName} <span style={{color:"var(--muted)"}}>× {r.quantity}</span>
                                  {hasReturn && (
                                    <span style={{color:"var(--coral)",fontSize:12,marginLeft:6}}>
                                      − {r.returnedQty} retourné{r.returnedQty>1?"s":""} → net {net}
                                    </span>
                                  )}
                                </div>
                              </div>
                              <div style={{fontSize:13,fontWeight:600,color:"var(--ink)",whiteSpace:"nowrap"}}>{money(lineTotal(r),currency)}</div>
                              <button style={btnGhost} onClick={()=>startEditLine(r)} title="Modifier"><Settings size={15}/></button>
                              <button style={{...btnGhost,color:"var(--coral)"}} onClick={()=>startReturn(r)} title="Enregistrer un retour" disabled={remaining<=0}>
                                <RotateCcw size={15}/>
                              </button>
                              <button style={btnGhost} onClick={()=>setConfirmDelId(r.id)} title="Supprimer"><Trash2 size={15}/></button>
                            </div>
                          )}

                          {confirmDelId === r.id && (
                            <div style={{padding:"10px 12px",background:"var(--coral-lt)",borderTop:"1px solid rgba(200,75,60,.2)"}}>
                              <p style={{fontSize:13,color:"var(--coral)",fontWeight:600,margin:"0 0 8px"}}>Supprimer cette ligne ({r.productName} × {r.quantity}) ?</p>
                              <div style={{display:"flex",gap:8}}>
                                <button style={{...btn,flex:1,background:"var(--coral)"}} onClick={()=>{onDelete(r.id);setConfirmDelId(null);}}><Trash2 size={15}/> Confirmer</button>
                                <button style={{...btn,flex:1,background:"#fff",color:"var(--ink)",border:"1px solid var(--line)"}} onClick={()=>setConfirmDelId(null)}>Annuler</button>
                              </div>
                            </div>
                          )}

                          {isEditing && (
                            <div style={{padding:"12px",background:"var(--chalk)"}}>
                              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                                <div style={{gridColumn:"1 / -1"}}>
                                  <label style={label}>Jour</label>
                                  <input type="date" style={input} value={editDraft.date} onChange={e=>setEditDraft({...editDraft,date:e.target.value})}/>
                                </div>
                                <div style={{gridColumn:"1 / -1"}}>
                                  <label style={label}>Produit</label>
                                  <ProductPicker products={products} currency={currency} value={editDraft.productId}
                                    onChange={pid=>setEditDraft({...editDraft,productId:pid})}
                                    getPrice={editDraft.clientId ? (pid=>getUnitPrice(editDraft.clientId, pid, clientPrices, products)) : undefined}/>
                                </div>
                                <div>
                                  <label style={label}>Quantité</label>
                                  <input type="number" min="1" style={input} value={editDraft.quantity} onChange={e=>setEditDraft({...editDraft,quantity:e.target.value})}/>
                                </div>
                              </div>
                              <div style={{display:"flex",gap:8}}>
                                <button style={{...btn,flex:1,background:"var(--sage)"}} onClick={()=>saveEditLine(r)}><Check size={15}/> Enregistrer</button>
                                <button style={{...btn,flex:1,background:"#fff",color:"var(--ink)",border:"1px solid var(--line)"}} onClick={cancelEditLine}>Annuler</button>
                              </div>
                            </div>
                          )}

                          {isReturning && (
                            <div style={{padding:"12px",background:"var(--coral-lt)"}}>
                              <p style={{fontSize:13,color:"var(--ink)",margin:"0 0 8px"}}>
                                Retour sur <strong>{r.productName}</strong> — {remaining} disponible{remaining>1?"s":""} à retourner sur {r.quantity} livré{r.quantity>1?"s":""}.
                              </p>
                              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                                <div>
                                  <label style={label}>Quantité retournée</label>
                                  <input type="number" min="1" max={remaining} style={input} value={returnQty} onChange={e=>{setReturnQty(e.target.value);setReturnError("");}}/>
                                </div>
                                <div>
                                  <label style={label}>Motif (optionnel)</label>
                                  <input type="text" style={input} placeholder="ex. abîmé, périmé..." value={returnReason} onChange={e=>setReturnReason(e.target.value)}/>
                                </div>
                              </div>
                              {returnError && <p style={{color:"var(--coral)",fontSize:13,fontWeight:600,margin:"0 0 8px"}}>{returnError}</p>}
                              <div style={{display:"flex",gap:8}}>
                                <button style={{...btn,flex:1,background:"var(--coral)"}} onClick={()=>submitReturn(r)}><RotateCcw size={15}/> Enregistrer le retour</button>
                                <button style={{...btn,flex:1,background:"#fff",color:"var(--ink)",border:"1px solid var(--line)"}} onClick={cancelReturn}>Annuler</button>
                              </div>
                            </div>
                          )}

                          {lineReturns.length>0 && !isReturning && (
                            <div style={{padding:"6px 12px 8px",background:"var(--coral-lt)"}}>
                              {lineReturns.map(ret=>(
                                <div key={ret.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,color:"var(--coral)",padding:"3px 0"}}>
                                  <span>↩ {ret.quantity} retourné{ret.quantity>1?"s":""}{ret.reason?` · ${ret.reason}`:""} · {dateFR(ret.date)}</span>
                                  <button style={{...btnGhost,minHeight:24,minWidth:24,padding:2}} onClick={()=>onDeleteReturn(ret.id)} title="Annuler ce retour"><X size={12}/></button>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          );
        })}
      </Section>

      </div>
      )} {/* fin VUE SAISIE */}

      {/* Modal bon de livraison */}
      {bon && <BonLivraison bon={bon} settings={settings} currency={currency} onClose={()=>setBon(null)}/>}
    </div>
  );
}

/* ===================== CHAUFFEUR ===================== */
function Chauffeur({ driver, drivers, deliveries, payments, settings, currency, onReplacePayments, returns }) {
  const [date,       setDate]       = useState(today());
  const [amts,       setAmts]       = useState({});
  const [saved,      setSaved]      = useState(false);
  const [confirming, setConfirming] = useState(false);
  const [bon,        setBon]        = useState(null);

  const groups = useMemo(() => {
    const mine = deliveries.filter(d => d.driver===driver && d.date===date);
    const m = {};
    mine.forEach(d => { (m[d.clientId]=m[d.clientId]||{clientId:d.clientId,clientName:d.clientName,rows:[]}).rows.push(d); });
    return Object.values(m);
  }, [deliveries, driver, date]);

  useEffect(() => {
    const next = {};
    payments.filter(p=>p.date===date&&p.driver===driver).forEach(p=>{
      next[p.clientId] = String((Number(next[p.clientId])||0)+(Number(p.amount)||0));
    });
    setAmts(next);
  }, [date, driver, payments]);

  useEffect(() => { setSaved(false); setConfirming(false); }, [date, driver]);

  const typedVal = (cid) => {
    const raw = amts[cid];
    return (raw!==undefined && raw!=="") ? (parseFloat(raw)||0) : 0;
  };

  const totals = groups.reduce((acc,g) => {
    acc.exp += g.rows.reduce((s,r)=>s+lineTotal(r),0);
    acc.col += typedVal(g.clientId);
    return acc;
  }, {exp:0,col:0});
  const ecartTot = totals.col - totals.exp;
  const exactTot = Math.abs(ecartTot)<=0.0001;
  const regledCount = groups.filter(g => amts[g.clientId]!==undefined && amts[g.clientId]!=="").length;

  const validateTour = () => {
    const others = payments.filter(p=>!(p.date===date&&p.driver===driver));
    const mine   = [];
    groups.forEach(g=>{
      const raw = amts[g.clientId];
      if (raw!==undefined&&raw!=="") mine.push({id:uid(),date,clientId:g.clientId,clientName:g.clientName,driver,amount:parseFloat(raw)||0});
    });
    onReplacePayments([...others,...mine]);
    setSaved(true);
  };

  return (
    <div>
      <Section title={driverLabel(driver,drivers)} icon={<Truck size={18}/>}
        right={<input type="date" style={{...input,width:"auto",padding:"8px 10px"}} value={date} onChange={e=>setDate(e.target.value)}/>}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <KPI label="Rempli (Labo)"  value={money(totals.exp,currency)}/>
          <KPI label="Récupéré"       value={money(totals.col,currency)} tone="green"/>
          <KPI label="Écart" value={`${ecartTot>=0?"+":"−"}${money(Math.abs(ecartTot),currency)}`} tone={exactTot?"green":"red"}/>
        </div>
        {groups.length > 0 && (
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"1px solid var(--line)"}}>
            <span style={{fontSize:13,color:regledCount===groups.length?"var(--sage)":"var(--muted)",fontWeight:regledCount===groups.length?700:400}}>
              {regledCount===groups.length ? "✅ Tous les clients réglés" : `${regledCount}/${groups.length} clients réglés`}
            </span>
            <button style={{...btn,padding:"7px 14px",fontSize:12,background:"var(--sage)"}}
              onClick={()=>{
                const next={};
                groups.forEach(g=>{next[g.clientId]=String(g.rows.reduce((s,r)=>s+lineTotal(r),0).toFixed(3));});
                setAmts(prev=>({...prev,...next}));
                setSaved(false);
              }}>
              ✓ Tout régler
            </button>
          </div>
        )}
      </Section>

      {!groups.length ? (
        <Section title="Tournée du jour" icon={<Wallet size={18}/>}>
          <p style={{color:"var(--muted)",margin:0}}>Aucune livraison pour cette date.</p>
        </Section>
      ) : (
        <>
          {groups.map(g => {
            const exp    = g.rows.reduce((s,r)=>s+lineTotal(r),0);
            const col    = typedVal(g.clientId);
            const ecart  = col-exp;
            const filled = amts[g.clientId]!==undefined&&amts[g.clientId]!=="";
            const exact  = Math.abs(ecart)<=0.0001;
            const drName = driverLabel(driver,drivers);
            return (
              <div key={g.clientId} style={{...cardBox,marginBottom:14,borderLeft:`5px solid ${!filled?C.wheat:exact?C.green:C.red}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <h3 style={{...serif,margin:0,fontSize:18,color:"var(--ink)"}}>{g.clientName}</h3>
                  <button style={{...btn,padding:"6px 10px",fontSize:12,background:"var(--wheat)"}}
                    onClick={()=>{const bonNum=`BL-${date.replace(/-/g,"")}-${g.clientName.slice(0,3).toUpperCase()}`;setBon({date,driverName:drName,clientName:g.clientName,lines:g.rows,bonNum});}}>
                    <FileText size={13}/> Bon
                  </button>
                </div>
                {sortByBase(g.rows).map(r=>{
                  const rQty = Number(r.returnedQty)||0;
                  const net  = netQty(r);
                  return (
                  <div key={r.id} style={{padding:"4px 0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:14,color:"var(--muted)"}}>
                      <span>
                        {r.productName}
                        {rQty>0
                          ? <><span style={{color:"var(--coral)"}}> × {r.quantity}</span><span style={{color:"var(--sage)"}}> → net {net}</span></>
                          : <span> × {r.quantity}</span>}
                      </span>
                      <span style={{color:"var(--wheat)",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{money(lineTotal(r),currency)}</span>
                    </div>
                    {rQty>0 && (
                      <div style={{fontSize:12,color:"var(--coral)",paddingLeft:4}}>
                        ↩ {rQty} article{rQty>1?"s":""} retourné{rQty>1?"s":""} — déduit du total
                      </div>
                    )}
                  </div>
                );})}
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:"var(--ink)",borderTop:"1px solid var(--line)",marginTop:6,paddingTop:6}}>
                  <span>Dû (après retours)</span><span>{money(exp,currency)}</span>
                </div>
                <div style={{marginTop:10}}>
                  <label style={label}>Argent récupéré</label>
                  <input type="number" min="0" placeholder={fmt(exp)} style={input}
                    value={amts[g.clientId]??""} onChange={e=>{setAmts(a=>({...a,[g.clientId]:e.target.value}));setSaved(false);}}/>
                </div>
                {filled && (
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:15,marginTop:8,paddingTop:8,borderTop:"1px dashed var(--line)"}}>
                    <span style={{fontWeight:700,color:"var(--ink)"}}>Écart</span>
                    {exact
                      ? <span style={{fontWeight:800,color:"var(--sage)",display:"inline-flex",alignItems:"center",gap:4}}><Check size={15}/> Réglé</span>
                      : <span style={{fontWeight:800,color:"var(--coral)"}}>{ecart<0?`Manque ${money(-ecart,currency)}`:`En plus ${money(ecart,currency)}`}</span>}
                  </div>
                )}
              </div>
            );
          })}

          <div style={{...cardBox,borderTop:"3px solid var(--wheat)"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:14,padding:"2px 0",color:"var(--muted)"}}>
              <span>Total rempli (Labo)</span><span style={{color:"var(--ink)",fontWeight:600}}>{money(totals.exp,currency)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:14,padding:"2px 0",color:"var(--muted)"}}>
              <span>Total récupéré</span><span style={{color:"var(--sage)",fontWeight:600}}>{money(totals.col,currency)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:17,padding:"6px 0",borderTop:"1px dashed var(--line)",marginTop:4}}>
              <span style={{...serif,fontWeight:700,color:"var(--ink)"}}>Écart total</span>
              <span style={{...serif,fontWeight:800,color:exactTot?C.green:C.red}}>
                {exactTot?money(0,currency):`${ecartTot>=0?"+":"−"}${money(Math.abs(ecartTot),currency)}`}
              </span>
            </div>
            {confirming ? (
              <div style={{marginTop:12}}>
                <p style={{fontSize:13,color:"var(--muted)",margin:"0 0 8px"}}>
                  Confirmer l'encaissement de {money(totals.col,currency)} pour cette tournée ?
                </p>
                <div style={{display:"flex",gap:8}}>
                  <button style={{...btn,flex:1,background:"var(--sage)",padding:"13px"}} onClick={()=>{validateTour();setConfirming(false);}}>
                    <Check size={17}/> Confirmer
                  </button>
                  <button style={{...btn,flex:1,background:"var(--surface)",color:"var(--wheat)",border:"1px solid var(--line)",padding:"13px"}} onClick={()=>setConfirming(false)}>
                    Annuler
                  </button>
                </div>
              </div>
            ) : (
              <button style={{...btn,width:"100%",padding:"14px",fontSize:16,marginTop:12,background:saved?C.green:C.brown}}
                onClick={()=>saved?setSaved(false):setConfirming(true)}>
                <Check size={18}/> {saved?"Tournée validée ✓ — Modifier":"Valider la tournée"}
              </button>
            )}
          </div>
        </>
      )}
      {bon && <BonLivraison bon={bon} settings={settings} currency={currency} onClose={()=>setBon(null)}/>}
    </div>
  );
}

/* ===================== PROPRIÉTAIRE ===================== */
function Owner({ deliveries, payments, products, clients, drivers, settings, reports, setProducts, setClients, setDrivers, setSettings, currency, onRestore, setDeliveries, returns, onAddReturn, onDeleteReturn, clientPrices, setClientPrices, saveClientPricesBatch, onRepairPrices }) {
  const [tab,    setTab]    = useState("dash");
  const [filter, setFilter] = useState("all");

  const allDates = useMemo(()=>[...new Set(deliveries.map(d=>d.date))].sort((a,b)=>a<b?1:-1),[deliveries]);
  const getWeekStart  = () => { const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toISOString().slice(0,10); };
  const getMonthStart = () => new Date().toISOString().slice(0,8)+"01";
  const applyFilter = (items, key) => {
    if (filter==="all")   return items;
    if (filter==="week")  return items.filter(x=>x[key]>=getWeekStart());
    if (filter==="month") return items.filter(x=>x[key]>=getMonthStart());
    return items.filter(x=>x[key]===filter);
  };
  const fd = applyFilter(deliveries,"date");
  const fp = applyFilter(payments,"date");

  // CORRECTION : qtyOut utilise netQty (quantité livrée − retournée), pas la quantité brute
  const qtyOut    = fd.reduce((s,d)=>s+netQty(d),0);
  const qtyReturned = fd.reduce((s,d)=>s+(Number(d.returnedQty)||0),0);
  const valueOut  = fd.reduce((s,d)=>s+lineTotal(d),0);
  const collected = fp.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const manque    = valueOut - collected;

  // Helper : retours liés à une livraison
  const returnsFor = (deliveryId) => (returns||[]).filter(r => r.livraisonId === deliveryId);

  const perDriver = drivers.map(dr=>{
    const exp = fd.filter(d=>d.driver===dr.id).reduce((s,d)=>s+lineTotal(d),0);
    const col = fp.filter(p=>p.driver===dr.id).reduce((s,p)=>s+(Number(p.amount)||0),0);
    return {...dr, exp, col, manque:exp-col};
  });

  const perClient = useMemo(()=>{
    const m = {};
    fd.forEach(d=>{ m[d.clientId]=m[d.clientId]||{name:d.clientName,driver:d.driver,exp:0,col:0}; m[d.clientId].exp+=lineTotal(d); });
    fp.forEach(p=>{ m[p.clientId]=m[p.clientId]||{name:p.clientName,driver:p.driver,exp:0,col:0}; m[p.clientId].col+=Number(p.amount)||0; });
    return Object.values(m).map(x=>({...x,manque:x.exp-x.col}));
  },[fd,fp]);

  const alerts = perClient.filter(x=>x.manque>0.0001);

  /* ---- Onglet Commandes : édition d'une livraison existante ou nouvelle ---- */
  const [orderFilter,         setOrderFilter]         = useState("all");
  const [selectedPriceClient,  setSelectedPriceClient]  = useState("");
  const [showAllPriceProducts, setShowAllPriceProducts] = useState(false);
  // Brouillon local des tarifs (saisie fluide, décimales OK) : { productId: "chaîne saisie" }
  const [priceDrafts,  setPriceDrafts]  = useState({});
  const [pricesDirty,  setPricesDirty]  = useState(false);
  const [savingPrices, setSavingPrices] = useState(false);

  // Prix décimal tolérant : accepte la virgule ou le point (ex: "2,5" ou "2.5")
  const parsePrice = (s) => { const n = parseFloat(String(s).replace(",", ".")); return isFinite(n) ? n : 0; };

  // (Re)charge le brouillon quand on change de client ou après un enregistrement réussi.
  // Si une saisie est en cours (pricesDirty), on ne touche à RIEN : la synchronisation
  // automatique des tarifs (multi-appareils) ne doit jamais écraser un brouillon.
  useEffect(() => {
    if (pricesDirty) return;
    if (!selectedPriceClient) { setPriceDrafts({}); return; }
    const drafts = {};
    (clientPrices||[]).filter(pc => pc.clientId===selectedPriceClient)
      .forEach(pc => { drafts[pc.productId] = String(pc.prix); });
    setPriceDrafts(drafts);
  }, [selectedPriceClient, clientPrices, pricesDirty]);

  // Changer de client abandonne le brouillon en cours (comportement volontaire).
  useEffect(() => { setPricesDirty(false); }, [selectedPriceClient]);

  // Enregistre TOUS les tarifs modifiés du client en une seule fois.
  // En cas d'échec réseau/serveur, l'indicateur « non enregistrées » reste affiché.
  const handleSaveAllPrices = async () => {
    if (!selectedPriceClient || savingPrices) return;
    const prevPids = (clientPrices||[]).filter(pc => pc.clientId===selectedPriceClient).map(pc => pc.productId);
    const pids = new Set([...Object.keys(priceDrafts), ...prevPids]);
    const items = [...pids].map(pid => ({ productId: pid, prix: parsePrice(priceDrafts[pid]) }));
    setSavingPrices(true);
    try {
      await saveClientPricesBatch(selectedPriceClient, items);
      setPricesDirty(false);
    } catch(e) {
      // échec : on garde le brouillon et l'indicateur rouge, l'utilisateur peut réessayer
    } finally {
      setSavingPrices(false);
    }
  };
  const [editingId,            setEditingId]            = useState(null);
  const [editDraft,   setEditDraft]   = useState(null);
  const [confirmDel,  setConfirmDel]  = useState(null);
  const [newOrder,    setNewOrder]    = useState({ date:today(), clientId:"", productId:"", quantity:1 });

  const orderDates = useMemo(()=>[...new Set(deliveries.map(d=>d.date))].sort((a,b)=>a<b?1:-1),[deliveries]);
  const filteredOrders = useMemo(()=>{
    const list = orderFilter==="all" ? deliveries : deliveries.filter(d=>d.date===orderFilter);
    return [...list].sort((a,b)=> a.date<b.date?1:(a.date>b.date?-1:0));
  },[deliveries,orderFilter]);

  const startEdit = (d) => {
    setEditingId(d.id);
    setEditDraft({ date:d.date, clientId:d.clientId, productId:d.productId, quantity:d.quantity });
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft(null); };
  const saveEdit = (orig) => {
    const client  = clients.find(c=>c.id===editDraft.clientId);
    const product = products.find(p=>p.id===editDraft.productId);
    if (!client || !product || !(Number(editDraft.quantity)>0)) return;
    const next = deliveries.map(d => d.id===orig.id ? {
      ...d, date:editDraft.date, clientId:client.id, clientName:client.name, driver:client.driver,
      productId:product.id, productName:product.name, quantity:Number(editDraft.quantity), unitPrice:product.price,
    } : d);
    setDeliveries(next);
    cancelEdit();
  };
  const removeOrder = (id) => {
    setDeliveries(deliveries.filter(d=>d.id!==id));
    setConfirmDel(null);
  };
  const addOrder = () => {
    const client  = clients.find(c=>c.id===newOrder.clientId);
    const product = products.find(p=>p.id===newOrder.productId);
    if (!client || !product || !(Number(newOrder.quantity)>0)) return;
    const row = {
      id:(Date.now()+Math.random()).toString(36), date:newOrder.date,
      clientId:client.id, clientName:client.name, driver:client.driver,
      productId:product.id, productName:product.name,
      quantity:Number(newOrder.quantity), unitPrice:product.price,
    };
    setDeliveries([...deliveries, row]);
    setNewOrder({ date:newOrder.date, clientId:"", productId:"", quantity:1 });
  };

  /* ---- Réglages locaux ---- */
  const [np, setNp] = useState({name:"",price:"",category:"Viennoiserie"});
  const [nc, setNc] = useState({name:"",driver:drivers[0]?.id||""});
  const [nd, setNd] = useState("");  // nouveau chauffeur

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["dash","Tableau de bord",<LayoutDashboard size={15}/>],["orders","Commandes",<Package size={15}/>],["settings","Réglages",<Settings size={15}/>]].map(([k,lab,ic])=>(
          <button key={k} onClick={()=>setTab(k)} style={{...btn,flex:1,background:tab===k?C.brown:"#fff",color:tab===k?"#fff":C.brown,border:"1px solid var(--line)"}}>
            {ic} {lab}
          </button>
        ))}
      </div>

      {tab==="dash" && (
        <>
          <Section title="Vue d'ensemble" icon={<Crown size={18}/>}
            right={<div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              {[["all","Tout"],["week","Semaine"],["month","Mois"]].map(([v,lab])=>(
                <button key={v} onClick={()=>setFilter(v)} style={{padding:"6px 10px",borderRadius:8,border:"none",background:filter===v?"var(--ink)":"var(--chalk)",color:filter===v?"#fff":"var(--muted)",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                  {lab}
                </button>
              ))}
              <select style={{...input,width:"auto",padding:"7px 10px",fontSize:12}} value={["all","week","month"].includes(filter)?"all":filter} onChange={e=>setFilter(e.target.value)}>
                <option value="all">Date…</option>
                {allDates.map(d=><option key={d} value={d}>{dateFR(d)}</option>)}
              </select>
            </div>}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <KPI label="Quantité nette sortie" value={qtyOut} sub={qtyReturned>0?`dont ${qtyReturned} retourné${qtyReturned>1?"s":""}`:undefined}/>
              <KPI label="Valeur nette labo" value={money(valueOut,currency)} sub={qtyReturned>0?"retours déduits":undefined}/>
              <KPI label="Encaissé chauffeurs" value={money(collected,currency)} tone="green"/>
              <KPI label="Manque" value={money(manque,currency)} tone={manque>0.0001?"red":"green"}/>
            </div>
          </Section>

          {alerts.length>0 && (
            <Section title="À signaler" icon={<AlertTriangle size={18} color={C.red}/>}>
              {alerts.map((a,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",marginBottom:6,background:"var(--coral-lt)",border:"1px solid rgba(200,75,60,.2)",borderRadius:10}}>
                  <div><strong style={{color:"var(--ink)"}}>{a.name}</strong><span style={{color:"var(--muted)",fontSize:13}}> · {driverLabel(a.driver,drivers)}</span></div>
                  <span style={{color:"var(--coral)",fontWeight:700}}>Manque {money(a.manque,currency)}</span>
                </div>
              ))}
            </Section>
          )}

          <Section title="Par chauffeur" icon={<Truck size={18}/>}>
            {perDriver.map(d=>{
              const retQty = fd.filter(liv=>liv.driver===d.id).reduce((s,liv)=>s+(Number(liv.returnedQty)||0),0);
              return (
              <div key={d.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--line)"}}>
                <strong style={{color:"var(--ink)"}}>{d.name}</strong>
                <div style={{textAlign:"right",fontSize:13}}>
                  <div style={{color:"var(--muted)"}}>
                    Sortie {money(d.exp,currency)} · Encaissé {money(d.col,currency)}
                    {retQty>0 && <span style={{color:"var(--coral)"}}> · {retQty} retour{retQty>1?"s":""}</span>}
                  </div>
                  <div style={{color:d.manque>0.0001?C.red:C.green,fontWeight:700}}>
                    {d.manque>0.0001?`Manque ${money(d.manque,currency)}`:"À jour"}
                  </div>
                </div>
              </div>
            );})}
          </Section>

          <Section title="Par client (fournisseurs)" icon={<Users size={18}/>}>
            {!perClient.length && <p style={{color:"var(--muted)",margin:0}}>Aucune donnée.</p>}
            {perClient.map((x,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--line)"}}>
                <div>
                  <div style={{fontWeight:600,color:"var(--ink)"}}>{x.name}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{driverLabel(x.driver,drivers)} · sortie {money(x.exp,currency)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,color:"var(--sage)"}}>{money(x.col,currency)}</div>
                  <div style={{fontSize:13,fontWeight:700,color:x.manque>0.0001?C.red:C.green}}>
                    {x.manque>0.0001?`−${money(x.manque,currency)}`:"OK"}
                  </div>
                </div>
              </div>
            ))}
          </Section>

          {fd.length > 0 && (() => {
            const bySell = {};
            fd.forEach(d => {
              if (!bySell[d.productId]) bySell[d.productId] = { name:d.productName, qty:0, value:0 };
              bySell[d.productId].qty   += netQty(d);
              bySell[d.productId].value += lineTotal(d);
            });
            const sorted = Object.values(bySell).filter(p=>p.qty>0).sort((a,b)=>b.qty-a.qty).slice(0,8);
            if (!sorted.length) return null;
            return (
              <Section title="Produits les plus vendus" icon={<Package size={18}/>}>
                {sorted.map((p,i)=>(
                  <div key={p.name} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid var(--line)"}}>
                    <span style={{fontWeight:800,fontSize:12,color:"var(--muted)",minWidth:22,textAlign:"right"}}>#{i+1}</span>
                    <div style={{flex:1,fontSize:13,color:"var(--ink)",fontWeight:500}}>{p.name}</div>
                    <span style={{background:"var(--wheat)",color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{p.qty} pcs</span>
                    <span style={{fontWeight:600,color:"var(--ink)",fontSize:13,minWidth:72,textAlign:"right"}}>{money(p.value,currency)}</span>
                  </div>
                ))}
              </Section>
            );
          })()}
        </>
      )}

      {tab==="orders" && (
        <>
          <Section title="Ajouter une commande" icon={<Plus size={18}/>}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{gridColumn:"1 / -1"}}>
                <label style={label}>Jour</label>
                <input type="date" style={input} value={newOrder.date} onChange={e=>setNewOrder({...newOrder,date:e.target.value})}/>
              </div>
              <div style={{gridColumn:"1 / -1"}}>
                <label style={label}>Client</label>
                <select style={input} value={newOrder.clientId} onChange={e=>setNewOrder({...newOrder,clientId:e.target.value})}>
                  <option value="">— Choisir —</option>
                  {clients.map(c=><option key={c.id} value={c.id}>{c.name} · {driverLabel(c.driver,drivers)}</option>)}
                </select>
              </div>
              <div style={{gridColumn:"1 / -1"}}>
                <label style={label}>Produit</label>
                {newOrder.clientId ? (
                  <ProductPicker products={products} currency={currency} value={newOrder.productId} onChange={pid=>setNewOrder({...newOrder,productId:pid})}/>
                ) : (
                  <p style={{fontSize:13,color:"var(--muted)",margin:0,padding:"10px 12px",background:"var(--chalk)",borderRadius:10}}>
                    Choisissez d'abord un client ci-dessus.
                  </p>
                )}
              </div>
              <div>
                <label style={label}>Quantité</label>
                <input type="number" min="1" style={input} value={newOrder.quantity} onChange={e=>setNewOrder({...newOrder,quantity:e.target.value})}/>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <button style={{...btn,width:"100%"}} onClick={addOrder}><Plus size={16}/> Ajouter la commande</button>
            </div>
          </Section>

          <Section title="Toutes les commandes" icon={<Package size={18}/>}
            right={<select style={{...input,width:"auto",padding:"8px 10px"}} value={orderFilter} onChange={e=>setOrderFilter(e.target.value)}>
              <option value="all">Toutes les dates</option>
              {orderDates.map(d=><option key={d} value={d}>{dateFR(d)}</option>)}
            </select>}>
            {!filteredOrders.length && <p style={{color:"var(--muted)",margin:0}}>Aucune commande pour ce filtre.</p>}
            {(() => {
              const byDate = {};
              filteredOrders.forEach(d => { (byDate[d.date]=byDate[d.date]||[]).push(d); });
              return Object.keys(byDate).sort((a,b)=>a<b?1:-1).map(day => (
                <div key={day} style={{marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:6,marginBottom:8,borderBottom:"2px solid var(--wheat)"}}>
                    <span style={{...serif,fontSize:14,color:"var(--wheat)",fontWeight:600,textTransform:"capitalize"}}>{dateFR(day)}</span>
                    <span style={{fontSize:12,color:"var(--muted)"}}>{byDate[day].length} ligne{byDate[day].length>1?"s":""} · {money(byDate[day].reduce((s,d)=>s+lineTotal(d),0),currency)}</span>
                  </div>
                  {sortByBase(byDate[day]).map(d => {
                    const isEditing = editingId === d.id;
                    return (
                      <div key={d.id} style={{border:"1px solid var(--line)",borderRadius:12,marginBottom:8,overflow:"hidden"}}>
                        {!isEditing ? (
                          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px"}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontWeight:700,color:"var(--ink)"}}>{d.clientName}</div>
                              <div style={{fontSize:12,color:"var(--muted)"}}>
                                {d.productName} × {netQty(d)}
                                {(Number(d.returnedQty)||0)>0 && <span style={{color:"var(--coral)",fontWeight:600}}> (−{d.returnedQty} retour)</span>}
                                {" "}· {driverLabel(d.driver,drivers)}
                              </div>
                              {returnsFor(d.id).map(rt=>(
                                <div key={rt.id} style={{fontSize:11,color:"var(--coral)",marginTop:2}}>
                                  ↩ {rt.quantity} retourné{rt.quantity>1?"s":""}{rt.reason?` · ${rt.reason}`:""} · {dateFR(rt.date)}
                                </div>
                              ))}
                            </div>
                            <div style={{fontWeight:700,color:"var(--wheat)",whiteSpace:"nowrap",fontVariantNumeric:"tabular-nums",fontSize:15}}>{money(lineTotal(d),currency)}</div>
                            <button style={btnGhost} onClick={()=>startEdit(d)} title="Modifier"><Settings size={15}/></button>
                            <button style={btnGhost} onClick={()=>setConfirmDel(d.id)} title="Supprimer"><Trash2 size={15}/></button>
                          </div>
                        ) : (
                          <div style={{padding:"12px 14px",background:"var(--chalk)"}}>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                              <div style={{gridColumn:"1 / -1"}}>
                                <label style={label}>Jour</label>
                                <input type="date" style={input} value={editDraft.date} onChange={e=>setEditDraft({...editDraft,date:e.target.value})}/>
                              </div>
                              <div style={{gridColumn:"1 / -1"}}>
                                <label style={label}>Client</label>
                                <select style={input} value={editDraft.clientId} onChange={e=>setEditDraft({...editDraft,clientId:e.target.value})}>
                                  {clients.map(c=><option key={c.id} value={c.id}>{c.name} · {driverLabel(c.driver,drivers)}</option>)}
                                </select>
                              </div>
                              <div style={{gridColumn:"1 / -1"}}>
                                <label style={label}>Produit</label>
                                <ProductPicker products={products} currency={currency} value={editDraft.productId} onChange={pid=>setEditDraft({...editDraft,productId:pid})}/>
                              </div>
                              <div>
                                <label style={label}>Quantité</label>
                                <input type="number" min="1" style={input} value={editDraft.quantity} onChange={e=>setEditDraft({...editDraft,quantity:e.target.value})}/>
                              </div>
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              <button style={{...btn,flex:1,background:"var(--sage)"}} onClick={()=>saveEdit(d)}><Check size={15}/> Enregistrer</button>
                              <button style={{...btn,flex:1,background:"#fff",color:"var(--ink)",border:"1px solid var(--line)"}} onClick={cancelEdit}>Annuler</button>
                            </div>
                          </div>
                        )}
                        {confirmDel===d.id && (
                          <div style={{padding:"10px 14px",background:"var(--coral-lt)",borderTop:"1px solid rgba(200,75,60,.2)"}}>

                            </p>
                            <div style={{display:"flex",gap:8}}>
                              <button style={{...btn,flex:1,background:"var(--coral)"}} onClick={()=>removeOrder(d.id)}><Trash2 size={15}/> Confirmer la suppression</button>
                              <button style={{...btn,flex:1,background:"#fff",color:"var(--ink)",border:"1px solid var(--line)"}} onClick={()=>setConfirmDel(null)}>Annuler</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ));
            })()}
          </Section>
        </>
      )}

      {tab==="settings" && (
        <>
          <Section title="Général" icon={<Settings size={18}/>}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div>

                <label style={label}>Monnaie</label>
                <input style={input} value={settings.currency} onChange={e=>setSettings({...settings,currency:e.target.value})}/>

          {/* ---- Sauvegarde de secours ---- */}
          <Section title="Sauvegarde de secours" icon={<Download size={18}/>}>
            <p style={{fontSize:13,color:"var(--muted)",margin:"0 0 12px"}}>
