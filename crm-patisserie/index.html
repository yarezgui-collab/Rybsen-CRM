              livraisons, encaissements, historique, mots de passe). À refaire régulièrement, par exemple chaque fin de semaine.
            </p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button style={{...btn,flex:1,minWidth:160}} onClick={()=>{
                const data = {
                  exportedAt: new Date().toISOString(),
                  version: 1,
                  products, clients, deliveries, payments, reports, settings, clientPrices,
                };
                try {
                  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                  const url  = URL.createObjectURL(blob);
                  const a    = document.createElement("a");
                  a.href = url;
                  a.download = `sauvegarde-patisserie-${today()}.json`;
                  document.body.appendChild(a); a.click(); document.body.removeChild(a);
                  URL.revokeObjectURL(url);
                } catch(e) { alert("Export impossible dans cet environnement."); }
              }}>
                <Download size={16}/> Exporter une sauvegarde
              </button>
              <label style={{...btn,flex:1,minWidth:160,background:"var(--surface)",color:"var(--wheat)",border:"1px solid var(--line)",cursor:"pointer"}}>
                <Upload size={16}/> Restaurer une sauvegarde
                <input type="file" accept=".json,application/json" style={{display:"none"}}
                  onChange={e=>{
                    const f = e.target.files && e.target.files[0];
                    if (!f) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                      try {
                        const data = JSON.parse(ev.target.result);
                        if (!data || !data.products || !data.settings) { alert("Fichier de sauvegarde invalide."); return; }
                        if (!window.confirm(`Restaurer la sauvegarde du ${data.exportedAt ? new Date(data.exportedAt).toLocaleDateString("fr-FR") : "?"} ?\nLes données actuelles seront remplacées.`)) return;
                        onRestore(data);

                  <div style={{flex:1}}>

                    <input style={{...input,padding:"8px 10px",fontSize:13}} value={d.pass||""}

                style={{fontSize:11,padding:"5px 12px",borderRadius:20,border:"1px solid var(--line)",background:"var(--surface)",color:"var(--muted)",cursor:"pointer",fontWeight:600}}

                    <option key={c.id} value={c.id}>
                      {c.name}{count > 0 ? ` (${count} tarif${count>1?"s":""} spécial${count>1?"x":""})` : ""}

              </select>
            </div>

            {/* Tableau produits pour le client sélectionné */}
            {selectedPriceClient ? (() => {
              const selClient = clients.find(c => c.id === selectedPriceClient);

              const orderedPids = new Set(deliveries.filter(d=>d.clientId===selectedPriceClient).map(d=>d.productId));
              const productsToShow = (showAllPriceProducts || orderedPids.size===0) ? products : products.filter(p=>orderedPids.has(p.id));

                      <button onClick={()=>setShowAllPriceProducts(v=>!v)}

                        {showAllPriceProducts ? `Commandés seulement (${orderedPids.size})` : `Voir tous les produits (${products.length})`}
                      </button>
                    )}
                    {(clientPrices||[]).filter(pc=>pc.clientId===selectedPriceClient).length > 0 && (
                      <span style={{fontSize:11,background:"var(--wheat)",color:"#7a5c00",padding:"2px 8px",borderRadius:20,fontWeight:600}}>
                        {(clientPrices||[]).filter(pc=>pc.clientId===selectedPriceClient).length} tarif{(clientPrices||[]).filter(pc=>pc.clientId===selectedPriceClient).length>1?"s":""} spécial{(clientPrices||[]).filter(pc=>pc.clientId===selectedPriceClient).length>1?"x":""}
                      </span>
                    )}
                  </div>

                  {/* Tableau */}
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:"var(--chalk)"}}>
                        <th style={{padding:"8px 16px",textAlign:"left",fontSize:12,color:"var(--muted)",fontWeight:600,borderBottom:"1px solid var(--line)"}}>Produit</th>
                        <th style={{padding:"8px 16px",textAlign:"right",fontSize:12,color:"var(--muted)",fontWeight:600,borderBottom:"1px solid var(--line)"}}>Prix catalogue</th>
                        <th style={{padding:"8px 16px",textAlign:"right",fontSize:12,color:"var(--muted)",fontWeight:600,borderBottom:"1px solid var(--line)"}}>Prix spécial</th>
                      </tr>
                    </thead>
                    <tbody>
                      {productsToShow.map((p, i) => {
                        const draftVal = priceDrafts[p.id];
                        const hasDraft = draftVal !== undefined && String(draftVal).trim() !== "" && parsePrice(draftVal) > 0;
                        const isLast = i === productsToShow.length - 1;
                        return (
                          <tr key={p.id} style={{background: hasDraft ? "rgba(218,165,32,0.04)" : "transparent"}}>
                            <td style={{padding:"10px 16px",fontSize:13,color:"var(--ink)",borderBottom:isLast?"none":"1px solid var(--line)"}}>
                              {p.name}
                            </td>
                            <td style={{padding:"10px 16px",fontSize:13,color:"var(--muted)",textAlign:"right",borderBottom:isLast?"none":"1px solid var(--line)",whiteSpace:"nowrap"}}>

                            </td>
                            <td style={{padding:"6px 16px 6px",textAlign:"right",borderBottom:isLast?"none":"1px solid var(--line)"}}>
                              <input
                                type="text" inputMode="decimal"
                                placeholder={fmt(p.price)}
                                style={{
                                  ...input,
                                  width:110,
                                  padding:"6px 8px",
                                  fontSize:13,
                                  textAlign:"right",
                                  borderColor: hasDraft ? "var(--wheat)" : "var(--line)",
                                  background: hasDraft ? "rgba(218,165,32,0.06)" : "var(--card)",
                                  fontWeight: hasDraft ? 600 : 400,
                                }}
                                value={draftVal ?? ""}
                                onChange={e => { const v=e.target.value; setPriceDrafts(d=>({...d,[p.id]:v})); setPricesDirty(true); }}
                                onKeyDown={e => { if(e.key==="Enter") handleSaveAllPrices(); }}
                              />
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>

                  {/* Barre d'enregistrement groupé */}
                  <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"var(--chalk)",borderTop:"1px solid var(--line)"}}>
                    <span style={{fontSize:12,color: pricesDirty ? "var(--coral)" : "var(--muted)",fontWeight:600,flex:1}}>
                      {pricesDirty ? "● Modifications non enregistrées" : "Tous les tarifs sont à jour"}
                    </span>
                    <button
                      onClick={handleSaveAllPrices}
                      disabled={!pricesDirty || savingPrices}
                      style={{...btn, background: (!pricesDirty||savingPrices) ? "var(--muted)" : "var(--wheat)", opacity:(!pricesDirty||savingPrices)?0.6:1, cursor:(!pricesDirty||savingPrices)?"default":"pointer", padding:"9px 16px", fontSize:13}}>
                      <Check size={14}/> {savingPrices ? "Enregistrement…" : "Enregistrer les tarifs"}
                    </button>
                  </div>
                </div>

            })() : (
              <div style={{textAlign:"center",padding:"24px 0",color:"var(--muted)",fontSize:13}}>
                Sélectionnez un client pour configurer ses tarifs spéciaux.

            )}
          </Section>
        </>
      )}
    </div>
  );
}

/* ===================== TABLEAU JOURNALIER ===================== */
function DailyReport({ deliveries, payments, reports, drivers, settings, currency, onSaveReport, onDeleteReport, onReset, returns }) {
  const [date,          setDate]          = useState(today());
  const [view,          setView]          = useState("jour");
  const [savedTick,     setSavedTick]     = useState(false);
  const [openDate,      setOpenDate]      = useState(null);
  const [confirmReset,  setConfirmReset]  = useState(false);

  useEffect(()=>{ setSavedTick(false); setConfirmReset(false); },[date]);

  const dayDeliveries = deliveries.filter(d=>d.date===date);
  const recFor = (cid) => payments.filter(p=>p.clientId===cid&&p.date===date).reduce((s,p)=>s+(Number(p.amount)||0),0);

  const rows = useMemo(()=>{
    const m = {};
    dayDeliveries.forEach(d=>{
      m[d.clientId]=m[d.clientId]||{clientId:d.clientId,client:d.clientName,driver:d.driver,items:[],rempli:0};
      // Afficher quantité nette et mentionner les retours si applicable
      const rQty = Number(d.returnedQty)||0;
      const net  = netQty(d);
      const itemStr = rQty>0
        ? `${d.productName} ×${net} (−${rQty} retour)`
        : `${d.productName} ×${net}`;
      m[d.clientId].items.push(itemStr);
      m[d.clientId].rempli+=lineTotal(d);
    });
    return Object.values(m)
      .map(r=>{ const rec=recFor(r.clientId); return {...r,rec,ecart:rec-r.rempli}; })
      .sort((a,b)=>a.driver===b.driver?a.client.localeCompare(b.client):a.driver.localeCompare(b.driver));
  },[dayDeliveries,payments,date]);

  const tot = rows.reduce((a,r)=>({rempli:a.rempli+r.rempli,rec:a.rec+r.rec,ecart:a.ecart+r.ecart}),{rempli:0,rec:0,ecart:0});

  // Totaux par produit — quantités nettes (retours déduits)
  const perProduct = useMemo(() => {
    const m = {};
    dayDeliveries.forEach(d => {
      if (!m[d.productId]) m[d.productId] = { name:d.productName, qty:0, returned:0, total:0, unitPrice:d.unitPrice };
      m[d.productId].qty      += netQty(d);            // quantité nette
      m[d.productId].returned += Number(d.returnedQty)||0;
      m[d.productId].total    += lineTotal(d);
    });
    return sortByBase(Object.values(m));
  }, [dayDeliveries]);
  const alreadySaved = reports.some(r=>r.date===date);

  const saveReport = () => {
    onSaveReport({date,savedAt:new Date().toISOString(),rempli:tot.rempli,rec:tot.rec,ecart:tot.ecart,
      rows:rows.map(r=>({client:r.client,driver:r.driver,items:r.items,rempli:r.rempli,rec:r.rec,ecart:r.ecart}))});
    setSavedTick(true);
  };

  const th    = {textAlign:"left",padding:"8px 10px",fontSize:11,textTransform:"uppercase",letterSpacing:".03em",color:"#fff",background:"var(--ink)",whiteSpace:"nowrap"};
  const td    = {padding:"8px 10px",fontSize:13,color:"var(--ink)",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"};
  const tdNum = {...td,textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums",color:"var(--wheat)"};

  const exportCSV = () => {
    const head  = ["Jour","Chauffeur","Client","Detail","Rempli","Recupere","Ecart"];
    const lines = rows.map(r=>[date,driverLabel(r.driver,drivers),r.client,r.items.join(" / "),fmt(r.rempli),fmt(r.rec),fmt(r.ecart)]);
    lines.push(["","","TOTAL","",fmt(tot.rempli),fmt(tot.rec),fmt(tot.ecart)]);
    lines.push([]);
    lines.push(["--- RECAPITULATIF PAR PRODUIT ---","","","","","",""]);
    lines.push(["Produit","Quantite totale","Montant","","","",""]);
    perProduct.forEach(p => lines.push([p.name, p.qty+" pcs", fmt(p.total),"","","",""]));
    lines.push(["TOTAL", perProduct.reduce((s,p)=>s+p.qty,0)+" pcs", fmt(tot.rempli),"","","",""]);
    const csv = [head,...lines].map(l=>l.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(";")).join("\n");
    try {
      const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a"); a.href=url; a.download=`tableau-${date}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch(e) {}
  };

  return (
    <div>
      {/* Onglets Jour / Historique */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["jour","Tableau du jour",<CalendarDays size={15}/>],["hist",`Historique (${reports.length} j)`,<LayoutDashboard size={15}/>]].map(([k,lab,ic])=>(
          <button key={k} onClick={()=>setView(k)} style={{...btn,flex:1,background:view===k?C.brown:"#fff",color:view===k?"#fff":C.brown,border:"1px solid var(--line)"}}>
            {ic} {lab}
          </button>
        ))}
      </div>

      {/* ---- HISTORIQUE ---- */}
      {view==="hist" && (
        <Section title="Historique complet" icon={<CalendarDays size={18}/>}>
          {!reports.length && <p style={{color:"var(--muted)",margin:0}}>Aucun tableau enregistré. Revenez sur « Tableau du jour » et appuyez sur Sauvegarder.</p>}
          {[...reports].sort((a,b)=>a.date<b.date?1:-1).map(r=>{
            const ok   = Math.abs(r.ecart)<=0.0001;
            const open = openDate===r.date;
            return (
              <div key={r.date} style={{border:"1px solid var(--line)",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"var(--chalk)"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,color:"var(--ink)",textTransform:"capitalize"}}>{dateFR(r.date)}</div>
                    <div style={{fontSize:12,color:"var(--muted)"}}>Rempli {money(r.rempli,currency)} · Récupéré {money(r.rec,currency)}</div>
                  </div>
                  <span style={{fontWeight:700,fontSize:13,color:ok?C.green:C.red,whiteSpace:"nowrap"}}>
                    {ok?"OK":`${r.ecart>=0?"+":"−"}${money(Math.abs(r.ecart),currency)}`}
                  </span>
                  <button style={{...btn,padding:"7px 10px",fontSize:12}} onClick={()=>setOpenDate(open?null:r.date)}>{open?"Fermer":"Voir"}</button>
                  <button style={btnGhost} onClick={()=>onDeleteReport(r.date)}><Trash2 size={16}/></button>
                </div>
                {open && (
                  <div style={{padding:"8px 12px 12px"}}>
                    {r.rows.map((row,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:"1px solid var(--line)"}}>
                        <span style={{color:"var(--ink)"}}>{row.client} <span style={{color:"var(--muted)",fontSize:11}}>({driverLabel(row.driver,drivers)})</span></span>
                        <span style={{color:Math.abs(row.ecart)<=0.0001?C.green:C.red,fontWeight:600}}>
                          {money(row.rec,currency)} / {money(row.rempli,currency)}
                        </span>
                      </div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,color:"var(--ink)",marginTop:6}}>
                      <span>Total</span><span>{money(r.rec,currency)} / {money(r.rempli,currency)}</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </Section>
      )}

      {/* ---- TABLEAU DU JOUR ---- */}
      {view==="jour" && (
        <>
          <Section title="Tableau journalier" icon={<CalendarDays size={18}/>}
            right={<input type="date" style={{...input,width:"auto",padding:"8px 10px"}} value={date} onChange={e=>setDate(e.target.value)}/>}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
              <KPI label="Rempli (Labo)"  value={money(tot.rempli,currency)}/>
              <KPI label="Récupéré"       value={money(tot.rec,currency)} tone="green"/>
              <KPI label="Écart" value={`${tot.ecart>=0?"+":"−"}${money(Math.abs(tot.ecart),currency)}`} tone={Math.abs(tot.ecart)<=0.0001?"green":"red"}/>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button style={{...btn,background:savedTick?C.green:C.brown}} onClick={saveReport} disabled={!rows.length}>
                <Check size={15}/> {savedTick?"Enregistré ✓":alreadySaved?"Mettre à jour":"Sauvegarder"}
              </button>
              <button style={{...btn,background:"var(--surface)",color:"var(--wheat)",border:"1px solid var(--line)"}} onClick={()=>window.print()}><Printer size={15}/> Imprimer</button>
              <button style={{...btn,background:"var(--surface)",color:"var(--wheat)",border:"1px solid var(--line)"}} onClick={exportCSV}><CalendarDays size={15}/> Export CSV</button>
            </div>

            {/* ---- Remise à zéro après sauvegarde ---- */}
            {savedTick && rows.length>0 && !confirmReset && (
              <button style={{...btn,background:"var(--surface)",color:"var(--coral)",border:`1px solid var(--coral)`,marginTop:10,width:"100%"}}
                onClick={()=>setConfirmReset(true)}>
                <RotateCcw size={15}/> Remettre à zéro pour un nouveau jour
              </button>
            )}
            {confirmReset && (
              <div style={{marginTop:10,padding:12,background:"#FFF3F2",border:`1px solid var(--coral)`,borderRadius:12}}>
                <p style={{margin:"0 0 8px",fontSize:13,color:"var(--coral)",fontWeight:600}}>
                  ⚠️ Supprimer toutes les sorties et encaissements du {dateFR(date)} ?
                  Le tableau sauvegardé sera conservé dans l'historique.
                </p>
                <div style={{display:"flex",gap:8}}>
                  <button style={{...btn,flex:1,background:"var(--coral)",padding:"11px"}} onClick={()=>{ onReset(date); setSavedTick(false); setConfirmReset(false); }}>
                    <RotateCcw size={15}/> Confirmer la remise à zéro
                  </button>
                  <button style={{...btn,flex:1,background:"var(--surface)",color:"var(--wheat)",border:"1px solid var(--line)",padding:"11px"}} onClick={()=>setConfirmReset(false)}>
                    Annuler
                  </button>
                </div>
              </div>
            )}
          </Section>

          <Section title={dateFR(date)} icon={<LayoutDashboard size={18}/>}>
            {!rows.length ? (
              <p style={{color:"var(--muted)",margin:0}}>Aucune sortie ce jour. Le tableau se remplit après les sorties du labo et la saisie des chauffeurs.</p>
            ) : (
              <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--line)"}}>
                <table style={{borderCollapse:"collapse",width:"100%",minWidth:560}}>
                  <thead>
                    <tr>
                      <th style={th}>Client</th>
                      <th style={th}>Détail</th>
                      <th style={{...th,textAlign:"right"}}>Rempli</th>
                      <th style={{...th,textAlign:"right"}}>Récupéré</th>
                      <th style={{...th,textAlign:"right"}}>Écart</th>
                    </tr>
                  </thead>
                  <tbody>
                    {drivers.map(dr=>{
                      const drRows = rows.filter(r=>r.driver===dr.id);
                      if (!drRows.length) return null;
                      const sub = drRows.reduce((a,r)=>({rempli:a.rempli+r.rempli,rec:a.rec+r.rec,ecart:a.ecart+r.ecart}),{rempli:0,rec:0,ecart:0});
                      return (
                        <React.Fragment key={dr.id}>
                          <tr><td colSpan={5} style={{...td,background:"var(--chalk)",fontWeight:700,color:"var(--wheat)"}}>{dr.name}</td></tr>
                          {drRows.map(r=>(
                            <tr key={r.clientId}>
                              <td style={{...td,fontWeight:600}}>{r.client}</td>
                              <td style={{...td,whiteSpace:"normal",color:"var(--muted)",fontSize:12}}>{r.items.join(", ")}</td>
                              <td style={tdNum}>{money(r.rempli,currency)}</td>
                              <td style={{...tdNum,color:"var(--sage)"}}>{money(r.rec,currency)}</td>
                              <td style={{...tdNum,color:Math.abs(r.ecart)<=0.0001?C.green:C.red}}>
                                {Math.abs(r.ecart)<=0.0001?"OK":`${r.ecart>=0?"+":"−"}${money(Math.abs(r.ecart),currency)}`}
                              </td>
                            </tr>
                          ))}
                          <tr>
                            <td style={{...td,fontStyle:"italic",color:"var(--muted)"}} colSpan={2}>Sous-total {dr.name}</td>
                            <td style={tdNum}>{money(sub.rempli,currency)}</td>
                            <td style={{...tdNum,color:"var(--sage)"}}>{money(sub.rec,currency)}</td>
                            <td style={{...tdNum,color:Math.abs(sub.ecart)<=0.0001?C.green:C.red}}>{`${sub.ecart>=0?"+":"−"}${money(Math.abs(sub.ecart),currency)}`}</td>
                          </tr>
                        </React.Fragment>
                      );
                    })}
                    <tr>
                      <td style={{padding:"10px",fontWeight:800,color:"#fff",background:"var(--ink)"}} colSpan={2}>TOTAL JOUR</td>
                      <td style={{padding:"10px",textAlign:"right",fontWeight:800,color:"#fff",background:"var(--ink)"}}>{money(tot.rempli,currency)}</td>
                      <td style={{padding:"10px",textAlign:"right",fontWeight:800,color:"#fff",background:"var(--ink)"}}>{money(tot.rec,currency)}</td>
                      <td style={{padding:"10px",textAlign:"right",fontWeight:800,background:"var(--ink)",color:Math.abs(tot.ecart)<=0.0001?"#A3D9CF":"#F5A09A"}}>
                        {`${tot.ecart>=0?"+":"−"}${money(Math.abs(tot.ecart),currency)}`}
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            )}
            {/* ---- Produits les plus vendus ---- */}
            {perProduct.length > 0 && (
              <div style={{marginTop:16,borderRadius:16,border:"1px solid var(--line)",overflow:"hidden",background:"#fff"}}>
                {/* En-tête */}
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",background:"var(--chalk)",borderBottom:"1px solid var(--line)"}}>
                  <Trophy size={16}/>
                  <span style={{...serif,fontSize:15,fontWeight:700,color:"var(--ink)"}}>Produits les plus vendus</span>
                </div>
                {/* Lignes */}
                {perProduct.map((p,i) => (
                  <div key={p.name} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",borderBottom:"1px solid var(--line)",background:"#fff"}}>
                    <span style={{minWidth:26,fontSize:12,fontWeight:700,color:"var(--muted)",textAlign:"right"}}>#{i+1}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:600,color:"var(--ink)",lineHeight:1.3}}>{p.name}</div>
                      {p.returned>0 && <div style={{fontSize:11,color:"var(--coral)",marginTop:2}}>↩ {p.returned} retourné{p.returned>1?"s":""}</div>}
                    </div>
                    <span style={{background:"var(--wheat)",color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>{p.qty} pcs</span>
                    <span style={{minWidth:86,fontSize:15,fontWeight:700,color:"var(--ink)",textAlign:"right",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{money(p.total,currency)}</span>
                  </div>
                ))}
                {/* Total */}
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:"var(--ink)"}}>
                  <span style={{minWidth:26}}></span>
                  <span style={{flex:1,fontSize:14,fontWeight:800,color:"#fff",...serif}}>TOTAL</span>
                  <span style={{background:"rgba(255,255,255,.18)",color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>{perProduct.reduce((s,p)=>s+p.qty,0)} pcs</span>
                  <span style={{minWidth:86,fontSize:15,fontWeight:800,color:"var(--wheat)",textAlign:"right",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap",...serif}}>{money(tot.rempli,currency)}</span>
                </div>
              </div>
            )}

            {rows.some(r=>Math.abs(r.ecart)>0.0001) && (
              <p style={{display:"flex",alignItems:"center",gap:6,color:"var(--coral)",fontSize:13,marginTop:12}}>
                <AlertTriangle size={15}/> Des écarts sont à signaler ce jour.
              </p>
            )}
          </Section>
        </>
      )}
    </div>
  );
}

/* ===================== COUCHE API (remplace le stockage navigateur) ===================== */
const API_URL = "api.php"; // chemin relatif : api.php doit être dans le même dossier que index.html

async function apiCall(action, body) {
  const opts = body
    ? { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) }
    : { method:"GET" };
  const res = await fetch(`${API_URL}?action=${action}`, opts);
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || `Erreur API (${action})`);
  return data;
}

// Convertit les lignes SQL (snake_case, jour) vers le format JS attendu par les composants
// returnedByDelivery est un objet {livraisonId: quantitéTotaleRetournée} précalculé.
function fromSqlDelivery(l, returnedByDelivery) {
  return { id:l.id, date:l.jour, clientId:l.client_id, clientName:l.client_nom, driver:l.chauffeur_id,
           productId:l.produit_id, productName:l.produit_nom, quantity:l.quantite, unitPrice:l.prix_unitaire,
           returnedQty: (returnedByDelivery && returnedByDelivery[l.id]) || 0 };
}
function fromSqlReturn(rt) {
  return { id:rt.id, livraisonId:rt.livraison_id, date:rt.jour, quantity:rt.quantite, reason:rt.motif || "" };
}
function fromSqlPayment(p) {
  return { id:p.id, date:p.jour, clientId:p.client_id, clientName:p.client_nom, driver:p.chauffeur_id, amount:p.montant };
}
function fromSqlClient(c) { return { id:c.id, name:c.nom, driver:c.chauffeur_id }; }
function fromSqlProduct(p) { return { id:p.id, name:p.nom, price:p.prix, category:p.categorie || "Autres" }; }
function fromSqlDriver(d) { return { id:d.id, name:d.nom, user:d.utilisateur, pass:d.mot_de_passe }; }
function fromSqlReport(r) {
  return { date:r.jour, savedAt:null, rempli:r.rempli, rec:r.recupere, ecart:r.ecart, rows:r.detail || [] };
}
function fromSqlClientPrice(pc) {
  return { clientId:pc.client_id, productId:pc.produit_id, prix:pc.prix };
}

/* ===================== APP (connecté à MySQL via api.php) ===================== */
function App() {
  const [loaded,       setLoaded]      = useState(false);
  const [loadError,    setLoadError]   = useState(null);
  const [session,      setSession]     = useState(null);
  const [role,         setRole]        = useState("labo");
  const [products,     setProductsS]   = useState(seedProducts);
  const [clients,      setClientsS]    = useState(seedClients);
  const [deliveries,   setDeliveriesS] = useState([]);
  const [returns,      setReturnsS]    = useState([]);
  const [payments,     setPaymentsS]   = useState([]);
  const [reports,      setReportsS]    = useState([]);
  const [settings,     setSettingsS]   = useState(seedSettings);
  const [clientPrices, setClientPricesS] = useState([]);
  const [toast,    setToast]    = useState(null);
  const toastTimer = useRef(null);
  const showToast = (msg) => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast(msg);
    // Les messages d'erreur (préfixés ⚠️) restent affichés plus longtemps —
    // le temps de les lire/photographier — les confirmations restent brèves.
    toastTimer.current = setTimeout(()=>setToast(null), msg && msg.startsWith("⚠️") ? 7000 : 2500);
  };

  useEffect(()=>{
    const l = document.createElement("link"); l.rel="stylesheet";
    l.href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&display=swap";
    document.head.appendChild(l);
    return ()=>{ try{document.head.removeChild(l);}catch(e){} };
  },[]);

  // Chargement initial : tout vient de la base de données via api.php
  const reloadAll = async () => {
    const data = await apiCall("load_all");
    setProductsS((data.produits||[]).map(fromSqlProduct));
    setClientsS((data.clients||[]).map(fromSqlClient));
    const returnedByDelivery = {};
    (data.retours||[]).forEach(rt => { returnedByDelivery[rt.livraison_id] = (returnedByDelivery[rt.livraison_id]||0) + Number(rt.quantite||0); });
    setDeliveriesS((data.livraisons||[]).map(l => fromSqlDelivery(l, returnedByDelivery)));
    setReturnsS((data.retours||[]).map(fromSqlReturn));
    setPaymentsS((data.encaissements||[]).map(fromSqlPayment));
    setReportsS((data.rapports||[]).map(fromSqlReport));
    setClientPricesS((data.prix_client||[]).map(fromSqlClientPrice));
    const p = data.parametres || {};
    setSettingsS({
      business:  p.business  || seedSettings.business,
      currency:  p.currency  || seedSettings.currency,
      drivers:   (data.chauffeurs||[]).map(fromSqlDriver),
      auth: {
        labo:         { user:p.auth_labo_user||"labo",   pass:p.auth_labo_pass||"0000" },
        proprietaire: { user:p.auth_proprio_user||"admin", pass:p.auth_proprio_pass||"9999" },
      },
    });
  };

  useEffect(()=>{
    (async()=>{
      try {
        await reloadAll();
        // NOTE : la réparation de prix_client (dédoublonnage + clé primaire) n'est
        // PLUS automatique au démarrage. Avec plusieurs appareils ouverts en même
        // temps (Labo, chauffeurs, Propriétaire), des CREATE/DROP/RENAME TABLE
        // concurrents à chaque chargement de page pouvaient se bloquer mutuellement
        // et faire échouer une sauvegarde de tarifs en cours au même moment.
        // La réparation reste disponible en un clic via le bouton
        // « 🔧 Nettoyer / vérifier les tarifs » (Propriétaire → Tarifs spéciaux),
        // déclenchée une seule fois, à la demande — jamais en arrière-plan.
      } catch(e) {
        setLoadError(e.message || "Connexion à la base de données impossible.");
      }
      try {
        const sess = sessionStorage.getItem("patisserie:session");
        if (sess) { setSession(sess); setRole(sess==="proprietaire"?"proprietaire":sess); }
      } catch(e){}
      setLoaded(true);
    })();
  },[]);

  const drivers  = settings.drivers || seedSettings.drivers;
  const currency = settings.currency || "DT";

  // ---- Produits (debounce 600ms pour éviter un appel API à chaque frappe) ----
  const saveProductsTimer = useRef(null);
  const lastSavedProducts = useRef(null);
  const setProducts = (next) => {
    setProductsS(next);
    if (saveProductsTimer.current) clearTimeout(saveProductsTimer.current);
    saveProductsTimer.current = setTimeout(async () => {
      const prev = lastSavedProducts.current ?? products;
      const prevIds = new Set(prev.map(p=>p.id));
      const nextIds = new Set(next.map(p=>p.id));
      for (const p of next) {
        if (!prevIds.has(p.id) || prev.find(x=>x.id===p.id && (x.name!==p.name || x.price!==p.price || x.category!==p.category))) {
          await apiCall("save_product", { id:p.id, nom:p.name, prix:p.price, categorie:p.category||"Autres" }).catch(()=>{});
        }
      }
      for (const p of prev) {
        if (!nextIds.has(p.id)) await apiCall("delete_product", { id:p.id }).catch(()=>{});
      }
      lastSavedProducts.current = next;
    }, 600);
  };

  // ---- Clients (debounce 600ms) ----
  const saveClientsTimer = useRef(null);
  const lastSavedClients = useRef(null);
  const setClients = (next) => {
    setClientsS(next);
    if (saveClientsTimer.current) clearTimeout(saveClientsTimer.current);
    saveClientsTimer.current = setTimeout(async () => {
      const prev = lastSavedClients.current ?? clients;
      const prevIds = new Set(prev.map(c=>c.id));
      const nextIds = new Set(next.map(c=>c.id));
      for (const c of next) {
        if (!prevIds.has(c.id) || prev.find(x=>x.id===c.id && (x.name!==c.name || x.driver!==c.driver))) {
          await apiCall("save_client", { id:c.id, nom:c.name, chauffeur_id:c.driver }).catch(()=>{});
        }
      }
      for (const c of prev) {
        if (!nextIds.has(c.id)) await apiCall("delete_client", { id:c.id }).catch(()=>{});
      }
      lastSavedClients.current = next;
    }, 600);
  };

  // ---- Chauffeurs (vivent dans settings.drivers) ----
  const setDrivers = async (drvs) => {
    setSettingsS(prev => ({...prev, drivers:drvs}));
    const prevIds = new Set(drivers.map(d=>d.id));
    for (const d of drvs) {
      if (!prevIds.has(d.id) || drivers.find(x=>x.id===d.id && (x.name!==d.name || x.user!==d.user || x.pass!==d.pass))) {
        await apiCall("save_driver", { id:d.id, nom:d.name, utilisateur:d.user, mot_de_passe:d.pass }).catch(()=>{});
      }
    }
    const nextIds = new Set(drvs.map(d=>d.id));
    for (const d of drivers) {
      if (!nextIds.has(d.id)) await apiCall("delete_driver", { id:d.id }).catch(()=>{});
    }
  };

  // ---- Livraisons : ajout (validation labo), suppression, ET modification (Propriétaire) ----
  // Référence toujours à jour (évite les états périmés lors d'actions rapprochées : ajouter puis modifier puis supprimer)
  const deliveriesRef = useRef(deliveries);
  useEffect(()=>{ deliveriesRef.current = deliveries; }, [deliveries]);

  const setDeliveries = async (next) => {
    const current  = deliveriesRef.current;
    const prevById = new Map(current.map(d=>[d.id,d]));
    const nextIds  = new Set(next.map(d=>d.id));

    const added   = next.filter(d=>!prevById.has(d.id));
    const removed = current.filter(d=>!nextIds.has(d.id));
    const updated = next.filter(d=>{
      const prev = prevById.get(d.id);
      if (!prev) return false;
      return prev.date!==d.date || prev.clientId!==d.clientId || prev.driver!==d.driver ||
             prev.productId!==d.productId || prev.productName!==d.productName ||
             prev.quantity!==d.quantity || prev.unitPrice!==d.unitPrice;
    });

    deliveriesRef.current = next; // garde la ref synchrone pour le prochain appel immédiat
    setDeliveriesS(next); // optimiste : l'écran se met à jour immédiatement

    if (added.length) {
      const res = await apiCall("add_deliveries", { rows: added.map(d=>({
        date:d.date, clientId:d.clientId, driver:d.driver,
        productId:d.productId, productName:d.productName,
        quantity:d.quantity, unitPrice:d.unitPrice,
      })) }).catch(()=>null);
      // Remplace les identifiants temporaires (générés côté navigateur) par les vrais identifiants
      // attribués par la base de données, sinon une modification/suppression immédiate échouerait silencieusement.
      if (res && res.ids && res.ids.length === added.length) {
        const idMap = new Map(added.map((d,i)=>[d.id, res.ids[i]]));
        deliveriesRef.current = deliveriesRef.current.map(d => idMap.has(d.id) ? {...d, id:idMap.get(d.id)} : d);
        setDeliveriesS(deliveriesRef.current);
      }
    }
    for (const d of removed) await apiCall("delete_delivery", { id:d.id }).catch(()=>{});
    for (const d of updated) await apiCall("update_delivery", {
      id:d.id, date:d.date, clientId:d.clientId, driver:d.driver,
      productId:d.productId, productName:d.productName,
      quantity:d.quantity, unitPrice:d.unitPrice,
    }).catch(()=>{});
  };

  // ---- Encaissements : remplace tous les paiements d'un jour/chauffeur (validation tournée) ----
  const setPayments = async (next) => {
    setPaymentsS(next); // l'appel réel se fait via setPaymentsForDay (voir Chauffeur)
  };
  const setPaymentsForDay = async (date, driverId, rowsForThatDay, fullNextArray) => {
    setPaymentsS(fullNextArray);
    await apiCall("set_payments_for_day", {
      date, driver:driverId,
      rows: rowsForThatDay.map(p=>({ clientId:p.clientId, amount:p.amount })),
    }).catch(()=>{});
  };

  // ---- Retours (articles non conformes rendus par un client sur une livraison précise) ----
  const addReturn = async (livraisonId, quantity, date, reason) => {
    const res = await apiCall("add_return", { livraisonId, quantity, date, motif: reason || "" }).catch(e => ({ error: e.message }));
    if (res && res.error) { return { ok:false, error: res.error }; }
    // Mise à jour optimiste : on incrémente returnedQty sur la livraison concernée
    // et on ajoute la ligne de retour dans la liste locale.
    setDeliveriesS(prev => prev.map(d => d.id===livraisonId ? { ...d, returnedQty:(Number(d.returnedQty)||0)+Number(quantity) } : d));
    setReturnsS(prev => [...prev, { id:res.id, livraisonId, date, quantity:Number(quantity), reason:reason||"" }]);
    return { ok:true };
  };
  const deleteReturn = async (returnId) => {
    const ret = returns.find(r => r.id === returnId);
    await apiCall("delete_return", { id: returnId }).catch(()=>{});
    if (ret) {
      setDeliveriesS(prev => prev.map(d => d.id===ret.livraisonId ? { ...d, returnedQty:Math.max(0,(Number(d.returnedQty)||0)-Number(ret.quantity)) } : d));
    }
    setReturnsS(prev => prev.filter(r => r.id !== returnId));
  };

  // ---- Réglages (business/monnaie/identifiants) ----
  const setSettings = async (next) => {
    setSettingsS(next);
    await apiCall("save_settings", { parametres: {
      business: next.business, currency: next.currency,
      auth_labo_user: next.auth?.labo?.user, auth_labo_pass: next.auth?.labo?.pass,
      auth_proprio_user: next.auth?.proprietaire?.user, auth_proprio_pass: next.auth?.proprietaire?.pass,
    }}).catch(()=>{});
    if (next.drivers && next.drivers !== drivers) await setDrivers(next.drivers);
  };

  /* ═══════════════════════════════════════════════════════════════════════════
     GESTIONNAIRE DES TARIFS SPÉCIAUX PAR CLIENT (source unique de vérité)
     ─────────────────────────────────────────────────────────────────────────
     Toute la logique des prix spéciaux passe par ici :
       • getUnitPrice(...)            → LE seul résolveur de prix de l'app (défini en tête)
       • refreshClientPrices()        → recharge depuis le serveur (source de vérité)
       • saveClientPricesBatch(...)   → seul point d'écriture (échec = erreur, pas de faux succès)
       • repairPrices()               → dédoublonne la base + garantit la clé primaire
     La base MySQL est l'unique source de vérité ; l'UI ne fait que la refléter.
     ═══════════════════════════════════════════════════════════════════════════ */

  // ---- Tarifs spéciaux par client ----
  const setClientPrices = async (clientId, productId, priceStr) => {
    const prix = parseFloat(priceStr) || 0;
    setClientPricesS(prev => {
      const filtered = prev.filter(pc => !(pc.clientId===clientId && pc.productId===productId));
      return prix > 0 ? [...filtered, { clientId, productId, prix }] : filtered;
    });
    await apiCall("save_client_price", { clientId, produitId:productId, prix }).catch(()=>{});
    showToast(prix > 0 ? "Tarif spécial sauvegardé ✓" : "Tarif supprimé ✓");
  };

  // Recharge UNIQUEMENT les tarifs spéciaux depuis le serveur (léger).
  // Utilisé après chaque enregistrement (source de vérité) et pour synchroniser
  // les autres appareils : un poste Labo resté ouvert récupère ainsi les tarifs
  // modifiés depuis le téléphone du propriétaire sans recharger la page.
  const refreshClientPrices = async () => {
    try {
      const r = await apiCall("get_client_prices");
      setClientPricesS((r.prix_client||[]).map(fromSqlClientPrice));
      return true;
    } catch(e) { return false; }
  };

  // Enregistrement groupé de plusieurs tarifs pour un même client.
  // items : [{ productId, prix }] — prix <= 0 supprime le tarif spécial (retour au catalogue).
  // L'état affiché après enregistrement vient TOUJOURS du serveur (pas d'optimisme
  // silencieux) : si le POST échoue, l'utilisateur voit une erreur, jamais un faux succès.
  const saveClientPricesBatch = async (clientId, items) => {
    try {
      await apiCall("save_client_prices", {
        clientId,
        items: items.map(it => ({ produitId: it.productId, prix: it.prix })),
      });
    } catch(e) {
      await refreshClientPrices();
      // Affiche le VRAI message d'erreur (renvoyé par le serveur ou par le
      // navigateur) au lieu d'un message générique — indispensable pour
      // diagnostiquer une panne réelle plutôt que de deviner.
      showToast(`⚠️ Échec : ${e.message || "erreur inconnue"}`);
      throw e;
    }
    await refreshClientPrices();
    const n = items.filter(it => it.prix > 0).length;
    showToast(`${n} tarif${n>1?"s":""} enregistré${n>1?"s":""} ✓`);
  };

  // Nettoyage manuel : déclenche l'auto-réparation de la base (dédoublonnage + clé
  // primaire) puis resynchronise. Exposé via un bouton pour le propriétaire.
  const repairPrices = async () => {
    try {
      const r = await apiCall("repair_prix_client");
      await refreshClientPrices();
      showToast(r.repaired ? "Tarifs nettoyés (doublons supprimés) ✓" : "Tarifs déjà propres ✓");
      return true;
    } catch(e) {
      showToast("⚠️ Nettoyage impossible — vérifiez la connexion");
      return false;
    }
  };

  // Synchronisation multi-appareils : quand l'app redevient visible (retour sur
  // l'onglet, réveil de la tablette du labo…), on resynchronise les tarifs.
  useEffect(() => {
    const onWake = () => { if (!document.hidden) refreshClientPrices(); };
    document.addEventListener("visibilitychange", onWake);
    window.addEventListener("focus", onWake);
    return () => {
      document.removeEventListener("visibilitychange", onWake);
      window.removeEventListener("focus", onWake);
    };
  }, []);

  // « Je repasse en Labo » sur le même appareil : changer d'onglet de rôle
  // resynchronise aussi les tarifs.
  useEffect(() => { if (session) refreshClientPrices(); }, [role]);

  // ---- Rapports journaliers ----
  const saveReport = async (snapshot) => {
    setReportsS(prev => [...prev.filter(r=>r.date!==snapshot.date), snapshot]);
    await apiCall("save_report", {
      date:snapshot.date, rempli:snapshot.rempli, recupere:snapshot.rec, ecart:snapshot.ecart, detail:snapshot.rows,
    }).catch(()=>{});
  };
  const deleteReport = async (date) => {
    setReportsS(prev => prev.filter(r=>r.date!==date));
    await apiCall("delete_report", { date }).catch(()=>{});
  };

  // ---- Remise à zéro du jour ----
  const resetDay = async (date) => {
    setDeliveriesS(prev => prev.filter(d=>d.date!==date));
    setPaymentsS(prev => prev.filter(p=>p.date!==date));
    await apiCall("reset_day", { date }).catch(()=>{});
  };

  // ---- Restauration d'une sauvegarde JSON complète ----
  const restoreBackup = async (data) => {
    await apiCall("restore_backup", data).catch(()=>{});
    await reloadAll();
  };

  // ---- Authentification (vérifiée côté serveur, contre la base) ----
  const login = async (user, pass) => {
    const r = await apiCall("login", { user, pass }).catch(()=>({ok:false}));
    if (r.ok) {
      setSession(r.role);
      setRole(r.role==="proprietaire"?"proprietaire":r.role);
      try { sessionStorage.setItem("patisserie:session", r.role); } catch(e){}
      return true;
    }
    return false;
  };
  const logout = () => {
    setSession(null);
    try { sessionStorage.removeItem("patisserie:session"); } catch(e){}
  };

  const allRoles = [
    ["labo",         "Laboratoire", <ChefHat size={17}/>],
    ...drivers.map(d => [d.id, d.name, <Truck size={17}/>]),
    ["proprietaire", "Propriétaire",<Crown size={17}/>],
    ["tableau",      "Tableau",     <CalendarDays size={17}/>],
  ];
  const roles = session==="proprietaire" ? allRoles : allRoles.filter(([k]) => k===session);

  // ---- Erreur de connexion à la base : message clair plutôt qu'un écran blanc ----
  if (loaded && loadError) {
    return (
      <div style={{minHeight:"100vh",background:"var(--ink)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"var(--surface)",borderRadius:20,padding:28,maxWidth:420,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:10}}>⚠️</div>
          <h2 style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:22,marginBottom:8,color:"var(--ink)"}}>Connexion à la base impossible</h2>
          <p style={{color:"var(--muted)",fontSize:14,marginBottom:14}}>{loadError}</p>
          <p style={{color:"var(--muted)",fontSize:12}}>Vérifiez que api.php et config.php sont bien dans le même dossier que cette page, et que les identifiants de la base sont corrects.</p>
        </div>
      </div>
    );
  }

  /* ----- Écran de connexion (vérifie auprès du serveur) ----- */
  if (loaded && !session) {
    return <LoginSQL settings={settings} onLogin={login}/>;
  }

  if (!loaded) {
    return (
      <div style={{minHeight:"100vh",background:"var(--cream,#FDFCF8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <p style={{color:"var(--muted,#7A8A96)"}}>Connexion à la base de données…</p>
      </div>
    );
  }

  return (
    <div style={{background:"var(--chalk)",minHeight:"100vh",fontFamily:"'DM Sans',system-ui,sans-serif",color:"var(--ink)"}}>
      <header style={{background:"var(--ink)",color:"#fff",padding:"14px 16px 12px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 16px rgba(28,43,58,.10)"}}>
        <div style={{maxWidth:768,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:26,lineHeight:1}}>🥐</span>
            <div>
              <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:20,fontWeight:400,color:"#fff",lineHeight:1.1}}>{settings.business||"Ma Pâtisserie"}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.55)",marginTop:1,letterSpacing:".02em"}}>Gestion · livraisons · encaissements</div>
            </div>
          </div>
          <button onClick={logout} title="Se déconnecter" style={{background:"rgba(255,255,255,.10)",border:"1px solid rgba(255,255,255,.15)",color:"rgba(255,255,255,.85)",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6,whiteSpace:"nowrap",minHeight:36}}>
            <LogOut size={14}/> Quitter
          </button>
        </div>
      </header>

      <nav>
        {/* Desktop top nav */}
        <div style={{background:"var(--surface)",borderBottom:"1px solid var(--line)",position:"sticky",top:60,zIndex:90,overflowX:"auto",display:"none"}} className="top-nav-desktop">
          <div style={{maxWidth:768,margin:"0 auto",display:"flex"}}>
            {roles.map(([k,lab,ic])=>(
              <button key={k} onClick={()=>setRole(k)} style={{flex:1,minWidth:80,padding:"11px 6px 10px",border:"none",borderBottom:`3px solid ${role===k?"var(--wheat)":"transparent"}`,background:"transparent",color:role===k?"var(--ink)":"var(--muted)",fontWeight:role===k?700:500,fontSize:11,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all .15s",fontFamily:"'Inter',sans-serif",whiteSpace:"nowrap"}}>
                {ic}<span>{lab}</span>
              </button>
            ))}
          </div>
        </div>
        {/* Mobile bottom nav */}
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"var(--surface)",borderTop:"1px solid var(--line)",paddingBottom:"env(safe-area-inset-bottom)",boxShadow:"0 -4px 20px rgba(28,43,58,.08)",display:"block"}} className="bottom-nav-mobile">
          <div style={{display:"flex",maxWidth:768,margin:"0 auto"}}>
            {roles.map(([k,lab,ic])=>(
              <button key={k} onClick={()=>setRole(k)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"9px 4px 7px",border:"none",background:"transparent",color:role===k?"var(--wheat)":"var(--muted)",fontSize:10,fontWeight:role===k?700:500,cursor:"pointer",lineHeight:1.2,minWidth:0,fontFamily:"'Inter',sans-serif",borderTop:`2px solid ${role===k?"var(--wheat)":"transparent"}`,transition:"color .15s"}}>
                <span style={{fontSize:18,lineHeight:1}}>{ic}</span>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%",padding:"0 2px"}}>{lab}</span>
              </button>
            ))}
          </div>
        </div>
        {/* Inject CSS to show correct nav per breakpoint */}
        <style>{`
          @media(min-width:640px){.top-nav-desktop{display:block!important}.bottom-nav-mobile{display:none!important}}
          @media(max-width:639px){.top-nav-desktop{display:none!important}.bottom-nav-mobile{display:block!important}}
        `}</style>
      </nav>

      <main style={{maxWidth:768,margin:"0 auto",padding:"16px 16px 90px"}}><style>{`@media(min-width:640px){main{padding:20px 20px 40px!important}}`}</style>
        {role==="labo" ? (
          <Labo products={products} clients={clients} drivers={drivers} deliveries={deliveries} returns={returns} currency={currency} settings={settings}
            clientPrices={clientPrices} onRefreshPrices={refreshClientPrices}
            onAddMany={rows=>setDeliveries([...deliveries,...rows.map(r=>({...r,id:r.id||(Date.now()+Math.random()).toString(36)}))])}
            onDelete={id=>setDeliveries(deliveries.filter(x=>x.id!==id))}
            onUpdate={(id, patch)=>setDeliveries(deliveries.map(x=>x.id===id?{...x,...patch}:x))}
            onAddReturn={addReturn} onDeleteReturn={deleteReturn}/>
        ) : drivers.some(d=>d.id===role) ? (
          <Chauffeur driver={role} drivers={drivers} deliveries={deliveries} payments={payments} currency={currency} settings={settings} returns={returns}
            onReplacePayments={async (nextFullArray) => {
              const todayRows = nextFullArray.filter(p=>p.driver===role);
              const dateGroups = {};
              todayRows.forEach(p=>{ (dateGroups[p.date]=dateGroups[p.date]||[]).push(p); });
              const dates = Object.keys(dateGroups);
              if (!dates.length) return; // aucune ligne → rien à persister
              const targetDate = dates[dates.length-1];
              await setPaymentsForDay(targetDate, role, dateGroups[targetDate]||[], nextFullArray);
            }}/>
        ) : role==="proprietaire" ? (
          <Owner deliveries={deliveries} payments={payments} products={products} clients={clients} returns={returns}
            reports={reports} onRestore={restoreBackup} setDeliveries={setDeliveries}
            onAddReturn={addReturn} onDeleteReturn={deleteReturn}
            drivers={drivers} settings={settings} currency={currency}
            setProducts={setProducts} setClients={setClients} setDrivers={setDrivers} setSettings={setSettings}
            clientPrices={clientPrices} setClientPrices={setClientPrices} saveClientPricesBatch={saveClientPricesBatch} onRepairPrices={repairPrices}/>
        ) : (
          <DailyReport deliveries={deliveries} payments={payments} reports={reports} returns={returns}
            drivers={drivers} settings={settings} currency={currency}
            onSaveReport={saveReport} onDeleteReport={deleteReport} onReset={resetDay}/>
        )}
        <p style={{textAlign:"center",color:"var(--muted)",fontSize:11,marginTop:24}}>
          {drivers.length} chauffeur{drivers.length>1?"s":""} · {reports.length} rapport{reports.length>1?"s":""} sauvegardé{reports.length>1?"s":""} · monnaie : {currency} · connecté à la base de données
          {" · "}<span style={{opacity:.7}}>v{APP_VERSION}</span>
        </p>
      </main>
      {toast && (
        <div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",background:"var(--sage)",color:"#fff",padding:"10px 22px",borderRadius:24,fontSize:14,fontWeight:700,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.2)",whiteSpace:"nowrap",pointerEvents:"none",transition:"opacity .2s"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

/* ===================== ÉCRAN DE CONNEXION (vérifie côté serveur) ===================== */
function LoginSQL({ settings, onLogin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err,  setErr]  = useState("");
  const [busy, setBusy] = useState(false);

  const tryLogin = async () => {
    if (!user.trim()) { setErr("Nom d'utilisateur requis."); return; }
    setBusy(true); setErr("");
    try {
      const ok = await onLogin(user.trim(), pass);
      if (!ok) setErr("Nom d'utilisateur ou mot de passe incorrect.");
    } catch(e) {
      setErr("Connexion au serveur impossible. Réessayez.");
    }
    setBusy(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"var(--chalk)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <div style={{...cardBox,width:"100%",maxWidth:380,padding:28}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{fontSize:42}}>🥐</div>
          <h1 style={{...serif,margin:"8px 0 2px",fontSize:24,color:"var(--ink)"}}>{settings.business||"Ma Pâtisserie"}</h1>
          <p style={{margin:0,fontSize:13,color:"var(--muted)"}}>Connectez-vous pour accéder à votre interface</p>
        </div>
        <div style={{marginBottom:12}}>
          <label style={label}>Nom d'utilisateur</label>
          <input style={input} value={user} autoCapitalize="none" autoCorrect="off"
            onChange={e=>{setUser(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={label}>Mot de passe</label>
          <input type="password" style={input} value={pass}
            onChange={e=>{setPass(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
        </div>
        {err && (
          <p style={{display:"flex",alignItems:"center",gap:6,color:"var(--coral)",fontSize:13,margin:"0 0 12px",background:"var(--coral-lt)",padding:"8px 10px",borderRadius:8}}>
            <AlertTriangle size={14}/> {err}
          </p>
        )}
        <button style={{...btn,width:"100%",padding:"14px",fontSize:16,opacity:busy?0.7:1}} onClick={tryLogin} disabled={busy}>
          <Lock size={16}/> {busy?"Connexion…":"Se connecter"}
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
