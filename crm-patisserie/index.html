<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Pâtisserie CRM</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥐</text></svg>"/>
<style>

@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#FDFCF8;
  color:#1C2B3A;
  min-height:100dvh;
  font-size:15px;
  line-height:1.5;
}
input,select,button,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer}
img{max-width:100%}

/* ── Tokens ─────────────────────────────────────────── */
:root{
  --bg:       #FDFCF8;
  --surface:  #FFFFFF;
  --chalk:    #F0EBE1;
  --line:     #E4DDD2;
  --ink:      #1C2B3A;
  --muted:    #7A8A96;
  --wheat:    #D4922A;
  --sage:     #4A7C6F;
  --coral:    #C84B3C;
  --wheat-lt: #FDF3E3;
  --sage-lt:  #E8F3F0;
  --coral-lt: #FCEAE8;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r99:99px;
  --shadow-sm:0 1px 3px rgba(28,43,58,.08),0 1px 2px rgba(28,43,58,.05);
  --shadow-md:0 4px 16px rgba(28,43,58,.10),0 2px 4px rgba(28,43,58,.06);
  --shadow-lg:0 20px 60px rgba(28,43,58,.18),0 4px 12px rgba(28,43,58,.10);
}

/* ── Typography ─────────────────────────────────────── */
.serif{font-family:'Instrument Serif',Georgia,serif}
.num-xl{font-size:clamp(28px,6vw,42px);font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
.num-lg{font-size:clamp(20px,4vw,28px);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.label-xs{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

/* ── Layout shell ───────────────────────────────────── */
.app-shell{display:flex;flex-direction:column;min-height:100dvh}
.main-content{flex:1;padding:16px;max-width:768px;margin:0 auto;width:100%}

/* Header */
.app-header{
  background:var(--ink);color:#fff;
  padding:14px 16px 12px;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow-md);
}
.app-header-inner{max-width:768px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px}
.app-logo{display:flex;align-items:center;gap:10px}
.app-logo-icon{font-size:26px;line-height:1}
.app-logo-text h1{font-family:'Instrument Serif',Georgia,serif;font-size:20px;font-weight:400;line-height:1.1}
.app-logo-text p{font-size:11px;opacity:.6;margin-top:1px;letter-spacing:.02em}
.btn-logout{
  background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.85);border-radius:var(--r8);
  padding:7px 12px;font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
  transition:background .15s;white-space:nowrap;
}
.btn-logout:hover{background:rgba(255,255,255,.18)}

/* Bottom nav — mobile */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--surface);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -4px 20px rgba(28,43,58,.08);
}
.bottom-nav-inner{display:flex;max-width:768px;margin:0 auto}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:10px 4px 8px;border:none;background:transparent;
  color:var(--muted);font-size:10px;font-weight:500;line-height:1.2;
  transition:color .15s;min-width:0;
  -webkit-tap-highlight-color:transparent;
}
.nav-tab.active{color:var(--wheat)}
.nav-tab .tab-icon{font-size:20px;line-height:1}
.nav-tab .tab-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.nav-tab-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--wheat);border-radius:0 0 2px 2px;opacity:0;transition:opacity .15s}
.nav-tab.active .nav-tab-bar{opacity:1}

/* Top nav — desktop */
.top-nav{
  background:var(--surface);border-bottom:1px solid var(--line);
  position:sticky;top:60px;z-index:90;overflow-x:auto;
}
.top-nav-inner{max-width:768px;margin:0 auto;display:flex}
.top-nav-tab{
  flex:1;min-width:80px;padding:12px 8px 11px;border:none;background:transparent;
  color:var(--muted);font-size:12px;font-weight:500;border-bottom:3px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .15s,border-color .15s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.top-nav-tab.active{color:var(--ink);border-bottom-color:var(--wheat);font-weight:700}

@media(max-width:639px){
  .bottom-nav{display:block}
  .top-nav{display:none}
  .main-content{padding:12px 12px 80px}
}
@media(min-width:640px){
  .bottom-nav{display:none!important}
  .top-nav{display:block}
  .main-content{padding:20px 20px 40px}
  .app-header{padding:16px 20px}
}

/* ── Cards & sections ───────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r16);padding:16px;
  box-shadow:var(--shadow-sm);
  margin-bottom:14px;
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.card-title{display:flex;align-items:center;gap:8px}
.card-title h2{font-family:'Instrument Serif',Georgia,serif;font-size:18px;font-weight:400;color:var(--ink);line-height:1.2}
.card-title .icon{color:var(--wheat);flex-shrink:0}

/* ── KPI row ─────────────────────────────────────────── */
.kpi-row{display:flex;gap:10px;flex-wrap:wrap}
.kpi{
  flex:1 1 130px;min-width:120px;
  background:var(--chalk);border:1px solid var(--line);
  border-radius:var(--r12);padding:12px 14px;
}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.kpi-value{font-family:'Inter',sans-serif;font-size:clamp(18px,4vw,26px);font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1;color:var(--ink)}
.kpi-value.green{color:var(--sage)}
.kpi-value.red{color:var(--coral)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Forms ───────────────────────────────────────────── */
.field{margin-bottom:0}
.field-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.field-input{
  width:100%;background:var(--surface);border:1.5px solid var(--line);
  border-radius:var(--r10,10px);padding:10px 12px;color:var(--ink);
  outline:none;transition:border-color .15s,box-shadow .15s;
  font-size:15px;
}
.field-input:focus{border-color:var(--wheat);box-shadow:0 0 0 3px rgba(212,146,42,.12)}
.field-input::placeholder{color:var(--muted)}
.form-grid{display:grid;gap:12px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-full{grid-column:1/-1}
@media(max-width:400px){.form-grid-2{grid-template-columns:1fr}}

/* ── Buttons ─────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--r10,10px);
  padding:11px 16px;font-weight:700;font-size:14px;
  transition:filter .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-wheat{background:var(--wheat);color:#fff}
.btn-wheat:hover{filter:brightness(1.1)}
.btn-sage{background:var(--sage);color:#fff}
.btn-sage:hover{filter:brightness(1.1)}
.btn-coral{background:var(--coral);color:#fff}
.btn-coral:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn-ghost:hover{background:var(--chalk)}
.btn-danger-ghost{background:transparent;border:1.5px solid var(--coral);color:var(--coral)}
.btn-icon{background:transparent;border:none;color:var(--coral);padding:6px;min-height:36px;min-width:36px;border-radius:var(--r8);display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{background:var(--coral-lt)}
.btn-full{width:100%}
.btn-lg{padding:14px 20px;font-size:16px;min-height:52px}

/* ── Tables ─────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:var(--r12);border:1px solid var(--line)}
.data-table{width:100%;border-collapse:collapse;min-width:400px}
.data-table thead tr{background:var(--ink)}
.data-table th{
  padding:10px 12px;font-size:11px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.9);
  text-align:left;white-space:nowrap;
}
.data-table th.r{text-align:right}
.data-table td{
  padding:10px 12px;font-size:13px;color:var(--ink);
  border-bottom:1px solid var(--line);vertical-align:middle;
}
.data-table td.r{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.data-table td.muted{color:var(--muted);font-size:12px}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:nth-child(even){background:var(--chalk)}
.data-table .row-total td{background:var(--ink)!important;color:#fff;font-weight:800;font-size:14px;border-top:2px solid var(--wheat)}
.data-table .row-total td.r{color:#fff}
.data-table .row-sub td{background:var(--chalk)!important;font-style:italic;color:var(--muted)}
.data-table .row-driver td{background:var(--chalk)!important;color:var(--wheat);font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase}

/* ── Dividers & lines ───────────────────────────────── */
.divider{border:none;border-top:1px solid var(--line);margin:12px 0}
.divider-gold{border-top:2px solid var(--wheat)}

/* ── Status tags ─────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r99);font-size:12px;font-weight:700;white-space:nowrap}
.tag-sage{background:var(--sage-lt);color:var(--sage)}
.tag-coral{background:var(--coral-lt);color:var(--coral)}
.tag-wheat{background:var(--wheat-lt);color:var(--wheat)}
.tag-muted{background:var(--chalk);color:var(--muted)}

/* ── List rows ───────────────────────────────────────── */
.list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.list-row:last-child{border-bottom:none}
.list-row-main{flex:1;min-width:0}
.list-row-title{font-weight:600;color:var(--ink);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-row-sub{font-size:12px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-row-amount{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:14px;color:var(--ink)}

/* ── Client cards (Chauffeur) ────────────────────────── */
.client-card{border-radius:var(--r12);border:1px solid var(--line);overflow:hidden;margin-bottom:12px;background:var(--surface)}
.client-card-header{padding:12px 14px;background:var(--chalk);display:flex;justify-content:space-between;align-items:center;gap:8px}
.client-card-body{padding:12px 14px}
.client-card.border-wheat{border-left:4px solid var(--wheat)}
.client-card.border-sage{border-left:4px solid var(--sage)}
.client-card.border-coral{border-left:4px solid var(--coral)}

/* ── Alerts / confirmations ─────────────────────────── */
.alert{border-radius:var(--r12);padding:12px 14px;display:flex;align-items:flex-start;gap:8px;font-size:13px}
.alert-coral{background:var(--coral-lt);border:1px solid rgba(200,75,60,.2);color:var(--coral)}
.alert-sage{background:var(--sage-lt);border:1px solid rgba(74,124,111,.2);color:var(--sage)}
.alert-wheat{background:var(--wheat-lt);border:1px solid rgba(212,146,42,.2);color:var(--wheat)}
.confirm-box{background:var(--coral-lt);border:1.5px solid var(--coral);border-radius:var(--r12);padding:14px;margin-top:12px}
.confirm-box p{font-size:13px;font-weight:600;color:var(--coral);margin-bottom:10px}
.confirm-actions{display:flex;gap:8px}

/* ── Modal overlay ───────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(28,43,58,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal-box{background:var(--surface);border-radius:var(--r20);width:100%;max-width:600px;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-header{background:var(--ink);padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-family:'Instrument Serif',Georgia,serif;font-size:19px;font-weight:400;color:#fff}
.modal-header p{font-size:12px;color:rgba(255,255,255,.65);margin-top:2px}
.modal-body{padding:18px 20px}

/* ── Login screen ────────────────────────────────────── */
.login-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--ink)}
.login-card{background:var(--surface);border-radius:var(--r20);width:100%;max-width:360px;padding:28px 24px;box-shadow:var(--shadow-lg)}
.login-hero{text-align:center;margin-bottom:24px}
.login-hero .emoji{font-size:44px;line-height:1;display:block;margin-bottom:10px}
.login-hero h1{font-family:'Instrument Serif',Georgia,serif;font-size:26px;font-weight:400;color:var(--ink);margin-bottom:4px}
.login-hero p{font-size:13px;color:var(--muted)}

/* ── Settings groups ─────────────────────────────────── */
.settings-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}
.settings-row:last-child{border-bottom:none}
.settings-row-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.settings-row-fields:last-child{border-bottom:none}

/* ── Bon de livraison ────────────────────────────────── */
.bon-parties{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.bon-partie{background:var(--chalk);border-radius:var(--r12);padding:12px 14px;border:1px solid var(--line)}
.bon-sig{background:var(--chalk);border:1px dashed var(--line);border-radius:var(--r12);padding:14px;min-height:72px}

/* ── Validation strip ────────────────────────────────── */
.validate-strip{background:var(--chalk);border:1px solid var(--line);border-radius:var(--r12);padding:14px;margin-top:14px}
.validate-strip-row{display:flex;justify-content:space-between;font-size:14px;padding:2px 0;color:var(--muted)}
.validate-strip-total{display:flex;justify-content:space-between;font-size:17px;padding:8px 0 10px;border-top:1px dashed var(--line);margin-top:6px}

/* ── History accordion ───────────────────────────────── */
.hist-row{border:1px solid var(--line);border-radius:var(--r12);margin-bottom:10px;overflow:hidden}
.hist-row-header{display:flex;align-items:center;gap:10px;padding:12px;background:var(--chalk)}
.hist-row-body{padding:10px 12px 12px}
.hist-detail-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
.hist-detail-row:last-child{border-bottom:none}

/* ── Print styles ────────────────────────────────────── */
@media print{
  .app-header,.top-nav,.bottom-nav,.btn-logout,.btn{display:none!important}
  .main-content{padding:0!important;max-width:100%!important}
  .card{box-shadow:none;border:none;padding:8px 0}
  body{font-size:12px}
  .no-print{display:none!important}
}

/* ── Quick-reorder ───────────────────────────────────── */
.reorder-card{border:1px solid var(--line);border-radius:var(--r12);margin-bottom:10px;overflow:hidden}
.reorder-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--chalk)}
.reorder-body{padding:12px 14px}
.reorder-line{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.reorder-line:last-child{border-bottom:none}
.reorder-line-name{flex:1;min-width:0;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qty-input{width:70px;padding:7px 8px;text-align:center;font-variant-numeric:tabular-nums;font-size:15px;font-weight:700;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r8);outline:none}
.qty-input:focus{border-color:var(--wheat)}
.reorder-amount{min-width:72px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink)}

/* ── Draft list ──────────────────────────────────────── */
.draft-line{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.draft-line:last-child{border-bottom:none}
.draft-client{font-weight:700;font-size:14px;color:var(--ink)}
.draft-sub{font-size:12px;color:var(--muted)}
.draft-amount{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px;color:var(--ink);white-space:nowrap}

/* ── Recap by product ────────────────────────────────── */
.product-recap{margin-top:18px;padding-top:16px;border-top:2px solid var(--wheat)}
.product-recap-title{font-family:'Instrument Serif',Georgia,serif;font-size:16px;color:var(--wheat);margin-bottom:10px}
.product-recap-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)}
.product-recap-row:last-child{border-bottom:none}
.product-recap-name{font-size:14px;color:var(--ink);font-weight:500}
.product-recap-badge{background:var(--wheat);color:#fff;border-radius:var(--r99);padding:2px 10px;font-size:12px;font-weight:700}
.product-recap-amount{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px;color:var(--ink)}
.product-recap-total{display:flex;justify-content:space-between;padding:10px 0 2px;font-weight:800;font-size:15px;color:var(--ink);border-top:2px solid var(--line);margin-top:4px}

/* ── Section tabs (Proprietaire) ─────────────────────── */
.section-tabs{display:flex;gap:8px;margin-bottom:16px}
.section-tab{flex:1;padding:11px 8px;border-radius:var(--r10,10px);font-weight:700;font-size:13px;border:1.5px solid var(--line);background:var(--surface);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.section-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ── Misc ────────────────────────────────────────────── */
.text-muted{color:var(--muted);font-size:13px}
.text-sm{font-size:12px;color:var(--muted);margin-top:6px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.gap-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.day-header{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:8px;margin-bottom:10px;border-bottom:2px solid var(--wheat)}
.day-header-date{font-family:'Instrument Serif',Georgia,serif;font-size:16px;color:var(--wheat);text-transform:capitalize}
.day-header-total{font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);font-size:15px}

</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;
// Marqueur de build affiché dans le pied de page — permet de vérifier d'un coup d'œil
// que le navigateur charge bien la dernière version (et non un ancien fichier en cache).
const APP_VERSION = "2026.07.23-selfheal";
const mkIcon = (g) => ({ size = 16, color }) =>
  React.createElement("span", { style: { fontSize: size, lineHeight: 1, color, display: "inline-block" } }, g);
const ChefHat = mkIcon("👨‍🍳");
const Truck = mkIcon("🚚");
const Crown = mkIcon("👑");
const Plus = mkIcon("➕");
const Trash2 = mkIcon("🗑️");
const AlertTriangle = mkIcon("⚠️");

/* ---------- Utils ---------- */
const uid       = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

const netQty    = (d) => Math.max(0, (Number(d.quantity)||0) - (Number(d.returnedQty)||0));
// Le montant dû tient toujours compte des retours : un produit retourné n'est plus facturé.

// Retourne le prix unitaire d'un produit pour un client donné :
// cherche d'abord un tarif spécial, revient au prix catalogue sinon.
function getUnitPrice(clientId, productId, clientPrices, products) {
  const specific = (clientPrices||[]).find(pc => pc.clientId===clientId && pc.productId===productId);
  if (specific) return specific.prix;
  return (products||[]).find(p => p.id===productId)?.price || 0;
}

// Regroupe les produits qui ont 3 variantes (Margarine / 60/40 / Pur beurre) sous un seul
// "produit de base" pour simplifier la saisie. Un produit sans variante reste seul dans son groupe.
const VARIANT_SUFFIXES = ["Margarine", "60/40", "Pur beurre"];
function groupProductsByBase(products) {
  const groups = {}; // baseName -> { base, category, variants: [{suffix, product}], single: product|null }
  const order = [];
  products.forEach(p => {
    let base = p.name, suffix = null;
    for (const suf of VARIANT_SUFFIXES) {
      if (p.name.endsWith(" " + suf)) { base = p.name.slice(0, -(suf.length+1)); suffix = suf; break; }
    }
    if (!groups[base]) { groups[base] = { base, category: p.category || "Autres", variants: [], single: null }; order.push(base); }
    if (suffix) groups[base].variants.push({ suffix, product: p });
    else groups[base].single = p; // produit sans variante (ou nom de base saisi tel quel)
  });
  return order.map(b => groups[b]).sort((a,b)=>a.base.localeCompare(b.base,"fr"));
}

// Trie par type de variante (Pur beurre → 60/40 → Margarine → sans variante)
// puis alphabétiquement par nom de base à l'intérieur de chaque groupe.
function sortByBase(items) {
  const SUFFIX_ORDER = {"Pur beurre":0,"60/40":1,"Margarine":2};
  function getSuffix(n) {
    n = n||"";
    for (const suf of VARIANT_SUFFIXES) { if (n.endsWith(" "+suf)) return suf; }
    return null;
  }
  function baseName(n) {
    n = n||"";
    for (const suf of VARIANT_SUFFIXES) { if (n.endsWith(" "+suf)) return n.slice(0,-(suf.length+1)); }
    return n;
  }
  return [...items].sort((a,b) => {
    const na = a.productName||a.name||"", nb = b.productName||b.name||"";
    const sa = getSuffix(na), sb = getSuffix(nb);
    const oa = sa!==null ? (SUFFIX_ORDER[sa]??3) : 3;
    const ob = sb!==null ? (SUFFIX_ORDER[sb]??3) : 3;
    if (oa!==ob) return oa-ob;
    return baseName(na).localeCompare(baseName(nb),"fr");
  });
}

// Ordre d'affichage des catégories tel que défini dans le catalogue papier
const CATEGORY_ORDER = ["Viennoiserie", "Cake & Biscuit", "Salée", "Gâteau français", "Autres"];
// Regroupe les groupes de produits (sortie de groupProductsByBase) par catégorie, dans l'ordre fixe ci-dessus.
function groupByCategory(baseGroups) {
  const byCat = {};
  baseGroups.forEach(g => { (byCat[g.category] = byCat[g.category] || []).push(g); });
  return CATEGORY_ORDER.filter(c => byCat[c]).map(c => ({ category: c, groups: byCat[c] }))
    .concat(Object.keys(byCat).filter(c => !CATEGORY_ORDER.includes(c)).map(c => ({ category: c, groups: byCat[c] })));
}
