<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu — Scannez, commandez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --semolina: #F2E8D8; --paprika: #C1502E; --olive: #5B6B3F;
    --char: #2A211B; --clay: #8C6A52; --line: rgba(42,33,27,0.12);
    --cream-card: #FBF6EC;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--semolina); color:var(--char); font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:96px; min-height:100vh; }

  .table-bar{ position:sticky; top:0; z-index:30; background:var(--char); color:var(--semolina);
    padding:10px 20px; display:flex; align-items:center; justify-content:space-between; font-size:13px; }
  .table-bar .tag{ display:flex; align-items:center; gap:8px; }
  .table-bar .dot{ width:7px; height:7px; border-radius:50%; background:#7FA66B; box-shadow:0 0 0 3px rgba(127,166,107,0.25); }
  .table-bar .dot.off{ background:#B33A2E; box-shadow:0 0 0 3px rgba(179,58,46,0.25); }

  .hero{ padding:34px 24px 22px; }
  .hero .eyebrow{ font-size:12px; text-transform:uppercase; letter-spacing:0.16em; color:var(--clay); font-weight:600; margin-bottom:10px; }
  .hero h1{ font-family:'Fraunces',serif; font-weight:600; font-size:36px; line-height:1.05; }
  .hero h1 em{ font-style:italic; font-weight:300; color:var(--paprika); }

  .state-screen{ padding:80px 30px; text-align:center; }
  .state-screen .spinner{ width:36px; height:36px; border:3px solid var(--line); border-top-color:var(--paprika);
    border-radius:50%; margin:0 auto 20px; animation:spin 0.8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .state-screen p{ color:var(--clay); font-size:14px; line-height:1.6; }
  .state-screen.error h2{ font-family:'Fraunces',serif; font-size:21px; margin-bottom:10px; }

  .cat-nav{ position:sticky; top:41px; z-index:25; background:var(--semolina); border-bottom:1px solid var(--line);
    padding:14px 24px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; }
  .cat-nav::-webkit-scrollbar{ display:none; }
  .cat-pill{ flex:0 0 auto; padding:8px 16px; border-radius:100px; font-size:13.5px; font-weight:600;
    white-space:nowrap; background:transparent; color:var(--char); opacity:0.55; border:1px solid var(--line); cursor:pointer; }
  .cat-pill.active{ background:var(--char); color:var(--semolina); opacity:1; border-color:var(--char); }

  .menu{ padding:8px 20px 20px; }
  .section-title{ font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin:30px 4px 4px;
    display:flex; align-items:baseline; gap:10px; }
  .section-title .count{ font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:var(--clay); opacity:0.7; }

  .dish{ display:flex; gap:14px; padding:16px 4px; border-bottom:1px solid var(--line); }
  .dish:last-child{ border-bottom:none; }
  .dish-photo{ width:78px; height:78px; border-radius:14px; flex:0 0 78px; background-size:cover; background-position:center; }
  .dish-photo.unavailable{ filter:grayscale(0.8) brightness(0.85); opacity:0.5; }
  .dish-info{ flex:1; display:flex; flex-direction:column; justify-content:center; min-width:0; }
  .dish-name{ font-size:15.5px; font-weight:700; margin-bottom:3px; }
  .dish-desc{ font-size:12.5px; color:var(--char); opacity:0.55; line-height:1.4; margin-bottom:8px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .dish-foot{ display:flex; align-items:center; justify-content:space-between; }
  .dish-price{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; color:var(--paprika); }
  .badge-out{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--clay);
    background:rgba(140,106,82,0.12); padding:3px 9px; border-radius:6px; }

  .qty-control{ display:flex; align-items:center; gap:10px; background:var(--char); border-radius:100px; padding:4px; }
  .qty-btn{ width:26px; height:26px; border-radius:50%; border:none; background:var(--semolina); color:var(--char);
    font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; line-height:1; }
  .qty-num{ color:var(--semolina); font-size:13.5px; font-weight:700; min-width:14px; text-align:center; }
  .add-btn{ background:var(--char); color:var(--semolina); border:none; width:34px; height:34px; border-radius:50%;
    font-size:18px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  .cart-bar{ position:fixed; left:16px; right:16px; bottom:16px; z-index:40; background:var(--paprika); border-radius:18px;
    padding:14px 18px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 12px 28px rgba(193,80,46,0.35);
    transform:translateY(120%); opacity:0; transition:transform 0.35s cubic-bezier(.2,.9,.25,1), opacity 0.3s ease; cursor:pointer; }
  .cart-bar.visible{ transform:translateY(0); opacity:1; }
  .cart-bar .left{ display:flex; align-items:center; gap:12px; color:#fff; }
  .cart-count{ background:rgba(255,255,255,0.22); width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
  .cart-bar .total{ font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:#fff; }

  .overlay{ position:fixed; inset:0; background:rgba(20,15,11,0.5); z-index:50; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .drawer{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:var(--cream-card); border-radius:24px 24px 0 0;
    max-height:84vh; display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.4s cubic-bezier(.2,.9,.2,1);
    box-shadow:0 -10px 40px rgba(0,0,0,0.2); }
  .drawer.open{ transform:translateY(0); }
  .drawer-handle{ width:36px; height:4px; background:var(--line); border-radius:10px; margin:12px auto 4px; }
  .drawer-head{ padding:14px 22px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); }
  .drawer-head h2{ font-family:'Fraunces',serif; font-size:21px; font-weight:600; }
  .drawer-close{ width:30px; height:30px; border-radius:50%; border:none; background:var(--line); color:var(--char); font-size:16px; cursor:pointer; }
  .drawer-body{ flex:1; overflow-y:auto; padding:6px 22px; }
  .cart-item{ display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); }
  .cart-item-name{ font-size:14.5px; font-weight:700; margin-bottom:2px; }
  .cart-item-note input{ width:100%; border:none; background:transparent; font-size:12px; font-family:'Inter',sans-serif;
    color:var(--char); padding:4px 0; border-bottom:1px dashed var(--line); }
  .cart-item-note input::placeholder{ color:var(--clay); opacity:0.6; }
  .cart-item-price{ font-family:'Fraunces',serif; font-weight:600; font-size:14px; color:var(--paprika); white-space:nowrap; }
  .empty-cart{ text-align:center; padding:60px 20px; color:var(--clay); }
  .empty-cart .icon{ font-size:34px; margin-bottom:10px; display:block; }

  .global-note{ padding:14px 0 6px; }
  .global-note label{ font-size:12px; font-weight:700; color:var(--clay); text-transform:uppercase; letter-spacing:0.04em; }
  .global-note input{ width:100%; margin-top:8px; padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    background:#fff; font-family:'Inter',sans-serif; font-size:13.5px; }

  .drawer-foot{ padding:18px 22px 26px; border-top:1px solid var(--line); background:var(--cream-card); }
  .total-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  .total-row .label{ font-size:13.5px; color:var(--char); opacity:0.6; font-weight:600; }
  .total-row .amount{ font-family:'Fraunces',serif; font-size:24px; font-weight:600; }
  .submit-btn{ width:100%; background:var(--char); color:var(--semolina); border:none; padding:16px; border-radius:14px;
    font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .submit-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .submit-btn .spin{ width:16px; height:16px; border:2px solid rgba(242,232,216,0.3); border-top-color:var(--semolina);
    border-radius:50%; animation:spin 0.7s linear infinite; }
  .form-error{ color:var(--paprika); font-size:12.5px; font-weight:600; margin-top:10px; text-align:center; }

  .confirm-screen{ position:fixed; inset:0; background:var(--char); z-index:80; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:40px; opacity:0; pointer-events:none; transition:opacity 0.4s ease; }
  .confirm-screen.show{ opacity:1; pointer-events:auto; }
  .confirm-mark{ width:74px; height:74px; border-radius:50%; background:var(--olive); display:flex; align-items:center;
    justify-content:center; margin-bottom:26px; animation:pop 0.5s cubic-bezier(.2,1.4,.4,1) 0.1s both; }
  @keyframes pop{ 0%{ transform:scale(0); } 100%{ transform:scale(1); } }
  .confirm-screen h2{ font-family:'Fraunces',serif; color:var(--semolina); font-size:26px; font-weight:600; margin-bottom:10px; }
  .confirm-screen p{ color:var(--semolina); opacity:0.6; font-size:14px; line-height:1.6; max-width:30ch; }
  .confirm-meta{ margin-top:30px; display:flex; gap:24px; }
  .confirm-meta div{ text-align:center; }
  .confirm-meta .v{ font-family:'Fraunces',serif; color:var(--semolina); font-size:19px; font-weight:600; }
  .confirm-meta .k{ color:var(--clay); font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; }
  .confirm-close{ margin-top:36px; background:transparent; border:1px solid rgba(242,232,216,0.25); color:var(--semolina);
    padding:12px 28px; border-radius:100px; font-size:13px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>

  <div class="table-bar">
    <div class="tag"><span class="dot" id="connDot"></span> <span id="connLabel">Connexion…</span></div>
    <div id="restoName">—</div>
  </div>

  <div id="loadingState" class="state-screen">
    <div class="spinner"></div>
    <p>Chargement du menu…</p>
  </div>

  <div id="errorState" class="state-screen error" style="display:none;">
    <h2>Oups</h2>
    <p id="errorMsg">Une erreur est survenue.</p>
  </div>

  <div id="appContent" style="display:none;">
    <div class="hero">
      <div class="eyebrow">Carte du jour</div>
      <h1>Composez<br><em>votre repas</em></h1>
    </div>
    <div class="cat-nav" id="catNav"></div>
    <div class="menu" id="menu"></div>
  </div>

  <div class="cart-bar" id="cartBar">
    <div class="left">
      <div class="cart-count" id="cartCount">0</div>
      <div class="label">Voir la commande</div>
    </div>
    <div class="total" id="cartTotal">0,000 DT</div>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <h2>Votre commande</h2>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-foot">
      <div class="global-note">
        <label>Note pour le serveur (optionnel)</label>
        <input type="text" id="globalNote" placeholder="Ex : table près de la fenêtre, allergies...">
      </div>
      <div class="total-row">
        <span class="label">Total</span>
        <span class="amount" id="drawerTotal">0,000 DT</span>
      </div>
      <button class="submit-btn" id="submitBtn">Envoyer ma commande →</button>
      <div class="form-error" id="formError" style="display:none;"></div>
    </div>
  </div>

  <div class="confirm-screen" id="confirmScreen">
    <div class="confirm-mark">
      <svg viewBox="0 0 24 24" fill="none" width="32" height="32"><path d="M5 13l4 4L19 7" stroke="#F2E8D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2>Commande envoyée</h2>
    <p>Votre serveur a été notifié et arrive pour confirmer votre commande.</p>
    <div class="confirm-meta">
      <div><div class="v" id="confirmCount">0</div><div class="k">Articles</div></div>
      <div><div class="v" id="confirmTotal">0,000</div><div class="k">Total DT</div></div>
      <div><div class="v" id="confirmCode">—</div><div class="k">N° commande</div></div>
    </div>
    <button class="confirm-close" id="confirmClose">Retour au menu</button>
  </div>

<script>
// ---------- CONFIG ----------
const API_BASE = '/api'; // adapter si l'app est servie depuis un sous-dossier
function esc(s){const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML;}

// Récupère le qr_token depuis l'URL : ?t=xxxx
const params = new URLSearchParams(window.location.search);
const QR_TOKEN = params.get('t');

let MENU = [];
let DEVISE = 'DT';
const cart = {}; // { itemId: { item, qty, note } }

function fmt(n){ return n.toFixed(3).replace('.', ',') + ' ' + DEVISE; }

// ---------- CHARGEMENT INITIAL ----------
async function loadMenu(){
  if(!QR_TOKEN){
    showError("Aucune table détectée. Veuillez scanner le QR code sur votre table.");
    return;
  }
  try{
    const res = await fetch(`${API_BASE}/menu.php?t=${encodeURIComponent(QR_TOKEN)}`);
    const data = await res.json();
    if(!data.success){
      showError(data.error || "Impossible de charger le menu.");
      return;
    }
    MENU = data.menu;
    DEVISE = data.restaurant.devise || 'DT';
    document.getElementById('restoName').textContent = data.restaurant.nom + ' · Table ' + data.table.numero;
    document.getElementById('connDot').classList.remove('off');
    document.getElementById('connLabel').textContent = 'Connecté · Table ' + data.table.numero;

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';

    renderCatNav();
    renderMenu();
  }catch(e){
    showError("Connexion au serveur impossible. Vérifiez votre connexion internet.");
  }
}

function showError(msg){
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('connDot').classList.add('off');
  document.getElementById('connLabel').textContent = 'Hors ligne';
}

// ---------- RENDU MENU ----------
function renderCatNav(){
  const nav = document.getElementById('catNav');
  nav.innerHTML = MENU.map((sec, i) =>
    `<button class="cat-pill ${i===0?'active':''}" data-cat="${sec.id}">${sec.nom}</button>`
  ).join('');
  nav.querySelectorAll('.cat-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.getElementById('sec-' + pill.dataset.cat).scrollIntoView({ behavior:'smooth', block:'start' });
    });
  });
}

function renderMenu(){
  const menu = document.getElementById('menu');
  menu.innerHTML = MENU.map(sec => `
    <div id="sec-${sec.id}">
      <div class="section-title">${sec.nom} <span class="count">${sec.items.length} plats</span></div>
      ${sec.items.map(item => dishHTML(item)).join('')}
    </div>
  `).join('');
  MENU.forEach(sec => sec.items.forEach(item => { if(item.disponible) renderQtyZone(item); }));
}

function dishHTML(item){
  return `
    <div class="dish" data-id="${item.id}">
      <div class="dish-photo ${!item.disponible ? 'unavailable' : ''}" style="background-image:url('${item.photo || ''}')"></div>
      <div class="dish-info">
        <div class="dish-name">${esc(item.nom)}</div>
        <div class="dish-desc">${esc(item.description || '')}</div>
        <div class="dish-foot">
          <div class="dish-price">${fmt(item.prix)}</div>
          ${item.disponible ? `<div class="qty-zone" id="qty-zone-${item.id}"></div>` : `<span class="badge-out">Indisponible</span>`}
        </div>
      </div>
    </div>
  `;
}

function renderQtyZone(item){
  const zone = document.getElementById('qty-zone-' + item.id);
  if(!zone) return;
  const qty = cart[item.id] ? cart[item.id].qty : 0;
  if(qty === 0){
    zone.innerHTML = `<button class="add-btn" aria-label="Ajouter">+</button>`;
    zone.querySelector('.add-btn').addEventListener('click', () => updateQty(item, 1));
  } else {
    zone.innerHTML = `
      <div class="qty-control">
        <button class="qty-btn" data-action="minus">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" data-action="plus">+</button>
      </div>`;
    zone.querySelector('[data-action="minus"]').addEventListener('click', () => updateQty(item, -1));
    zone.querySelector('[data-action="plus"]').addEventListener('click', () => updateQty(item, 1));
  }
}

function updateQty(item, delta){
  if(!cart[item.id]) cart[item.id] = { item, qty:0, note:'' };
  cart[item.id].qty += delta;
  if(cart[item.id].qty <= 0) delete cart[item.id];
  renderQtyZone(item);
  renderCartBar();
}

function cartStats(){
  let count = 0, total = 0;
  Object.values(cart).forEach(c => { count += c.qty; total += c.qty * c.item.prix; });
  return { count, total };
}

function renderCartBar(){
  const { count, total } = cartStats();
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = fmt(total);
  document.getElementById('cartBar').classList.toggle('visible', count > 0);
}

function renderDrawer(){
  const body = document.getElementById('drawerBody');
  const entries = Object.values(cart);
  if(entries.length === 0){
    body.innerHTML = `<div class="empty-cart"><span class="icon">🍽️</span><p>Votre commande est vide.</p></div>`;
  } else {
    body.innerHTML = entries.map(c => `
      <div class="cart-item">
        <div class="qty-control" style="flex:0 0 auto;">
          <button class="qty-btn" data-action="minus" data-id="${c.item.id}">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" data-action="plus" data-id="${c.item.id}">+</button>
        </div>
        <div style="flex:1;">
          <div class="cart-item-name">${esc(c.item.nom)}</div>
          <div class="cart-item-note">
            <input type="text" placeholder="Note (ex : sans oignon)" value="${esc(c.note)}" data-note="${c.item.id}">
          </div>
        </div>
        <div class="cart-item-price">${fmt(c.qty * c.item.prix)}</div>
      </div>
    `).join('');
    body.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.id);
        updateQty(cart[id].item, btn.dataset.action === 'plus' ? 1 : -1);
        renderDrawer();
      });
    });
    body.querySelectorAll('[data-note]').forEach(input => {
      input.addEventListener('input', () => { cart[Number(input.dataset.note)].note = input.value; });
    });
  }
  const { total, count } = cartStats();
  document.getElementById('drawerTotal').textContent = fmt(total);
  document.getElementById('submitBtn').disabled = count === 0;
}

// ---------- DRAWER OPEN/CLOSE ----------
const drawer = document.getElementById('drawer');
const overlay = document.getElementById('overlay');
function openDrawer(){ renderDrawer(); drawer.classList.add('open'); overlay.classList.add('open'); }
function closeDrawer(){ drawer.classList.remove('open'); overlay.classList.remove('open'); }
document.getElementById('cartBar').addEventListener('click', openDrawer);
document.getElementById('drawerClose').addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);

// ---------- SUBMIT ORDER (vrai appel API) ----------
document.getElementById('submitBtn').addEventListener('click', async () => {
  const { count, total } = cartStats();
  if(count === 0) return;

  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('formError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Envoi en cours…';

  const items = Object.values(cart).map(c => ({
    article_id: c.item.id,
    quantite: c.qty,
    note: c.note || undefined,
  }));
  const noteGlobale = document.getElementById('globalNote').value.trim();

  try{
    const res = await fetch(`${API_BASE}/commande_create.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ qr_token: QR_TOKEN, items, note_globale: noteGlobale || undefined }),
    });
    const data = await res.json();

    if(!data.success){
      errEl.textContent = data.error || "Impossible d'envoyer la commande.";
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Envoyer ma commande →';
      return;
    }

    document.getElementById('confirmCount').textContent = data.commande.items_count;
    document.getElementById('confirmTotal').textContent = data.commande.total.toFixed(3).replace('.', ',');
    document.getElementById('confirmCode').textContent = '#' + data.commande.code;

    closeDrawer();
    setTimeout(() => document.getElementById('confirmScreen').classList.add('show'), 200);

  }catch(e){
    errEl.textContent = "Connexion impossible. Vérifiez votre connexion internet et réessayez.";
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Envoyer la commande en cuisine →';
  }
});

document.getElementById('confirmClose').addEventListener('click', () => {
  document.getElementById('confirmScreen').classList.remove('show');
  Object.keys(cart).forEach(k => delete cart[k]);
  document.getElementById('globalNote').value = '';
  document.getElementById('submitBtn').innerHTML = 'Envoyer ma commande →';
  document.getElementById('submitBtn').disabled = true;
  renderMenu();

});
