<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Le Médina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --semolina:#F2E8D8; --paprika:#C1502E; --char:#2A211B; --clay:#8C6A52; --line:rgba(42,33,27,0.12); --cream-card:#FBF6EC; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--char); min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'Inter',sans-serif; padding:24px; }
  .card{ background:var(--cream-card); border-radius:22px; padding:40px 30px; width:100%; max-width:380px; }
  .eyebrow{ font-size:11.5px; text-transform:uppercase; letter-spacing:0.14em; color:var(--clay); font-weight:700; margin-bottom:8px; text-align:center; }
  h1{ font-family:'Fraunces',serif; font-size:27px; font-weight:600; text-align:center; margin-bottom:30px; color:var(--char); }
  label{ font-size:12px; font-weight:700; color:var(--clay); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:7px; }
  .field{ margin-bottom:18px; }
  input{ width:100%; padding:13px 14px; border-radius:11px; border:1px solid var(--line); background:#fff;
    font-family:'Inter',sans-serif; font-size:14.5px; color:var(--char); }
  input:focus{ outline:none; border-color:var(--paprika); }
  button{ width:100%; background:var(--char); color:var(--semolina); border:none; padding:15px; border-radius:13px;
    font-size:14.5px; font-weight:700; cursor:pointer; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
  button:disabled{ opacity:0.5; }
  .spin{ width:15px; height:15px; border:2px solid rgba(242,232,216,0.3); border-top-color:var(--semolina); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .err{ color:var(--paprika); font-size:12.5px; font-weight:600; text-align:center; margin-top:14px; display:none; }
  .hint{ text-align:center; margin-top:24px; font-size:11.5px; color:var(--clay); opacity:0.7; line-height:1.6; }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Le Médina</div>
    <h1>Espace équipe</h1>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="loginBtn">Se connecter</button>
      <div class="err" id="errMsg"></div>
    </form>
    <div class="hint">Accès réservé aux serveurs et au propriétaire.<br>Le client n'a besoin d'aucune connexion.</div>
  </div>

<script>
const API_BASE = '/api';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Connexion…';

  try{
    const res = await fetch(`${API_BASE}/login.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();

    if(!data.success){
      err.textContent = data.error || 'Connexion impossible.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Se connecter';
      return;
    }

    localStorage.setItem('qrmenu_token', data.token);
    localStorage.setItem('qrmenu_user', JSON.stringify(data.user));

    // Redirige selon le rôle
    if(data.user.role === 'proprietaire'){
      window.location.href = '/public/proprietaire/index.html';
    } else {
      window.location.href = '/public/serveur/index.html';
    }
  }catch(e){
    err.textContent = 'Connexion au serveur impossible.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Se connecter';
  }
});

// Si déjà connecté, redirige automatiquement
(function(){
  const token = localStorage.getItem('qrmenu_token');
  const user = JSON.parse(localStorage.getItem('qrmenu_user') || 'null');
  if(token && user){
    window.location.href = user.role === 'proprietaire' ? '/public/proprietaire/index.html' : '/public/serveur/index.html';
  }
})();
</script>
</body>
</html>
