<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — Le Médina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --semolina:#F2E8D8; --paprika:#C1502E; --olive:#5B6B3F; --char:#2A211B; --clay:#8C6A52;
    --line:rgba(42,33,27,0.1); --cream-card:#FBF6EC; --warn:#C18A2E; --danger:#B33A2E; --info:#3D6B8C;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:#EDE3D1; color:var(--char); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; padding-bottom:40px; }
  .mono{ font-family:'DM Mono', monospace; }

  .topbar{ position:sticky; top:0; z-index:40; background:var(--char); color:var(--semolina); padding:16px 22px;
    display:flex; align-items:center; justify-content:space-between; }
  .topbar h1{ font-family:'Fraunces',serif; font-size:18px; font-weight:600; }
  .topbar .sub{ font-size:11px; opacity:0.5; margin-top:2px; }
  .topbar .right{ display:flex; align-items:center; gap:14px; }
  .logout-btn{ background:rgba(242,232,216,0.1); border:none; color:var(--semolina); font-size:11px; font-weight:700;
    padding:7px 12px; border-radius:8px; cursor:pointer; opacity:0.7; }

  .period-tabs{ display:flex; gap:8px; padding:16px 22px 4px; }
  .ptab{ padding:8px 16px; border-radius:100px; font-size:12.5px; font-weight:700; background:var(--cream-card);
    border:1px solid var(--line); color:var(--char); opacity:0.55; cursor:pointer; }
  .ptab.active{ opacity:1; background:var(--char); color:var(--semolina); border-color:var(--char); }

  .wrap{ padding:14px 22px 30px; max-width:1100px; margin:0 auto; }

  /* ---------- ALERTES ---------- */
  .alerts{ display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .alert{ padding:12px 14px; border-radius:12px; font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:10px; }
  .alert.haute{ background:rgba(179,58,46,0.12); color:var(--danger); border:1px solid rgba(179,58,46,0.2); }
  .alert.moyenne{ background:rgba(193,138,46,0.12); color:var(--warn); border:1px solid rgba(193,138,46,0.2); }
  .alert .ic{ font-size:15px; }

  /* ---------- KPI GRID ---------- */
  .kpi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:22px; }
  .kpi-card{ background:var(--cream-card); border-radius:16px; padding:18px; border:1px solid var(--line); }
  .kpi-card .label{ font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--clay); font-weight:700; margin-bottom:8px; }
  .kpi-card .value{ font-family:'Fraunces',serif; font-size:24px; font-weight:600; line-height:1.15; word-break:break-word; }
  .kpi-card .delta{ font-size:11.5px; font-weight:700; margin-top:6px; display:inline-flex; align-items:center; gap:3px; }
  .delta.up{ color:var(--olive); }
  .delta.down{ color:var(--danger); }
  .delta.flat{ color:var(--clay); }

  /* ---------- SECTIONS ---------- */
  .section{ background:var(--cream-card); border-radius:18px; padding:20px; border:1px solid var(--line); margin-bottom:16px; }
  .section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-head h2{ font-family:'Fraunces',serif; font-size:17px; font-weight:600; }
  .section-head .meta{ font-size:11px; color:var(--clay); }

  /* ---------- TOP ARTICLES ---------- */
  .top-row{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); }
  .top-row:last-child{ border-bottom:none; }
  .top-rank{ width:22px; height:22px; border-radius:50%; background:var(--char); color:var(--semolina); font-size:10.5px;
    font-weight:700; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .top-name{ flex:1; font-size:13.5px; font-weight:700; }
  .top-bar-bg{ flex:1; height:6px; background:var(--line); border-radius:4px; overflow:hidden; margin:0 10px; }
  .top-bar-fill{ height:100%; background:var(--paprika); border-radius:4px; }
  .top-qty{ font-size:12px; color:var(--clay); font-weight:700; min-width:50px; text-align:right; }

  /* ---------- HEURES DE POINTE (mini bar chart CSS) ---------- */
  .hours-chart{ display:flex; align-items:flex-end; gap:3px; height:120px; padding-top:10px; }
  .hour-bar{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:4px; }
  .hour-bar .bar{ width:100%; background:var(--paprika); border-radius:4px 4px 0 0; min-height:2px; opacity:0.85; }
  .hour-bar.peak .bar{ opacity:1; background:var(--char); }
  .hour-bar .lbl{ font-size:9px; color:var(--clay); font-weight:600; }

  /* ---------- SERVEURS ---------- */
  .server-row{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); }
  .server-row:last-child{ border-bottom:none; }
  .server-avatar{ width:34px; height:34px; border-radius:50%; background:var(--olive); color:#fff; font-size:12px;
    font-weight:700; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .server-info{ flex:1; }
  .server-name{ font-size:13.5px; font-weight:700; }
  .server-meta{ font-size:11px; color:var(--clay); margin-top:1px; }
  .server-ca{ font-family:'Fraunces',serif; font-weight:600; font-size:14.5px; }

  /* ---------- PREVISIONS ---------- */
  .forecast-box{ display:flex; gap:20px; align-items:center; }
  .forecast-figure{ text-align:center; }
  .forecast-figure .v{ font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--paprika); }
  .forecast-figure .k{ font-size:10.5px; color:var(--clay); text-transform:uppercase; letter-spacing:0.04em; margin-top:3px; }
  .forecast-note{ font-size:12px; color:var(--clay); line-height:1.5; flex:1; }

  /* ---------- EXPORT ---------- */
  .export-row{ display:flex; gap:10px; }
  .export-btn{ flex:1; background:var(--char); color:var(--semolina); border:none; padding:13px; border-radius:12px;
    font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .export-btn.secondary{ background:transparent; border:1px solid var(--line); color:var(--char); }

  .empty-mini{ text-align:center; padding:24px; color:var(--clay); font-size:12.5px; }
  .loading-overlay{ text-align:center; padding:60px; color:var(--clay); }
  .spinner{ width:30px; height:30px; border:3px solid var(--line); border-top-color:var(--paprika); border-radius:50%;
    margin:0 auto 14px; animation:spin 0.8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  @media (min-width:760px){
    .kpi-grid{ grid-template-columns:repeat(4,1fr); }
    .two-col{ display:grid; grid-template-columns:1.3fr 1fr; gap:16px; align-items:start; }
  }

  /* TABS */
  .main-tabs{display:flex;gap:4px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--char);border-bottom:1px solid rgba(255,255,255,0.07)}
  .main-tabs::-webkit-scrollbar{display:none}
  .mtab{flex:0 0 auto;padding:8px 14px;border-radius:100px;font-size:12.5px;font-weight:700;background:rgba(242,232,216,0.1);border:none;color:rgba(242,232,216,0.55);cursor:pointer;display:flex;align-items:center;gap:6px}
  .mtab.active{background:var(--semolina);color:var(--char)}

  /* MODAL BOTTOM SHEET */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,15,11,0.55);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
  .modal-overlay.open{opacity:1;pointer-events:auto}
  .modal-box{background:var(--cream-card);width:100%;border-radius:22px 22px 0 0;padding:24px 22px 36px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .38s cubic-bezier(.2,.9,.2,1)}
  .modal-overlay.open .modal-box{transform:translateY(0)}
  .modal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:20px}
  .form-field{margin-bottom:16px}
  .form-field label{font-size:11.5px;font-weight:700;color:var(--clay);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:7px}
  .form-field input,.form-field select,.form-field textarea{width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line);background:#fff;font-family:'Inter',sans-serif;font-size:14px;color:var(--char)}
  .form-field input:focus,.form-field select:focus{outline:none;border-color:var(--paprika)}
  .btn-primary{width:100%;background:var(--char);color:var(--semolina);border:none;padding:15px;border-radius:13px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:4px}
  .btn-primary:disabled{opacity:.45}
  .btn-secondary{background:transparent;border:1px solid var(--line);color:var(--char);padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-danger{background:rgba(179,58,46,.1);border:1px solid rgba(179,58,46,.2);color:var(--danger);padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
  .modal-err{color:var(--danger);font-size:12.5px;font-weight:600;margin-top:10px;text-align:center;display:none}

  /* LIVE TAB (recycler style serveur) */
  .live-tabs{display:flex;gap:8px;padding:12px 16px 8px;overflow-x:auto;scrollbar-width:none}
  .live-tabs::-webkit-scrollbar{display:none}
  .ltab{flex:0 0 auto;padding:8px 14px;border-radius:100px;font-size:12.5px;font-weight:700;background:var(--cream-card);border:1px solid var(--line);color:var(--char);opacity:.6;cursor:pointer;display:flex;align-items:center;gap:7px}
  .ltab.active{opacity:1;background:var(--char);color:var(--semolina);border-color:var(--char)}
  .ltab .n{background:rgba(0,0,0,.12);border-radius:100px;padding:1px 7px;font-size:11px}
  .ltab.active .n{background:rgba(242,232,216,.2)}
  .live-board{padding:4px 16px 20px;display:flex;flex-direction:column;gap:12px}
  .order-card{background:var(--cream-card);border-radius:16px;padding:14px 16px;border:1px solid var(--line);position:relative}
  .order-card.new{border-color:var(--paprika);box-shadow:0 0 0 1px var(--paprika),0 8px 20px rgba(193,80,46,.15);animation:pulse-border 1.8s ease-in-out infinite}
  @keyframes pulse-border{0%,100%{box-shadow:0 0 0 1px var(--paprika),0 8px 20px rgba(193,80,46,.15)}50%{box-shadow:0 0 0 4px rgba(193,80,46,.25),0 8px 24px rgba(193,80,46,.22)}}
  .order-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
  .order-table{font-family:'Fraunces',serif;font-size:19px;font-weight:700}
  .order-id{font-size:11px;color:var(--clay);font-weight:600;margin-top:1px}
  .order-zone{font-size:10.5px;color:var(--clay);font-weight:600;background:rgba(140,106,82,.1);padding:2px 7px;border-radius:5px;margin-top:2px;display:inline-block}
  .order-timer .t{font-size:13px;font-weight:800;padding:4px 9px;border-radius:8px;background:rgba(91,107,63,.14);color:var(--olive)}
  .order-timer .t.warn{background:rgba(193,138,46,.18);color:var(--warn)}
  .order-timer .t.danger{background:rgba(179,58,46,.16);color:var(--danger)}
  .order-items{margin:10px 0 12px;padding-top:10px;border-top:1px dashed var(--line)}
  .order-item{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0}
  .order-item .q{font-weight:800;color:var(--paprika);margin-right:8px}
  .order-note{font-size:11.5px;color:var(--clay);background:rgba(140,106,82,.1);padding:5px 9px;border-radius:8px;margin-top:6px;display:inline-block}
  .order-foot{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .order-total{font-family:'Fraunces',serif;font-weight:700;font-size:16px}
  .order-action{flex:1;border:none;padding:11px 14px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;max-width:220px}
  .order-action.to-prep{background:var(--char);color:var(--semolina)}
  .order-action.to-ready{background:var(--warn);color:#fff}
  .order-action.to-served{background:var(--olive);color:#fff}
  .order-action.done{background:transparent;color:var(--clay);opacity:.6;cursor:default}
  .order-action:disabled{opacity:.5;cursor:wait}
  .empty-state{text-align:center;padding:60px 24px;color:var(--clay)}
  .empty-state .icon{font-size:30px;display:block;margin-bottom:10px}

  /* MENU TAB */
  .menu-wrap{padding:16px}
  .cat-section{margin-bottom:24px}
  .cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:10px 14px;background:var(--char);border-radius:12px;color:var(--semolina)}
  .cat-header h3{font-family:'Fraunces',serif;font-size:16px;font-weight:600}
  .cat-actions{display:flex;gap:8px}
  .article-card{background:var(--cream-card);border-radius:14px;padding:14px;border:1px solid var(--line);margin-bottom:10px;display:flex;gap:12px;align-items:center}
  .article-photo{width:56px;height:56px;border-radius:10px;background-size:cover;background-position:center;background-color:var(--line);flex:0 0 56px}
  .article-info{flex:1;min-width:0}
  .article-name{font-size:14.5px;font-weight:700;margin-bottom:3px}
  .article-price{font-family:'Fraunces',serif;font-size:14px;color:var(--paprika);font-weight:600}
  .article-desc{font-size:12px;color:var(--clay);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .article-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .toggle-dispo{padding:5px 10px;border-radius:7px;font-size:11.5px;font-weight:700;border:1px solid;cursor:pointer}
  .toggle-dispo.on{background:rgba(91,107,63,.1);color:var(--olive);border-color:rgba(91,107,63,.25)}
  .toggle-dispo.off{background:rgba(179,58,46,.1);color:var(--danger);border-color:rgba(179,58,46,.2)}
  .add-row{display:flex;justify-content:center;padding:8px 0}
  .add-btn-row{background:transparent;border:1.5px dashed var(--line);color:var(--clay);padding:10px 20px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;width:100%}
  .add-btn-row:hover{border-color:var(--paprika);color:var(--paprika)}

  /* TABLES TAB */
  .tables-wrap{padding:16px}
  .zone-group{margin-bottom:24px}
  .zone-label{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .table-card{background:var(--cream-card);border-radius:14px;padding:14px;border:1px solid var(--line);text-align:center}
  .table-num{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--char)}
  .table-zone-label{font-size:10.5px;color:var(--clay);margin-top:2px}
  .table-qr-link{display:block;margin-top:8px;font-size:11px;color:var(--paprika);font-weight:600;cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
  .table-delete{display:block;width:100%;margin-top:8px}

  /* EQUIPE TAB */
  .equipe-wrap{padding:16px}
  .user-card{background:var(--cream-card);border-radius:14px;padding:14px 16px;border:1px solid var(--line);margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .user-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex:0 0 38px}
  .user-avatar.prop{background:var(--paprika)}
  .user-avatar.serv{background:var(--olive)}
  .user-info{flex:1;min-width:0}
  .user-name{font-size:14.5px;font-weight:700}
  .user-meta{font-size:11.5px;color:var(--clay);margin-top:2px}
  .user-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .badge-actif{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(91,107,63,.12);color:var(--olive)}
  .badge-inactif{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(179,58,46,.1);color:var(--danger)}

  /* TOOLBAR BUTTONS */
  .tab-add-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--char);color:var(--semolina);border:none;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;margin:0 16px 16px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--danger);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:999;white-space:nowrap}

  @media(min-width:760px){
    .live-board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:18px 24px}
    .table-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div>
      <h1>Le Médina</h1>
      <div class="sub" id="lastUpdate">Synchronisation…</div>
    </div>
    <div class="right">
      <button class="logout-btn" id="logoutBtn">Quitter</button>
    </div>
  </div>

  <nav class="main-tabs" id="mainTabs">
    <button class="mtab active" data-tab="stats">📊 Stats</button>
    <button class="mtab" data-tab="live">🔴 Live</button>
    <button class="mtab" data-tab="menu">🍽 Menu</button>
    <button class="mtab" data-tab="tables">📍 Tables</button>
    <button class="mtab" data-tab="equipe">👥 Équipe</button>
  </nav>

  <!-- TAB STATS -->
  <div id="tab-stats">
    <div class="period-tabs">
      <button class="ptab active" data-periode="jour">Aujourd'hui</button>
      <button class="ptab" data-periode="semaine">Cette semaine</button>
      <button class="ptab" data-periode="mois">Ce mois</button>
    </div>

    <div class="wrap" id="wrap">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Chargement des statistiques…</p>
      </div>

      <div id="content" style="display:none;">
        <div class="alerts" id="alerts"></div>

        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="two-col">
          <div>
            <div class="section">
              <div class="section-head">
                <h2>Articles les plus vendus</h2>
                <span class="meta" id="topArticlesMeta"></span>
              </div>
              <div id="topArticles"></div>
            </div>

            <div class="section">
              <div class="section-head">
                <h2>Heures de pointe</h2>
                <span class="meta">Commandes par heure</span>
              </div>
              <div class="hours-chart" id="hoursChart"></div>
            </div>
          </div>

          <div>
            <div class="section">
              <div class="section-head"><h2>Performance équipe</h2></div>
              <div id="serverPerf"></div>
            </div>

            <div class="section">
              <div class="section-head"><h2>Prévision</h2></div>
              <div class="forecast-box" id="forecastBox"></div>
            </div>

            <div class="section">
              <div class="section-head"><h2>Export comptable</h2></div>
              <div class="export-row">
                <button class="export-btn" id="exportCsv">⬇ Export CSV</button>
                <button class="export-btn secondary" id="exportPrint">🖨 Imprimer</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB LIVE -->
  <div id="tab-live" style="display:none">
    <div class="live-tabs" id="liveTabs">
      <button class="ltab active" data-status="all">Toutes <span class="n" id="lAll">0</span></button>
      <button class="ltab" data-status="nouvelle">🔴 Nouvelles <span class="n" id="lNouvelle">0</span></button>
      <button class="ltab" data-status="en_cours">En prép. <span class="n" id="lEnCours">0</span></button>
      <button class="ltab" data-status="prete">Prêtes <span class="n" id="lPrete">0</span></button>
    </div>
    <div class="live-board" id="liveBoard"><div class="empty-state"><span class="icon">⏳</span><p>Chargement…</p></div></div>
  </div>

  <!-- TAB MENU -->
  <div id="tab-menu" style="display:none">
    <button class="tab-add-btn" id="btnAddCat">+ Nouvelle catégorie</button>
    <div class="menu-wrap" id="menuWrap"><div class="empty-state"><p>Chargement du menu…</p></div></div>
  </div>

  <!-- TAB TABLES -->
  <div id="tab-tables" style="display:none">
    <div style="display:flex;gap:8px;padding:0 16px 4px">
      <button class="tab-add-btn" id="btnAddTable" style="margin:16px 0 8px">+ Ajouter une table</button>
      <button class="tab-add-btn" id="btnAddZone" style="margin:16px 0 8px;background:transparent;border:1px solid var(--line);color:var(--char)">+ Nouvelle zone</button>
    </div>
    <div class="tables-wrap" id="tablesWrap"><div class="empty-state"><p>Chargement des tables…</p></div></div>
  </div>

  <!-- TAB EQUIPE -->
  <div id="tab-equipe" style="display:none">
    <button class="tab-add-btn" id="btnAddUser">+ Ajouter un membre</button>
    <div class="equipe-wrap" id="equipeWrap"><div class="empty-state"><p>Chargement de l'équipe…</p></div></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <div class="modal-title" id="modalTitle">—</div>
      <div id="modalContent"></div>
      <div class="modal-err" id="modalErr"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
const API_BASE = '/api';
const REFRESH_INTERVAL_MS = 15000;

const TOKEN = localStorage.getItem('qrmenu_token');
const USER = JSON.parse(localStorage.getItem('qrmenu_user') || 'null');
if(!TOKEN || !USER || USER.role !== 'proprietaire'){
  window.location.href = '../login.html';
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch(`${API_BASE}/logout.php`, { method:'POST', headers:{ 'Authorization':'Bearer '+TOKEN } }).catch(()=>{});
  localStorage.removeItem('qrmenu_token');
  localStorage.removeItem('qrmenu_user');
  window.location.href = '../login.html';
});

let currentPeriode = 'jour';
let lastData = null;

function fmtMoney(n){ return n.toFixed(3).replace('.', ',') + ' DT'; }

// ========== STATS TAB ==========
async function loadStats(){
  try{
    const res = await fetch(`${API_BASE}/stats.php?periode=${currentPeriode}`, {
      headers: { 'Authorization': 'Bearer ' + TOKEN },
    });
    if(res.status === 401){
      localStorage.removeItem('qrmenu_token'); localStorage.removeItem('qrmenu_user');
      window.location.href = '../login.html';
      return;
    }
    const data = await res.json();
    if(!data.success) throw new Error(data.error);

    lastData = data;
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('lastUpdate').textContent = 'Mis à jour à ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

    renderAlerts(data.alertes);
    renderKpis(data.kpis, currentPeriode);
    renderTopArticles(data.top_articles);
    renderHoursChart(data.par_heure);
    renderServerPerf(data.par_serveur);
    renderForecast(data.previsions);

  }catch(e){
    document.getElementById('lastUpdate').textContent = 'Synchronisation impossible — nouvel essai en cours…';
  }
}

function renderAlerts(alertes){
  const el = document.getElementById('alerts');
  if(!alertes || alertes.length === 0){ el.innerHTML = ''; return; }
  const icons = { retard:'⏱️', whatsapp:'📵', ca:'📉' };
  el.innerHTML = alertes.map(a => `
    <div class="alert ${a.gravite}"><span class="ic">${icons[a.type] || '⚠️'}</span> ${a.message}</div>
  `).join('');
}

function renderKpis(kpis, periode){
  const periodLabel = { jour:'vs hier', semaine:'vs sem. dernière', mois:'vs mois dernier' }[periode];
  let deltaHTML = '';
  if(kpis.ca_variation_pct !== null){
    const cls = kpis.ca_variation_pct > 0 ? 'up' : kpis.ca_variation_pct < 0 ? 'down' : 'flat';
    const arrow = kpis.ca_variation_pct > 0 ? '↑' : kpis.ca_variation_pct < 0 ? '↓' : '→';
    deltaHTML = `<div class="delta ${cls}">${arrow} ${Math.abs(kpis.ca_variation_pct)}% ${periodLabel}</div>`;
  } else {
    deltaHTML = `<div class="delta flat">Pas de données comparatives</div>`;
  }

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="label">Chiffre d'affaires</div>
      <div class="value">${fmtMoney(kpis.ca)}</div>
      ${deltaHTML}
    </div>
    <div class="kpi-card">
      <div class="label">Commandes</div>
      <div class="value">${kpis.nb_commandes}</div>
      <div class="delta flat">Période en cours</div>
    </div>
    <div class="kpi-card">
      <div class="label">Panier moyen</div>
      <div class="value">${fmtMoney(kpis.panier_moyen)}</div>
    </div>
    <div class="kpi-card">
      <div class="label">Prévision demain</div>
      <div class="value mono" style="font-size:21px;">${fmtMoney(lastData?.previsions?.projection_demain || 0)}</div>
    </div>
  `;
}

function renderTopArticles(items){
  const el = document.getElementById('topArticles');
  document.getElementById('topArticlesMeta').textContent = items.length ? `Top ${items.length}` : '';
  if(!items || items.length === 0){
    el.innerHTML = `<div class="empty-mini">Aucune vente sur cette période.</div>`;
    return;
  }
  const maxQty = Math.max(...items.map(i => i.quantite));
  el.innerHTML = items.map((it, i) => `
    <div class="top-row">
      <div class="top-rank">${i+1}</div>
      <div class="top-name">${it.nom}</div>
      <div class="top-bar-bg"><div class="top-bar-fill" style="width:${(it.quantite/maxQty*100).toFixed(0)}%"></div></div>
      <div class="top-qty">${it.quantite}× · ${fmtMoney(it.ca)}</div>
    </div>
  `).join('');
}

function renderHoursChart(parHeure){
  const el = document.getElementById('hoursChart');
  if(!parHeure || parHeure.length === 0){
    el.innerHTML = `<div class="empty-mini">Aucune commande sur cette période.</div>`;
    return;
  }
  const maxNb = Math.max(...parHeure.map(h => h.nb_commandes));
  const peakHeure = parHeure.find(h => h.nb_commandes === maxNb)?.heure;
  const hours = [];
  for(let h = 8; h <= 23; h++){
    const found = parHeure.find(x => x.heure === h);
    hours.push({ heure: h, nb_commandes: found ? found.nb_commandes : 0 });
  }
  const maxDisplay = Math.max(...hours.map(h => h.nb_commandes), 1);
  el.innerHTML = hours.map(h => `
    <div class="hour-bar ${h.heure === peakHeure ? 'peak' : ''}">
      <div class="bar" style="height:${h.nb_commandes > 0 ? Math.max((h.nb_commandes/maxDisplay*100), 8).toFixed(0) : 0}%"></div>
      <div class="lbl">${h.heure}h</div>
    </div>
  `).join('');
}

function renderServerPerf(serveurs){
  const el = document.getElementById('serverPerf');
  if(!serveurs || serveurs.length === 0){
    el.innerHTML = `<div class="empty-mini">Aucune donnée serveur sur cette période.</div>`;
    return;
  }
  el.innerHTML = serveurs.map(s => `
    <div class="server-row">
      <div class="server-avatar">${s.nom.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div>
      <div class="server-info">
        <div class="server-name">${s.nom}</div>
        <div class="server-meta">${s.nb_commandes} commandes${s.temps_moyen_min ? ' · ' + s.temps_moyen_min + ' min en moy.' : ''}</div>
      </div>
      <div class="server-ca">${fmtMoney(s.ca)}</div>
    </div>
  `).join('');
}

function renderForecast(prev){
  document.getElementById('forecastBox').innerHTML = `
    <div class="forecast-figure">
      <div class="v">${fmtMoney(prev.ca_moyen_7j)}</div>
      <div class="k">Moy. 7 jours</div>
    </div>
    <div class="forecast-note">
      Basé sur la moyenne mobile des 7 derniers jours. Cette estimation s'affine automatiquement à mesure que l'historique de commandes grandit.
    </div>
  `;
}

document.getElementById('exportCsv').addEventListener('click', () => {
  if(!lastData) return;
  let csv = 'Métrique,Valeur\n';
  csv += `Chiffre d'affaires,${lastData.kpis.ca}\n`;
  csv += `Nombre de commandes,${lastData.kpis.nb_commandes}\n`;
  csv += `Panier moyen,${lastData.kpis.panier_moyen}\n\n`;
  csv += 'Article,Quantité,CA\n';
  lastData.top_articles.forEach(a => { csv += `${a.nom},${a.quantite},${a.ca}\n`; });
  csv += '\nServeur,Commandes,CA\n';
  lastData.par_serveur.forEach(s => { csv += `${s.nom},${s.nb_commandes},${s.ca}\n`; });

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lemedina-stats-${currentPeriode}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('exportPrint').addEventListener('click', () => window.print());

document.querySelectorAll('.ptab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentPeriode = tab.dataset.periode;
    document.getElementById('loadingOverlay').style.display = 'block';
    document.getElementById('content').style.display = 'none';
    loadStats();
  });
});

// ========== TAB SWITCHING ==========
const TABS = ['stats','live','menu','tables','equipe'];
let liveOrders = [], liveFilter = 'all', livePollingInterval = null;

function switchTab(tab){
  TABS.forEach(t => {
    const el = document.getElementById('tab-'+t);
    if(el) el.style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.mtab').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  if(tab !== 'live' && livePollingInterval){ clearInterval(livePollingInterval); livePollingInterval=null; }
  if(tab === 'live') startLivePolling();
  if(tab === 'menu') loadMenuTab();
  if(tab === 'tables') loadTablesTab();
  if(tab === 'equipe') loadEquipeTab();
}
document.querySelectorAll('.mtab').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

// ========== TOAST ==========
function showToast(msg, color='var(--danger)'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color;
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)'},3000);
}

// ========== MODAL HELPERS ==========
function openModal(title, html, onConfirm){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalErr').style.display='none';
  document.getElementById('modalOverlay').classList.add('open');
  if(onConfirm) document.getElementById('modalConfirmBtn')?.addEventListener('click', onConfirm);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

// ========== ESC + HELPERS ==========
function esc(s){const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML;}
function fmt(n){return Number(n).toFixed(3).replace('.',',')+' DT';}
function timeAgo(iso){const mins=Math.floor((Date.now()-new Date(iso).getTime())/60000);return mins<=0?"à l'instant":mins+' min';}
function timerClass(iso,statut){if(statut==='servie')return '';const mins=(Date.now()-new Date(iso).getTime())/60000;return mins>=15?'danger':mins>=8?'warn':'';}

// ========== LIVE TAB ==========
const LIVE_STATUS_FLOW={nouvelle:{next:'en_cours',label:'Prendre en charge',cls:'to-prep'},en_cours:{next:'prete',label:'Marquer prête',cls:'to-ready'},prete:{next:'servie',label:'Marquer servie',cls:'to-served'},servie:{next:null,label:'Servie ✓',cls:'done'}};

function startLivePolling(){
  fetchLiveOrders();
  livePollingInterval = setInterval(fetchLiveOrders, 4000);
}

async function fetchLiveOrders(){
  try{
    const res = await fetch(`${API_BASE}/commandes_list.php`,{headers:{'Authorization':'Bearer '+TOKEN}});
    if(res.status===401){localStorage.clear();window.location.href='../login.html';return;}
    const data = await res.json();
    if(!data.success) return;
    liveOrders = data.commandes;
    renderLive();
  }catch(e){}
}

function liveOrderCardHTML(o){
  const flow=LIVE_STATUS_FLOW[o.statut];
  const tCls=timerClass(o.created_at,o.statut);
  return `<div class="order-card ${o.statut==='nouvelle'?'new':''}" data-id="${o.id}">
    <div class="order-top">
      <div>
        <div class="order-table">Table ${esc(o.table)}</div>
        <div class="order-id">#${esc(o.code)}</div>
        ${o.zone?`<div class="order-zone">${esc(o.zone)}</div>`:''}
      </div>
      <div class="order-timer"><div class="t ${tCls}">${timeAgo(o.created_at)}</div></div>
    </div>
    <div class="order-items">
      ${o.items.map(it=>`<div class="order-item"><span><span class="q">${esc(it.quantite)}×</span>${esc(it.nom)}</span></div>${it.note?`<div class="order-note">📝 ${esc(it.note)}</div>`:''}`).join('')}
      ${o.note?`<div class="order-note">🗒️ ${esc(o.note)}</div>`:''}
    </div>
    <div class="order-foot">
      <div class="order-total">${fmt(o.total)}</div>
      ${flow.next?`<button class="order-action ${flow.cls}" data-next="${flow.next}" data-id="${o.id}">${flow.label}</button>`:`<button class="order-action done" disabled>${flow.label}</button>`}
    </div>
  </div>`;
}

function renderLive(){
  const board=document.getElementById('liveBoard');
  const counts={all:liveOrders.length,nouvelle:0,en_cours:0,prete:0,servie:0};
  liveOrders.forEach(o=>counts[o.statut]=(counts[o.statut]||0)+1);
  ['all','nouvelle','en_cours','prete'].forEach(s=>{
    const el=document.getElementById('l'+{all:'All',nouvelle:'Nouvelle',en_cours:'EnCours',prete:'Prete'}[s]);
    if(el) el.textContent=counts[s]||0;
  });
  let list=liveFilter==='all'?liveOrders.filter(o=>o.statut!=='servie'):liveOrders.filter(o=>o.statut===liveFilter);
  board.innerHTML=list.length?list.map(liveOrderCardHTML).join(''):`<div class="empty-state"><span class="icon">✅</span><p>Aucune commande active.</p></div>`;
  board.querySelectorAll('[data-next]').forEach(btn=>{
    btn.addEventListener('click',()=>advanceLiveOrder(Number(btn.dataset.id),btn));
  });
}

document.getElementById('liveTabs')?.addEventListener('click',e=>{
  const tab=e.target.closest('.ltab');
  if(!tab) return;
  document.querySelectorAll('.ltab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  liveFilter=tab.dataset.status;
  renderLive();
});

async function advanceLiveOrder(id,btnEl){
  const order=liveOrders.find(o=>o.id===id);
  if(!order) return;
  const flow=LIVE_STATUS_FLOW[order.statut];
  if(!flow.next) return;
  btnEl.disabled=true; btnEl.textContent='...';
  try{
    const res=await fetch(`${API_BASE}/commande_update_statut.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({commande_id:id,statut:flow.next})});
    const data=await res.json();
    if(!data.success){showToast(data.error||'Erreur');btnEl.disabled=false;btnEl.textContent=flow.label;return;}
    order.statut=flow.next;
    renderLive();
  }catch(e){showToast('Connexion impossible.');btnEl.disabled=false;btnEl.textContent=flow.label;}
}

// ========== MENU TAB ==========
let menuData = [];

async function loadMenuTab(){
  const wrap=document.getElementById('menuWrap');
  wrap.innerHTML='<div class="empty-state"><p>Chargement…</p></div>';
  try{
    const res=await fetch(`${API_BASE}/menu_manage.php`,{headers:{'Authorization':'Bearer '+TOKEN}});
    const data=await res.json();
    if(!data.success) throw new Error(data.error);
    menuData=data.categories;
    renderMenuTab();
  }catch(e){wrap.innerHTML=`<div class="empty-state"><p>Erreur chargement menu.</p></div>`;}
}

function renderMenuTab(){
  const wrap=document.getElementById('menuWrap');
  if(!menuData.length){wrap.innerHTML='<div class="empty-state"><p>Aucune catégorie. Commencez par en créer une.</p></div>';return;}
  wrap.innerHTML=menuData.map(cat=>`
    <div class="cat-section">
      <div class="cat-header">
        <h3>${esc(cat.nom)} <small style="opacity:.6;font-size:12px;font-family:'Inter'">${cat.articles.length} articles</small></h3>
        <div class="cat-actions">
          <button class="btn-secondary" style="font-size:11px;padding:6px 10px;color:var(--semolina);border-color:rgba(242,232,216,.2)" onclick="openAddArticleModal(${cat.id},'${esc(cat.nom)}')">+ Article</button>
          <button class="btn-danger" style="font-size:11px;padding:6px 10px" onclick="deleteCat(${cat.id})">×</button>
        </div>
      </div>
      ${cat.articles.map(a=>`
        <div class="article-card">
          <div class="article-photo" style="background-image:url('${a.photo_url||''}')"></div>
          <div class="article-info">
            <div class="article-name">${esc(a.nom)}</div>
            <div class="article-price">${fmt(a.prix)}</div>
            ${a.description?`<div class="article-desc">${esc(a.description)}</div>`:''}
          </div>
          <div class="article-actions">
            <button class="toggle-dispo ${a.disponible?'on':'off'}" onclick="toggleArticle(${a.id})">${a.disponible?'Dispo':'Indispo'}</button>
            <button class="btn-secondary" style="font-size:11px;padding:5px 9px" onclick="openEditArticleModal(${JSON.stringify(a).replace(/"/g,'&quot;')})">Éditer</button>
            <button class="btn-danger" style="font-size:11px;padding:5px 9px" onclick="deleteArticle(${a.id})">Suppr.</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function openAddArticleModal(catId, catNom){
  openModal(`Nouvel article — ${catNom}`,`
    <div class="form-field"><label>Nom</label><input id="mNom" placeholder="Ex: Couscous royal"></div>
    <div class="form-field"><label>Prix (DT)</label><input id="mPrix" type="number" step="0.001" min="0" placeholder="0.000"></div>
    <div class="form-field"><label>Description (optionnel)</label><input id="mDesc" placeholder="Courte description"></div>
    <div class="form-field"><label>URL photo (optionnel)</label><input id="mPhoto" placeholder="https://..."></div>
    <button class="btn-primary" id="modalConfirmBtn">Ajouter l'article</button>
  `);
  document.getElementById('modalConfirmBtn').onclick=async()=>{
    const nom=document.getElementById('mNom').value.trim();
    const prix=parseFloat(document.getElementById('mPrix').value);
    if(!nom||!prix){showModalErr('Nom et prix requis.');return;}
    await menuAction({action:'add_article',categorie_id:catId,nom,prix,description:document.getElementById('mDesc').value||undefined,photo_url:document.getElementById('mPhoto').value||undefined});
  };
}

function openEditArticleModal(a){
  openModal(`Éditer — ${a.nom}`,`
    <div class="form-field"><label>Nom</label><input id="mNom" value="${esc(a.nom)}"></div>
    <div class="form-field"><label>Prix (DT)</label><input id="mPrix" type="number" step="0.001" value="${a.prix}"></div>
    <div class="form-field"><label>Description</label><input id="mDesc" value="${esc(a.description||'')}"></div>
    <div class="form-field"><label>URL photo</label><input id="mPhoto" value="${esc(a.photo_url||'')}"></div>
    <button class="btn-primary" id="modalConfirmBtn">Enregistrer</button>
  `);
  document.getElementById('modalConfirmBtn').onclick=async()=>{
    const nom=document.getElementById('mNom').value.trim();
    const prix=parseFloat(document.getElementById('mPrix').value);
    if(!nom||!prix){showModalErr('Nom et prix requis.');return;}
    await menuAction({action:'update_article',article_id:a.id,nom,prix,description:document.getElementById('mDesc').value||undefined,photo_url:document.getElementById('mPhoto').value||undefined});
  };
}

async function toggleArticle(id){
  await menuAction({action:'toggle_article',article_id:id});
}
async function deleteArticle(id){
  if(!confirm('Supprimer cet article ?')) return;
  await menuAction({action:'delete_article',article_id:id});
}
async function deleteCat(id){
  if(!confirm('Supprimer cette catégorie ? (Elle doit être vide)')) return;
  await menuAction({action:'delete_category',categorie_id:id});
}

async function menuAction(body){
  try{
    const res=await fetch(`${API_BASE}/menu_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(!data.success){showToast(data.error||'Erreur');return;}
    closeModal();
    showToast('Enregistré','var(--olive)');
    loadMenuTab();
  }catch(e){showToast('Connexion impossible.');}
}

function showModalErr(msg){
  const el=document.getElementById('modalErr');
  el.textContent=msg; el.style.display='block';
}

document.getElementById('btnAddCat')?.addEventListener('click',()=>{
  openModal('Nouvelle catégorie',`
    <div class="form-field"><label>Nom de la catégorie</label><input id="mCatNom" placeholder="Ex: Boissons, Desserts…"></div>
    <button class="btn-primary" id="modalConfirmBtn">Créer la catégorie</button>
  `);
  document.getElementById('modalConfirmBtn').onclick=async()=>{
    const nom=document.getElementById('mCatNom').value.trim();
    if(!nom){showModalErr('Nom requis.');return;}
    await menuAction({action:'add_category',nom});
  };
});

// ========== TABLES TAB ==========
async function loadTablesTab(){
  const wrap=document.getElementById('tablesWrap');
  wrap.innerHTML='<div class="empty-state"><p>Chargement…</p></div>';
  try{
    const res=await fetch(`${API_BASE}/tables_manage.php`,{headers:{'Authorization':'Bearer '+TOKEN}});
    const data=await res.json();
    if(!data.success) throw new Error();
    renderTablesTab(data.tables, data.zones);
  }catch(e){wrap.innerHTML='<div class="empty-state"><p>Erreur chargement tables.</p></div>';}
}

function renderTablesTab(tables, zones){
  const wrap=document.getElementById('tablesWrap');
  const byZone={};
  tables.forEach(t=>{
    const k=t.zone_nom||'Sans zone';
    if(!byZone[k]) byZone[k]=[];
    byZone[k].push(t);
  });
  wrap.innerHTML=Object.entries(byZone).map(([zone,tbls])=>`
    <div class="zone-group">
      <div class="zone-label">${esc(zone)} <span style="font-size:12px;color:var(--clay);font-family:'Inter'">${tbls.length} tables</span></div>
      <div class="table-grid">
        ${tbls.map(t=>`
          <div class="table-card">
            <div class="table-num">${esc(t.numero)}</div>
            <div class="table-zone-label">${esc(t.zone_nom||'—')}</div>
            <button class="table-qr-link" onclick="copyQrUrl('${esc(t.qr_token)}',this)">📋 Copier URL QR</button>
            <button class="btn-danger table-delete" onclick="deleteTable(${t.id})">Supprimer</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  window._zones = zones;
}

function copyQrUrl(token, btn){
  const url=`${window.location.origin}/public/client/index.html?t=${token}`;
  navigator.clipboard.writeText(url).then(()=>{
    const orig=btn.textContent; btn.textContent='✅ Copié !';
    setTimeout(()=>btn.textContent=orig, 2000);
  }).catch(()=>showToast('Copier manuellement : '+url));
}

async function deleteTable(id){
  if(!confirm('Supprimer cette table ?')) return;
  try{
    const res=await fetch(`${API_BASE}/tables_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({action:'delete_table',table_id:id})});
    const data=await res.json();
    if(!data.success){showToast(data.error||'Erreur');return;}
    showToast('Table supprimée','var(--olive)');
    loadTablesTab();
  }catch(e){showToast('Connexion impossible.');}
}

document.getElementById('btnAddTable')?.addEventListener('click',()=>{
  const zoneOptions=(window._zones||[]).map(z=>`<option value="${z.id}">${esc(z.nom)}</option>`).join('');
  openModal('Ajouter une table',`
    <div class="form-field"><label>Numéro de table</label><input id="mTableNum" type="number" min="1" placeholder="12"></div>
    <div class="form-field"><label>Zone</label><select id="mTableZone"><option value="">— Aucune zone —</option>${zoneOptions}</select></div>
    <button class="btn-primary" id="modalConfirmBtn">Créer la table</button>
  `);
  document.getElementById('modalConfirmBtn').onclick=async()=>{
    const numero=parseInt(document.getElementById('mTableNum').value);
    const zone_id=document.getElementById('mTableZone').value||null;
    if(!numero||numero<1){showModalErr('Numéro invalide.');return;}
    try{
      const res=await fetch(`${API_BASE}/tables_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({action:'add_table',numero,zone_id})});
      const data=await res.json();
      if(!data.success){showModalErr(data.error||'Erreur');return;}
      closeModal();
      showToast('Table créée. URL QR disponible dans la liste.','var(--olive)');
      loadTablesTab();
    }catch(e){showModalErr('Connexion impossible.');}
  };
});

document.getElementById('btnAddZone')?.addEventListener('click',()=>{
  openModal('Nouvelle zone',`
    <div class="form-field"><label>Nom de la zone</label><input id="mZoneNom" placeholder="Ex: Terrasse, Salle VIP…"></div>
    <button class="btn-primary" id="modalConfirmBtn">Créer la zone</button>
  `);
  document.getElementById('modalConfirmBtn').onclick=async()=>{
    const nom=document.getElementById('mZoneNom').value.trim();
    if(!nom){showModalErr('Nom requis.');return;}
    try{
      const res=await fetch(`${API_BASE}/tables_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({action:'add_zone',nom})});
      const data=await res.json();
      if(!data.success){showModalErr(data.error||'Erreur');return;}
      closeModal();
      showToast('Zone créée','var(--olive)');
      loadTablesTab();
    }catch(e){showModalErr('Connexion impossible.');}

});

// ========== EQUIPE TAB ==========
async function loadEquipeTab(){
  const wrap=document.getElementById('equipeWrap');
  wrap.innerHTML='<div class="empty-state"><p>Chargement…</p></div>';
  try{
    const res=await fetch(`${API_BASE}/users_manage.php`,{headers:{'Authorization':'Bearer '+TOKEN}});
    const data=await res.json();
    if(!data.success) throw new Error();
    renderEquipeTab(data.users, data.zones);
  }catch(e){wrap.innerHTML='<div class="empty-state"><p>Erreur chargement équipe.</p></div>';}
}

function renderEquipeTab(users, zones){
  const wrap=document.getElementById('equipeWrap');
  window._zones=zones;
  wrap.innerHTML=users.map(u=>`
    <div class="user-card">
      <div class="user-avatar ${u.role==='proprietaire'?'prop':'serv'}">${esc(u.nom.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase())}</div>
      <div class="user-info">
        <div class="user-name">${esc(u.nom)}</div>
        <div class="user-meta">${esc(u.email)} · ${u.role==='proprietaire'?'Propriétaire':'Serveur'} · ${u.zone_nom?esc(u.zone_nom):'Toutes zones'}</div>
        ${u.derniere_connexion?`<div class="user-meta">Dernière co. : ${new Date(u.derniere_connexion).toLocaleDateString('fr-FR')}</div>`:''}
      </div>
      <div class="user-actions">
        <span class="${u.actif?'badge-actif':'badge-inactif'}">${u.actif?'Actif':'Inactif'}</span>
        <button class="btn-secondary" style="font-size:11px;padding:5px 9px" onclick="openEditUserModal(${JSON.stringify(u).replace(/"/g,'&quot;')})">Éditer</button>
        <button class="${u.actif?'btn-danger':'btn-secondary'}" style="font-size:11px;padding:5px 9px" onclick="toggleUser(${u.id})">${u.actif?'Désactiver':'Activer'}</button>
      </div>
    </div>
  `).join('');
}

async function toggleUser(id){
  try{
    const res=await fetch(`${API_BASE}/users_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({action:'toggle_user',user_id:id})});
    const data=await res.json();
    if(!data.success){showToast(data.error||'Erreur');return;}
    showToast('Statut mis à jour','var(--olive)');
    loadEquipeTab();
  }catch(e){showToast('Connexion impossible.');}
}

function openEditUserModal(u){
  const zoneOptions=(window._zones||[]).map(z=>`<option value="${z.id}" ${u.zone_id==z.id?'selected':''}>${esc(z.nom)}</option>`).join('');
  openModal(`Éditer — ${u.nom}`,`
    <div class="form-field"><label>Nom</label><input id="mUNom" value="${esc(u.nom)}"></div>
    <div class="form-field"><label>Zone</label><select id="mUZone"><option value="">— Toutes les zones —</option>${zoneOptions}</select></div>
    <div class="form-field"><label>WhatsApp (notifications)</label><input id="mUWa" value="${esc(u.whatsapp_number||'')}" placeholder="+21620xxxxxx"></div>
    <button class="btn-primary" id="modalConfirmBtn">Enregistrer</button>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line)">
      <div class="form-field"><label>Nouveau mot de passe (optionnel)</label><input id="mUPwd" type="password" placeholder="Laisser vide pour ne pas changer" autocomplete="new-password"></div>
      <button class="btn-secondary" style="width:100%" id="resetPwdBtn">Changer le mot de passe</button>
    </div>
  `);
  document.getElementById('modalConfirmBtn').onclick=async()=>{
    const nom=document.getElementById('mUNom').value.trim();
    if(!nom){showModalErr('Nom requis.');return;}
    try{
      const res=await fetch(`${API_BASE}/users_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({action:'update_user',user_id:u.id,nom,zone_id:document.getElementById('mUZone').value||null,whatsapp_number:document.getElementById('mUWa').value||null})});
      const data=await res.json();
      if(!data.success){showModalErr(data.error||'Erreur');return;}
      closeModal();showToast('Modifications enregistrées','var(--olive)');loadEquipeTab();
    }catch(e){showModalErr('Connexion impossible.');}
  };
  document.getElementById('resetPwdBtn').onclick=async()=>{
    const pwd=document.getElementById('mUPwd').value;
    if(pwd.length<8){showModalErr('Mot de passe : 8 caractères minimum.');return;}
    try{
      const res=await fetch(`${API_BASE}/users_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({action:'reset_password',user_id:u.id,password:pwd})});
      const data=await res.json();
      if(!data.success){showModalErr(data.error||'Erreur');return;}
      showToast('Mot de passe changé','var(--olive)');closeModal();
    }catch(e){showModalErr('Connexion impossible.');}
  };
}

document.getElementById('btnAddUser')?.addEventListener('click',()=>{
  const zoneOptions=(window._zones||[]).map(z=>`<option value="${z.id}">${esc(z.nom)}</option>`).join('');
  openModal('Ajouter un membre',`
    <div class="form-field"><label>Nom complet</label><input id="mANom" placeholder="Prénom Nom"></div>
    <div class="form-field"><label>Email</label><input id="mAEmail" type="email" placeholder="email@example.com"></div>
    <div class="form-field"><label>Mot de passe</label><input id="mAPwd" type="password" placeholder="8 caractères minimum" autocomplete="new-password"></div>
    <div class="form-field"><label>Rôle</label><select id="mARole"><option value="serveur">Serveur</option><option value="proprietaire">Propriétaire</option></select></div>
    <div class="form-field"><label>Zone assignée</label><select id="mAZone"><option value="">— Toutes les zones —</option>${zoneOptions}</select></div>
    <div class="form-field"><label>WhatsApp (notifications)</label><input id="mAWa" placeholder="+21620xxxxxx"></div>
    <button class="btn-primary" id="modalConfirmBtn">Créer le compte</button>
  `);
  document.getElementById('modalConfirmBtn').onclick=async()=>{
    const nom=document.getElementById('mANom').value.trim();
    const email=document.getElementById('mAEmail').value.trim();
    const password=document.getElementById('mAPwd').value;
    if(!nom||!email||password.length<8){showModalErr('Tous les champs sont requis (mdp 8 cars min).');return;}
    try{
      const res=await fetch(`${API_BASE}/users_manage.php`,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({action:'add_user',nom,email,password,role:document.getElementById('mARole').value,zone_id:document.getElementById('mAZone').value||null,whatsapp_number:document.getElementById('mAWa').value||null})});
      const data=await res.json();
      if(!data.success){showModalErr(data.error||'Erreur');return;}
      closeModal();showToast('Compte créé','var(--olive)');loadEquipeTab();
    }catch(e){showModalErr('Connexion impossible.');}
  };
});

// ========== INIT ==========
loadStats();
setInterval(loadStats, REFRESH_INTERVAL_MS);
</script>
