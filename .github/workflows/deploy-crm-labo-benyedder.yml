name: Deploy crm-labo-benyedder to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'crm-labo-benyedder/**'
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP → Labo Ben Yedder
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Generate config.php from secrets
        env:
          DB_NAME: ${{ secrets.BENYEDDER_DB_NAME }}
          DB_PASS: ${{ secrets.BENYEDDER_DB_PASSWORD }}
          MIGRATION_TOKEN: ${{ secrets.BENYEDDER_MIGRATION_TOKEN }}
        run: |
          if [ -z "$DB_NAME" ] || [ -z "$DB_PASS" ]; then
            echo "::error::Secrets BENYEDDER_DB_NAME et/ou BENYEDDER_DB_PASSWORD manquants — voir Settings > Secrets and variables > Actions"
            exit 1
          fi
          if [ -z "$MIGRATION_TOKEN" ]; then
            echo "::error::Secret BENYEDDER_MIGRATION_TOKEN manquant — voir Settings > Secrets and variables > Actions"
            exit 1
          fi
          DB_NAME_ESC=$(printf '%s' "$DB_NAME" | sed "s/[\\\\']/\\\\&/g")
          DB_PASS_ESC=$(printf '%s' "$DB_PASS" | sed "s/[\\\\']/\\\\&/g")
          TOKEN_ESC=$(printf '%s' "$MIGRATION_TOKEN" | sed "s/[\\\\']/\\\\&/g")
          cat > crm-labo-benyedder/config.php << PHPCONFIG
          <?php
          define('DB_HOST', 'localhost');
          define('DB_NAME', '${DB_NAME_ESC}');
          define('DB_USER', '${DB_NAME_ESC}');
          define('DB_PASS', '${DB_PASS_ESC}');
          define('DB_CHARSET', 'utf8mb4');
          define('MIGRATION_TOKEN', '${TOKEN_ESC}');

          function getDB() {
              static \$pdo = null;
              if (\$pdo === null) {
                  try {
                      \$dsn = "mysql:host=" . DB_HOST . ";dbname=" . DB_NAME . ";charset=" . DB_CHARSET;
                      \$pdo = new PDO(\$dsn, DB_USER, DB_PASS, [
                          PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                          PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                          PDO::ATTR_EMULATE_PREPARES => false,
                      ]);
                  } catch (PDOException \$e) {
                      http_response_code(500);
                      die(json_encode(['error' => 'Connexion échouée: ' . \$e->getMessage()]));
                  }
              }
              return \$pdo;
          }

          function requireLogin() {
              if (session_status() === PHP_SESSION_NONE) session_start();
              if (!isset(\$_SESSION['user_id'])) {
                  if (!empty(\$_SERVER['HTTP_X_REQUESTED_WITH'])) {
                      http_response_code(401);
                      die(json_encode(['error' => 'Non authentifié']));
                  }
                  header('Location: /login.php');
                  exit;
              }
          }

          function currentUser() {
              if (session_status() === PHP_SESSION_NONE) session_start();
              return \$_SESSION['user'] ?? null;
          }

          function requireRole(array \$roles) {
              \$u = currentUser();
              if (!\$u || !in_array(\$u['role'], \$roles, true)) {
                  if (!empty(\$_SERVER['HTTP_X_REQUESTED_WITH'])) {
                      http_response_code(403);
                      die(json_encode(['error' => 'Accès refusé pour ce rôle']));
                  }
                  header('Location: /index.php');
                  exit;
              }
          }
          PHPCONFIG

      - name: Build SFTP batch file
        run: |
          printf 'cd domains/rybsen.fr/public_html/tby\n' > /tmp/sftp_batch.txt
          printf -- '-mkdir api\n-mkdir assets\n-mkdir includes\n-mkdir modules\n' >> /tmp/sftp_batch.txt
          # Déploie tous les fichiers SAUF les dumps SQL — mais on GARDE install.sql,
          # nécessaire à run_migration.php pour appliquer le schéma côté serveur.
          find crm-labo-benyedder -type f \
            ! \( -name '*.sql' ! -name 'install.sql' \) \
            ! -name 'config.example.php' \
            ! -path '*/.git/*' \
            ! -name '.gitignore' \
            | sort | while read f; do
              remote="${f#crm-labo-benyedder/}"
              printf 'put %s %s\n' "$f" "$remote"
            done >> /tmp/sftp_batch.txt
          printf 'bye\n' >> /tmp/sftp_batch.txt
          echo "=== Batch file (config.php content hidden) ===" && grep -v config.php /tmp/sftp_batch.txt

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.PATISSERIE_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.PATISSERIE_SFTP_PORT }}
          SFTP_USER: ${{ secrets.PATISSERIE_SFTP_USER }}
          SFTP_PASS: ${{ secrets.PATISSERIE_SFTP_PASSWORD }}
        run: |
          sshpass -p "$SFTP_PASS" sftp \
            -oBatchMode=no \
            -oStrictHostKeyChecking=no \
            -oPasswordAuthentication=yes \
            -oConnectTimeout=30 \
            -P "$SFTP_PORT" \
            -b /tmp/sftp_batch.txt \
            "$SFTP_USER@$SFTP_HOST"

      - name: Appliquer le schéma de base de données (install.sql, idempotent)
        env:
          MIGRATION_TOKEN: ${{ secrets.BENYEDDER_MIGRATION_TOKEN }}
        run: |
          # Exécute install.sql côté serveur (CREATE TABLE IF NOT EXISTS, procédures
          # conditionnelles pour les colonnes, CREATE OR REPLACE pour les vues).
          # Idempotent : n'ajoute que ce qui manque, n'écrase jamais les données existantes.
          response=$(curl -sS -X POST "https://tby.rybsen.fr/run_migration.php" \
            -H "X-Migration-Token: $MIGRATION_TOKEN" \
            -w "\n%{http_code}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Échec de l'application du schéma (HTTP $http_code)"
            exit 1
          fi
          # Bloque le déploiement si une requête SQL a échoué (champ "ok":false)
          if echo "$body" | grep -q '"ok":false'; then
            echo "::error::Des requêtes du schéma ont échoué — voir la sortie ci-dessus"
            exit 1
          fi

      - name: Importer le référentiel clients (idempotent, insert-if-missing)
        env:
          MIGRATION_TOKEN: ${{ secrets.BENYEDDER_MIGRATION_TOKEN }}
        run: |
          # Insère les clients de clients_seed.csv absents (clé = code_externe) sans jamais
          # écraser une fiche déjà présente. Sûr à rejouer à chaque déploiement.
          response=$(curl -sS -X POST "https://tby.rybsen.fr/run_import_clients.php" \
            -H "X-Migration-Token: $MIGRATION_TOKEN" \
            -w "\n%{http_code}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Échec de l'import des clients (HTTP $http_code)"
            exit 1
          fi
          if echo "$body" | grep -q '"ok":false'; then
            echo "::error::L'import des clients a échoué — voir la sortie ci-dessus"
            exit 1
          fi

      - name: Importer le catalogue produits (idempotent, insert-if-missing)
        env:
          MIGRATION_TOKEN: ${{ secrets.BENYEDDER_MIGRATION_TOKEN }}
        run: |
          # Insère les produits de products_seed.csv absents (clé = code_externe) et crée
          # les catégories manquantes. Ne modifie jamais un produit déjà présent.
          response=$(curl -sS -X POST "https://tby.rybsen.fr/run_import_produits.php" \
            -H "X-Migration-Token: $MIGRATION_TOKEN" \
            -w "\n%{http_code}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Échec de l'import du catalogue (HTTP $http_code)"
            exit 1
          fi
          if echo "$body" | grep -q '"ok":false'; then
            echo "::error::L'import du catalogue a échoué — voir la sortie ci-dessus"
            exit 1
          fi
