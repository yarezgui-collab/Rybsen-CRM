name: Deploy crm-rybsen to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'crm-rybsen/**'
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP → crm.rybsen.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Build SFTP batch file
        run: |
          # Créer dynamiquement tous les répertoires nécessaires
          find crm-rybsen -mindepth 1 -type d ! -path '*/.git*' | sort | while read d; do
            printf -- '-mkdir %s\n' "${d#crm-rybsen/}"
          done > /tmp/sftp_batch.txt
          find crm-rybsen -type f \
            ! -name 'config.php' \
            ! -name '*.sql' \
            ! -name 'config.example.php' \
            ! -path '*/.git/*' \
            ! -name '.gitignore' \
            | sort | while read f; do
              remote="${f#crm-rybsen/}"
              printf 'put %s %s\n' "$f" "$remote"
            done >> /tmp/sftp_batch.txt
          printf 'bye\n' >> /tmp/sftp_batch.txt
          echo "=== Batch file ===" && cat /tmp/sftp_batch.txt

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.CRM_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.CRM_SFTP_PORT }}
          SFTP_USER: ${{ secrets.CRM_SFTP_USER }}
          SFTP_PASS: ${{ secrets.CRM_SFTP_PASSWORD }}
        run: |
          sshpass -p "$SFTP_PASS" sftp \
            -oBatchMode=no \
            -oStrictHostKeyChecking=no \
            -oPasswordAuthentication=yes \
            -oConnectTimeout=30 \
            -P "$SFTP_PORT" \
            -b /tmp/sftp_batch.txt \
            "$SFTP_USER@$SFTP_HOST"
