name: Deploy crm-rybsen to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'crm-rybsen/**'
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP → crm.rybsen.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.CRM_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.CRM_SFTP_PORT }}
          SFTP_USER: ${{ secrets.CRM_SFTP_USER }}
          SFTP_PASS: ${{ secrets.CRM_SFTP_PASSWORD }}
        run: |
          ENCODED_PASS=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['SFTP_PASS'], safe=''))")
          ENCODED_USER=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['SFTP_USER'], safe=''))")
          lftp -c "
          set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${SFTP_PORT}';
          open sftp://${ENCODED_USER}:${ENCODED_PASS}@${SFTP_HOST};
          mirror -R --verbose --no-perms --parallel=4 \
            --exclude-glob config.php \
            --exclude-glob '*.sql' \
            --exclude-glob '.git*' \
            --exclude-glob '.gitignore' \
            --exclude-glob 'config.example.php' \
            ./crm-rybsen/ .;
          bye
          "
