name: Deploy crm-rybsen to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'crm-rybsen/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -c "
          set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SFTP_PORT';
          open -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_HOST;
          mirror -R --verbose --no-perms --parallel=4 \
            --exclude-glob config.php \
            --exclude-glob '*.sql' \
            --exclude-glob '.git*' \
            --exclude-glob '.gitignore' \
            --exclude-glob 'config.example.php' \
            ./crm-rybsen/ domains/rybsen.com/public_html/crm/;
          bye
          "
