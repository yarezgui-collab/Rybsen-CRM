name: Deploy startup to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'crm-startup/**'
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP → startup.rybsen.fr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.STARTUP_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.STARTUP_SFTP_PORT }}
          SFTP_USER: ${{ secrets.STARTUP_SFTP_USER }}
          SFTP_PASS: ${{ secrets.STARTUP_SFTP_PASSWORD }}
        run: |
          # Build SFTP batch — deploy all PHP/SQL/.htaccess except config.php and run_migration.php
          echo "cd domains/rybsen.fr/public_html/startup" > /tmp/sftp_batch.txt

          find crm-startup -maxdepth 1 -type f \
            \( -name "*.php" -o -name "*.sql" -o -name ".htaccess" \) \
            ! -name "config.php" \
            ! -name "run_migration.php" \
            | sort \
            | while read f; do
                fname=$(basename "$f")
                echo "put $f $fname"
              done >> /tmp/sftp_batch.txt

          echo "bye" >> /tmp/sftp_batch.txt

          echo "=== Fichiers à déployer ==="
          cat /tmp/sftp_batch.txt

          sshpass -p "$SFTP_PASS" sftp \
            -oBatchMode=no \
            -oStrictHostKeyChecking=no \
            -oPasswordAuthentication=yes \
            -P "$SFTP_PORT" \
            -b /tmp/sftp_batch.txt \
            "$SFTP_USER@$SFTP_HOST"

      - name: Run database migration
        env:
          SFTP_HOST: ${{ secrets.STARTUP_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.STARTUP_SFTP_PORT }}
          SFTP_USER: ${{ secrets.STARTUP_SFTP_USER }}
          SFTP_PASS: ${{ secrets.STARTUP_SFTP_PASSWORD }}
        run: |
          TOKEN=$(openssl rand -hex 24)

          # Injecter le token dans le script de migration
          sed "s/MIGRATION_TOKEN_PLACEHOLDER/$TOKEN/" crm-startup/run_migration.php > /tmp/run_migration.php

          # Déployer le script temporaire
          echo "cd domains/rybsen.fr/public_html/startup" > /tmp/sftp_migrate.txt
          echo "put /tmp/run_migration.php run_migration.php" >> /tmp/sftp_migrate.txt
          echo "bye" >> /tmp/sftp_migrate.txt

          sshpass -p "$SFTP_PASS" sftp \
            -oBatchMode=no \
            -oStrictHostKeyChecking=no \
            -oPasswordAuthentication=yes \
            -P "$SFTP_PORT" \
            -b /tmp/sftp_migrate.txt \
            "$SFTP_USER@$SFTP_HOST"

          # Déclencher la migration (le script se supprime lui-même après)
          echo "=== Résultat de la migration ==="
          HTTP_CODE=$(curl -o /tmp/migration_result.json -w "%{http_code}" \
            "https://startup.rybsen.fr/run_migration.php?token=$TOKEN")
          echo "HTTP $HTTP_CODE"
          echo "--- Body ---"
          cat /tmp/migration_result.json
          echo ""

          # Vérifier le succès
          python3 -c "
          import json, sys
          body = open('/tmp/migration_result.json').read().strip()
          if not body:
              print('ERROR: empty response from migration script')
              sys.exit(1)
          data = json.loads(body)
          if not data.get('success'):
              print('Migration failed:', data)
              sys.exit(1)
          for r in data.get('results', []):
              print(r)
          print('Migration complete.')
          "
