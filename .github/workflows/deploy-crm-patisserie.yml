name: Deploy crm-patisserie to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'crm-patisserie/**'
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP → patisserie (rybsen.fr/pby)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.PATISSERIE_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.PATISSERIE_SFTP_PORT }}
          SFTP_USER: ${{ secrets.PATISSERIE_SFTP_USER }}
          SFTP_PASS: ${{ secrets.PATISSERIE_SFTP_PASSWORD }}
        run: |
          cat > /tmp/sftp_batch.txt << 'BATCH'
          cd domains/rybsen.fr/public_html/pby
          put crm-patisserie/index.html index.html
          put crm-patisserie/api.php api.php
          put crm-patisserie/default.php default.php
          BATCH

          [ -f crm-patisserie/.htaccess ] && echo "put crm-patisserie/.htaccess .htaccess" >> /tmp/sftp_batch.txt
          echo "bye" >> /tmp/sftp_batch.txt

          sshpass -p "$SFTP_PASS" sftp \
            -oBatchMode=no \
            -oStrictHostKeyChecking=no \
            -oPasswordAuthentication=yes \
            -P "$SFTP_PORT" \
            -b /tmp/sftp_batch.txt \
            "$SFTP_USER@$SFTP_HOST"
