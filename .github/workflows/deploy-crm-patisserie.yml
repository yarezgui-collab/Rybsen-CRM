name: Deploy crm-patisserie to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'crm-patisserie/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP → patisserie (rybsen.fr/pby)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.PATISSERIE_SFTP_HOST }}
          FTP_PORT: ${{ secrets.PATISSERIE_SFTP_PORT }}
          FTP_USER: ${{ secrets.PATISSERIE_SFTP_USER }}
          FTP_PASS: ${{ secrets.PATISSERIE_SFTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" -p "$FTP_PORT" "ftp://$FTP_HOST" << 'LFTP'
            set ftp:ssl-allow no
            set net:max-retries 3
            cd domains/rybsen.fr/public_html/pby
            put crm-patisserie/index.html -o index.html
            put crm-patisserie/api.php -o api.php
            put crm-patisserie/default.php -o default.php
            put crm-patisserie/.htaccess -o .htaccess
            bye
          LFTP
